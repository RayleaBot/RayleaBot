<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 220" width="100%" role="img" aria-label="Monthly commit activity for RayleaBot/RayleaBot">
  <defs>
    <linearGradient id="areaGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#58a6ff33" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    .bg { fill: #0d1117; }
    .grid { stroke: #21262d; stroke-width: 1; }
    .axis-text { fill: #8b949e; font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace; font-size: 11px; }
    .line { fill: none; stroke: #58a6ff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; filter: url(#glow); }
    .area { fill: url(#areaGradient); }
    .point { fill: #0d1117; stroke: #58a6ff; stroke-width: 2; }
    .title { fill: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 600; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .grid { stroke: #e6edf0; }
      .axis-text { fill: #57606a; }
      .point { fill: #ffffff; }
      .title { fill: #24292f; }
    }
