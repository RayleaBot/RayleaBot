root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o tmp/raylea-server-dev.exe ./cmd/raylea-server"
bin = "tmp/raylea-server-dev.exe"
full_bin = "tmp/raylea-server-dev.exe -config ../config/user.yaml -config-schema ../contracts/config.user.schema.json"
include_ext = ["go"]
include_dir = ["cmd", "internal/app", "internal/extensions"]
exclude_dir = [".cache", ".gocache", "tmp", "logs"]
exclude_file = []
exclude_regex = ["_test\\.go"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "2s"

[log]
time = true

[misc]
clean_on_exit = false
