<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-default">
    <main class="panel" style="padding-top: 60px;">
      <h2 style="margin-bottom: 30px; color: #f4fbff;">status.panel — 低密度</h2>
      <aside class="identity-card" aria-label="用户身份" style="position: relative; top: auto; right: auto; margin-bottom: 40px;">
        <div class="identity-card__avatar">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Silver" alt="" />
        </div>
        <div class="identity-card__body">
          <div class="identity-card__name-row">
            <div class="identity-card__name">测试群名片</div>
          </div>
          <div class="identity-card__meta">
            <span class="identity-card__meta-line identity-card__meta-line--id">ID 30001</span>
          </div>
        </div>
      </aside>

      <h2 style="margin-bottom: 30px; color: #f4fbff;">status.panel — 高密度</h2>
      <aside class="identity-card" aria-label="用户身份" style="position: relative; top: auto; right: auto; margin-bottom: 40px;">
        <span class="permission-badge permission-badge--owner">群主</span>
        <div class="identity-card__avatar">
          <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Silver" alt="" />
        </div>
        <div class="identity-card__body">
          <div class="identity-card__name-row">
            <div class="identity-card__name">测试群名片</div>
            <div class="identity-card__badges">
              <span class="identity-card__title-badge">梦忆槿</span>
            </div>
          </div>
          <div class="identity-card__meta">
            <span class="identity-card__meta-line identity-card__meta-line--group">测试群组</span>
            <span class="identity-card__meta-line identity-card__meta-line--id">ID 30001</span>
          </div>
        </div>
      </aside>
    </main>
  </body>
</html>
