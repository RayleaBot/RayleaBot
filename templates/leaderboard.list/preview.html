<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="theme-default">
    <main class="leaderboard" aria-label="排行榜">
      <header class="leaderboard__header">
        <div class="leaderboard__title-group">
          <p class="leaderboard__eyebrow">Leaderboard</p>
          <h1>本周发言榜</h1>
          <p class="leaderboard__subtitle">统计周期：2026-05-01 至 2026-05-07</p>
        </div>
        <div class="leaderboard__value-label">发言数</div>
      </header>
      <section class="leaderboard__list">
        <article class="leaderboard__item">
          <div class="leaderboard__rank" aria-label="排名"></div>
          <div class="leaderboard__avatar"><img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Silver" alt="" /></div>
          <div class="leaderboard__member">
            <div class="leaderboard__name-line">
              <span class="leaderboard__group-name">银蝶</span>
              <span class="leaderboard__nickname">（Silver）</span>
              <span class="leaderboard__title-badge">群主</span>
            </div>
          </div>
          <div class="leaderboard__value">128</div>
        </article>
        <article class="leaderboard__item">
          <div class="leaderboard__rank" aria-label="排名"></div>
          <div class="leaderboard__avatar"><span>青空</span></div>
          <div class="leaderboard__member">
            <div class="leaderboard__name-line">
              <span class="leaderboard__group-name">青空观测员</span>
              <span class="leaderboard__nickname">（Aoi）</span>
              <span class="leaderboard__title-badge">活跃成员</span>
            </div>
          </div>
          <div class="leaderboard__value">96</div>
        </article>
        <article class="leaderboard__item">
          <div class="leaderboard__rank" aria-label="排名"></div>
          <div class="leaderboard__avatar"><span>Nova</span></div>
          <div class="leaderboard__member">
            <div class="leaderboard__name-line">
              <span class="leaderboard__group-name">Nova</span>
            </div>
          </div>
          <div class="leaderboard__value">81</div>
        </article>
      </section>
    </main>
  </body>
</html>
