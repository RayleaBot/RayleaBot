<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="980" viewBox="0 0 1480 980" role="img" aria-labelledby="title desc">
  <title id="title">RayleaBot 消息入站到出站处理流程</title>
  <desc id="desc">OneBot11 事件经过 Adapter、Event Ingress、Bridge、Dispatcher、Runtime Manager 和插件处理，插件通过 Dispatcher 与 Adapter 发送出站消息；Scheduler 通过 scheduler.trigger 回到同一条插件处理链路。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #d8dee8; stroke-width: 1.5; }
      .lane-title { font: 700 19px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #1e293b; }
      .box { fill: #ffffff; stroke: #64748b; stroke-width: 1.6; rx: 10; }
      .box-blue { fill: #eff6ff; stroke: #2563eb; }
      .box-green { fill: #ecfdf5; stroke: #059669; }
      .box-amber { fill: #fffbeb; stroke: #d97706; }
      .box-rose { fill: #fff1f2; stroke: #e11d48; }
      .box-purple { fill: #f5f3ff; stroke: #7c3aed; }
      .text { font: 600 16px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #0f172a; }
      .small { font: 13px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .muted-arrow { stroke: #94a3b8; stroke-width: 1.8; fill: none; marker-end: url(#arrow); stroke-dasharray: 6 5; }
      .label { font: 12px "Segoe UI", "Microsoft YaHei", sans-serif; fill: #475569; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1480" height="980"/>

  <rect class="lane" x="30" y="34" width="250" height="870" rx="16"/>
  <text class="lane-title" x="55" y="68">OneBot11 接入</text>
  <rect class="lane" x="310" y="34" width="250" height="870" rx="16"/>
  <text class="lane-title" x="335" y="68">Adapter 与入口治理</text>
  <rect class="lane" x="590" y="34" width="250" height="870" rx="16"/>
  <text class="lane-title" x="615" y="68">桥接与分发</text>
  <rect class="lane" x="870" y="34" width="250" height="870" rx="16"/>
  <text class="lane-title" x="895" y="68">插件运行时</text>
  <rect class="lane" x="1150" y="34" width="300" height="870" rx="16"/>
  <text class="lane-title" x="1175" y="68">平台能力与出站</text>

  <rect class="box box-blue" x="60" y="110" width="190" height="72"/>
  <text class="text" x="155" y="139" text-anchor="middle">OneBot11 平台</text>
  <text class="small" x="155" y="162" text-anchor="middle">群聊 / 私聊 / 通知 / 请求</text>

  <rect class="box box-blue" x="60" y="230" width="190" height="96"/>
  <text class="text" x="155" y="260" text-anchor="middle">入站传输</text>
  <text class="small" x="155" y="283" text-anchor="middle">forward_ws</text>
  <text class="small" x="155" y="305" text-anchor="middle">reverse_ws / webhook</text>

  <rect class="box box-blue" x="60" y="760" width="190" height="72"/>
  <text class="text" x="155" y="789" text-anchor="middle">OneBot11 出站</text>
  <text class="small" x="155" y="812" text-anchor="middle">send_msg / API response</text>

  <rect class="box box-green" x="340" y="110" width="190" height="86"/>
  <text class="text" x="435" y="141" text-anchor="middle">Adapter Shell</text>
  <text class="small" x="435" y="164" text-anchor="middle">鉴权 / 收帧 / 状态</text>
  <text class="small" x="435" y="184" text-anchor="middle">echo 等待表</text>

  <rect class="box box-green" x="340" y="245" width="190" height="86"/>
  <text class="text" x="435" y="276" text-anchor="middle">事件归一化</text>
  <text class="small" x="435" y="299" text-anchor="middle">去重并生成</text>
  <text class="small" x="435" y="319" text-anchor="middle">NormalizedEvent</text>

  <rect class="box box-green" x="340" y="380" width="190" height="96"/>
  <text class="text" x="435" y="411" text-anchor="middle">Event Ingress</text>
  <text class="small" x="435" y="434" text-anchor="middle">补元数据 / 解析命令</text>
  <text class="small" x="435" y="454" text-anchor="middle">记录 reply target</text>

  <rect class="box box-amber" x="340" y="525" width="190" height="102"/>
  <text class="text" x="435" y="557" text-anchor="middle">聊天治理</text>
  <text class="small" x="435" y="580" text-anchor="middle">白名单 / 黑名单</text>
  <text class="small" x="435" y="600" text-anchor="middle">权限 / 冷却</text>

  <rect class="box box-amber" x="340" y="680" width="190" height="84"/>
  <text class="text" x="435" y="711" text-anchor="middle">内置菜单</text>
  <text class="small" x="435" y="734" text-anchor="middle">渲染 help.menu</text>

  <rect class="box box-purple" x="620" y="110" width="190" height="86"/>
  <text class="text" x="715" y="141" text-anchor="middle">Plugin Lifecycle</text>
  <text class="small" x="715" y="164" text-anchor="middle">确认启用插件</text>
  <text class="small" x="715" y="184" text-anchor="middle">确保 runtime 运行</text>

  <rect class="box box-purple" x="620" y="245" width="190" height="86"/>
  <text class="text" x="715" y="276" text-anchor="middle">Bridge</text>
  <text class="small" x="715" y="299" text-anchor="middle">校验统一事件</text>
  <text class="small" x="715" y="319" text-anchor="middle">转 Runtime Event</text>

  <rect class="box box-purple" x="620" y="380" width="190" height="112"/>
  <text class="text" x="715" y="411" text-anchor="middle">Dispatcher</text>
  <text class="small" x="715" y="434" text-anchor="middle">命令定向或订阅分发</text>
  <text class="small" x="715" y="454" text-anchor="middle">插件队列</text>
  <text class="small" x="715" y="474" text-anchor="middle">event.target lane</text>

  <rect class="box box-purple" x="620" y="590" width="190" height="86"/>
  <text class="text" x="715" y="621" text-anchor="middle">平台事件</text>
  <text class="small" x="715" y="644" text-anchor="middle">scheduler / webhook</text>
  <text class="small" x="715" y="664" text-anchor="middle">config / bot identity</text>

  <rect class="box box-rose" x="900" y="245" width="190" height="92"/>
  <text class="text" x="995" y="276" text-anchor="middle">Runtime Manager</text>
  <text class="small" x="995" y="299" text-anchor="middle">JSONL event</text>
  <text class="small" x="995" y="319" text-anchor="middle">result / error / action</text>

  <rect class="box box-rose" x="900" y="400" width="190" height="92"/>
  <text class="text" x="995" y="431" text-anchor="middle">插件处理器</text>
  <text class="small" x="995" y="454" text-anchor="middle">业务逻辑</text>
  <text class="small" x="995" y="474" text-anchor="middle">local action / 出站 action</text>

  <rect class="box box-rose" x="900" y="590" width="190" height="86"/>
  <text class="text" x="995" y="621" text-anchor="middle">事件完成</text>
  <text class="small" x="995" y="644" text-anchor="middle">result 或 error</text>

  <rect class="box box-green" x="1180" y="110" width="230" height="96"/>
  <text class="text" x="1295" y="141" text-anchor="middle">Local Action Service</text>
  <text class="small" x="1295" y="164" text-anchor="middle">能力与范围校验</text>
  <text class="small" x="1295" y="184" text-anchor="middle">存储 / 配置 / 渲染 / API</text>

  <rect class="box box-green" x="1180" y="260" width="230" height="84"/>
  <text class="text" x="1295" y="291" text-anchor="middle">Scheduler</text>
  <text class="small" x="1295" y="314" text-anchor="middle">UpsertTask / tick</text>

  <rect class="box box-green" x="1180" y="405" width="230" height="94"/>
  <text class="text" x="1295" y="436" text-anchor="middle">出站限流</text>
  <text class="small" x="1295" y="459" text-anchor="middle">按插件与目标排队</text>
  <text class="small" x="1295" y="479" text-anchor="middle">含冷却提示与菜单回复</text>

  <rect class="box box-green" x="1180" y="560" width="230" height="104"/>
  <text class="text" x="1295" y="591" text-anchor="middle">Adapter Send</text>
  <text class="small" x="1295" y="614" text-anchor="middle">message.send / reply</text>
  <text class="small" x="1295" y="634" text-anchor="middle">reply target cache</text>
  <text class="small" x="1295" y="654" text-anchor="middle">WS 或 http_api</text>

  <path class="arrow" d="M155 182 L155 230"/>
  <path class="arrow" d="M250 278 L340 153"/>
  <path class="arrow" d="M435 196 L435 245"/>
  <path class="arrow" d="M435 331 L435 380"/>
  <path class="arrow" d="M435 476 L435 525"/>
  <path class="arrow" d="M530 576 L620 153"/>
  <path class="arrow" d="M715 196 L715 245"/>
  <path class="arrow" d="M715 331 L715 380"/>
  <path class="arrow" d="M810 436 L900 291"/>
  <path class="arrow" d="M995 337 L995 400"/>
  <path class="arrow" d="M1090 446 L1180 158"/>
  <path class="arrow" d="M1090 446 L1180 452"/>
  <path class="arrow" d="M1295 499 L1295 560"/>
  <path class="arrow" d="M1180 612 L250 796"/>

  <path class="muted-arrow" d="M435 627 L435 680"/>
  <path class="muted-arrow" d="M530 722 L1180 452"/>
  <path class="muted-arrow" d="M1295 206 L1295 260"/>
  <path class="muted-arrow" d="M1180 302 L810 633"/>
  <path class="muted-arrow" d="M810 633 L900 446"/>
  <path class="muted-arrow" d="M995 492 L995 590"/>

  <text class="label" x="536" y="552">通过</text>
  <text class="label" x="538" y="704">内置菜单</text>
  <text class="label" x="1116" y="422">message.send / reply</text>
  <text class="label" x="1116" y="142">local action</text>
  <text class="label" x="1010" y="574">result / error</text>
</svg>
