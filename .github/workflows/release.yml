name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-full:
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            artifact_id: windows-x64-full
            server_bin: dist/server/raylea-server.exe
            launcher_bundle: launcher/dist/package/win-unpacked
            archive_suffix: .zip
          - runner: ubuntu-latest
            artifact_id: linux-x64-full
            server_bin: dist/server/raylea-server
            launcher_bundle: launcher/dist/package/linux-unpacked
            archive_suffix: .tar.gz
          - runner: macos-14
            artifact_id: macos-arm64-full
            server_bin: dist/server/raylea-server
            launcher_bundle: launcher/dist/package/mac-arm64/RayleaLauncher.app
            archive_suffix: .tar.gz
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build server
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/server
          if [ "${{ matrix.artifact_id }}" = "windows-x64-full" ]; then
            (cd server && go build -o ../dist/server/raylea-server.exe ./cmd/raylea-server)
          else
            (cd server && go build -o ../dist/server/raylea-server ./cmd/raylea-server)
          fi

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: pnpm build

      - name: Install launcher dependencies
        working-directory: launcher
        run: pnpm install --frozen-lockfile

      - name: Run launcher tests
        working-directory: launcher
        run: pnpm test

      - name: Build launcher
        working-directory: launcher
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm build

      - name: Package full artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          RELEASE_NOTES_REF="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          python scripts/release/package_artifact.py \
            --artifact-id "${{ matrix.artifact_id }}" \
            --version "$VERSION" \
            --git-commit "$GIT_COMMIT" \
            --release-notes-ref "$RELEASE_NOTES_REF" \
            --server-bin "${{ matrix.server_bin }}" \
            --launcher-bundle "${{ matrix.launcher_bundle }}" \
            --web-dist web/dist \
            --builtin-dir plugins/builtin \
            --deps-dir .deps \
            --templates-dir templates \
            --default-config config/default.yaml \
            --output-dir dist/release \
            --run-smoke \
            --run-recovery-drill \
            --run-self-host-smoke \
            --repository "$GITHUB_REPOSITORY" \
            --download-dir dist/release/recovery-bootstrap \
            --observation-window-seconds 300 \
            --window-seconds 600 \
            --probe-interval-seconds 30

      - name: Upload full release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_id }}
          path: |
            dist/release/RayleaBot-v*-${{ matrix.artifact_id }}${{ matrix.archive_suffix }}
            dist/release/RayleaBot-v*-${{ matrix.artifact_id }}${{ matrix.archive_suffix }}.artifact.json

  build-linux-server:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build server
        run: |
          mkdir -p dist/server
          (cd server && go build -o ../dist/server/raylea-server ./cmd/raylea-server)

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: pnpm build

      - name: Package linux server artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          RELEASE_NOTES_REF="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          python scripts/release/package_artifact.py \
            --artifact-id linux-x64-server \
            --version "$VERSION" \
            --git-commit "$GIT_COMMIT" \
            --release-notes-ref "$RELEASE_NOTES_REF" \
            --server-bin dist/server/raylea-server \
            --web-dist web/dist \
            --builtin-dir plugins/builtin \
            --deps-dir .deps \
            --templates-dir templates \
            --default-config config/default.yaml \
            --systemd-file packaging/systemd/rayleabot.service \
            --output-dir dist/release \
            --run-smoke \
            --run-recovery-drill \
            --run-self-host-smoke \
            --repository "$GITHUB_REPOSITORY" \
            --download-dir dist/release/recovery-bootstrap \
            --observation-window-seconds 300 \
            --window-seconds 600 \
            --probe-interval-seconds 30

      - name: Upload linux server release artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-server
          path: |
            dist/release/RayleaBot-v*-linux-x64-server.tar.gz
            dist/release/RayleaBot-v*-linux-x64-server.tar.gz.artifact.json

  publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs:
      - build-full
      - build-linux-server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/downloads

      - name: Generate release metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          CONFIG_SCHEMA_VERSION="$(python -c "import json; print(json.load(open('contracts/config.user.schema.json', encoding='utf-8'))['properties']['schema_version']['const'])")"
          DB_SCHEMA_VERSION="$(python -c "from pathlib import Path; import re; text = Path('server/internal/storage/version.go').read_text(encoding='utf-8'); print(re.search(r'return \"([^\"]+)\"', text).group(1))")"
          RELEASE_NOTES_REF="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}"
          python scripts/release/release_tool.py metadata \
            --version "$VERSION" \
            --git-commit "$GIT_COMMIT" \
            --config-schema-version "$CONFIG_SCHEMA_VERSION" \
            --db-schema-version "$DB_SCHEMA_VERSION" \
            --plugin-protocol-version "1" \
            --release-notes-ref "$RELEASE_NOTES_REF" \
            --deps-manifest .deps/manifest.json \
            --sidecar dist/downloads/windows-x64-full/RayleaBot-v${VERSION}-windows-x64-full.zip.artifact.json \
            --sidecar dist/downloads/linux-x64-full/RayleaBot-v${VERSION}-linux-x64-full.tar.gz.artifact.json \
            --sidecar dist/downloads/macos-arm64-full/RayleaBot-v${VERSION}-macos-arm64-full.tar.gz.artifact.json \
            --sidecar dist/downloads/linux-x64-server/RayleaBot-v${VERSION}-linux-x64-server.tar.gz.artifact.json \
            --output-dir dist/release
          python scripts/release/release_tool.py verify \
            --manifest dist/release/release_manifest.json \
            --checksums dist/release/SHA256SUMS.txt \
            --artifact-dir dist/downloads/windows-x64-full
          python scripts/release/release_tool.py verify \
            --manifest dist/release/release_manifest.json \
            --checksums dist/release/SHA256SUMS.txt \
            --artifact-dir dist/downloads/linux-x64-full
          python scripts/release/release_tool.py verify \
            --manifest dist/release/release_manifest.json \
            --checksums dist/release/SHA256SUMS.txt \
            --artifact-dir dist/downloads/macos-arm64-full
          python scripts/release/release_tool.py verify \
            --manifest dist/release/release_manifest.json \
            --checksums dist/release/SHA256SUMS.txt \
            --artifact-dir dist/downloads/linux-x64-server

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/downloads/windows-x64-full/*.zip
            dist/downloads/linux-x64-full/*.tar.gz
            dist/downloads/macos-arm64-full/*.tar.gz
            dist/downloads/linux-x64-server/*.tar.gz
            dist/release/release_manifest.json
            dist/release/SHA256SUMS.txt
