name: lint

on:
  pull_request:
    paths:
      - "server/**"
      - "web/**"
      - "launcher/**"
      - "scripts/**"
      - "packaging/**"
      - "templates/**"
      - ".deps/manifest.json"
      - ".github/workflows/lint.yml"
      - ".github/workflows/release.yml"
      - ".github/workflows/self-host-smoke.yml"
      - "server/go.mod"
      - "server/go.sum"
      - "web/package.json"
      - "web/pnpm-lock.yaml"
      - "launcher/package.json"
      - "launcher/pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: lint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  server-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run go test
        working-directory: server
        run: go test ./...

      - name: Build server shell
        working-directory: server
        run: go build ./cmd/raylea-server

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: server
          args: --timeout=10m --disable-all -E errcheck -E staticcheck -E govet -E unused -E ineffassign ./...

      - name: Check sqlc generated code drift
        working-directory: server
        run: |
          go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0
          sqlc diff

      - name: Run Go coverage gate
        shell: bash
        working-directory: server
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '/cmd/raylea-server$')
          if [ "${#packages[@]}" -eq 0 ]; then
            echo "no packages selected for coverage"
            exit 1
          fi
          go test -covermode=atomic -coverprofile=coverage.out "${packages[@]}"
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
          echo "Go coverage total: ${total}%"
          python - <<'PY' "$total"
          import sys
          total = float(sys.argv[1])
          threshold = 55.0
          if total < threshold:
              raise SystemExit(f"Go coverage {total:.1f}% is below required {threshold:.1f}%")
          print(f"Go coverage gate passed: {total:.1f}%")
          PY

      - name: Run govulncheck
        shell: bash
        working-directory: server
        run: |
          set -euo pipefail
          tmp_bin="$(mktemp)"
          trap 'rm -f "$tmp_bin"' EXIT
          go build -o "$tmp_bin" ./cmd/raylea-server
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 -mode=binary "$tmp_bin"

  web-core:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Check generated types drift
        working-directory: web
        run: |
          pnpm generate:types
          git diff --exit-code src/types/generated.ts

      - name: Run web typecheck
        working-directory: web
        run: pnpm run typecheck

      - name: Run web coverage gate
        working-directory: web
        run: pnpm test:coverage

      - name: Build web shell
        working-directory: web
        run: pnpm build

  launcher-core-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install launcher dependencies
        working-directory: launcher
        run: pnpm install --frozen-lockfile

      - name: Run launcher typecheck
        working-directory: launcher
        run: pnpm run typecheck

      - name: Run launcher coverage gate
        working-directory: launcher
        run: pnpm test:coverage

      - name: Build launcher shell
        working-directory: launcher
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm build

  pr-smoke-light:
    runs-on: ubuntu-latest
    needs:
      - server-core
      - web-core
      - launcher-core-linux

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mocked web smoke
        working-directory: web
        run: pnpm test:e2e

      - name: Run release helper tests
        run: python -m unittest discover -s scripts/release/tests

  dependency-audit-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web dependency audit
        working-directory: web
        run: pnpm audit --prod --audit-level=high --registry=https://registry.npmjs.org

      - name: Install launcher dependencies
        working-directory: launcher
        run: pnpm install --frozen-lockfile

      - name: Run launcher dependency audit
        working-directory: launcher
        run: pnpm audit --prod --audit-level=high --registry=https://registry.npmjs.org
