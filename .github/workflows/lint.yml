name: lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate repository baseline
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import xml.etree.ElementTree as ET

          root = Path('.')

          required_dirs = [
              root / 'docs' / 'engineering',
              root / 'docs' / 'architecture',
              root / 'docs' / 'dev',
              root / 'docs' / 'plugin',
              root / 'docs' / 'plugin' / 'sdk',
              root / 'docs' / 'user',
              root / 'docs' / 'release',
              root / 'fixtures',
              root / 'examples',
              root / '.deps',
              root / 'server',
              root / 'web',
              root / 'launcher',
              root / '.github' / 'workflows',
          ]

          required_files = [
              root / 'AGENTS.md',
              root / 'docs' / 'engineering' / 'baseline.md',
              root / 'docs' / 'engineering' / 'implementation-order.md',
              root / '.deps' / 'manifest.json',
              root / 'server' / 'go.mod',
              root / 'server' / 'go.sum',
              root / 'web' / 'package.json',
              root / 'web' / 'pnpm-lock.yaml',
              root / 'launcher' / 'global.json',
              root / 'launcher' / 'Directory.Packages.props',
          ]

          for path in required_dirs:
              if not path.is_dir():
                  raise SystemExit(f'missing directory: {path}')

          for path in required_files:
              if not path.exists():
                  raise SystemExit(f'missing file: {path}')

          go_mod = (root / 'server' / 'go.mod').read_text(encoding='utf-8')
          if 'module rayleabot/server' not in go_mod:
              raise SystemExit('server/go.mod must use module path rayleabot/server')
          if 'go 1.25.8' not in go_mod:
              raise SystemExit('server/go.mod must pin Go 1.25.8')
          if 'toolchain go1.25.8' not in go_mod:
              raise SystemExit('server/go.mod must pin toolchain go1.25.8')

          package_json = json.loads((root / 'web' / 'package.json').read_text(encoding='utf-8'))
          if package_json.get('packageManager') != 'pnpm@10.32.1':
              raise SystemExit('web/package.json packageManager must be pnpm@10.32.1')
          engines = package_json.get('engines', {})
          if engines.get('node') != '24.14.0':
              raise SystemExit('web/package.json engines.node must be 24.14.0')
          if engines.get('pnpm') != '10.32.1':
              raise SystemExit('web/package.json engines.pnpm must be 10.32.1')

          global_json = json.loads((root / 'launcher' / 'global.json').read_text(encoding='utf-8'))
          sdk = global_json.get('sdk', {})
          if sdk.get('version') != '10.0.103':
              raise SystemExit('launcher/global.json sdk.version must be 10.0.103')
          if sdk.get('rollForward') != 'latestPatch':
              raise SystemExit('launcher/global.json sdk.rollForward must be latestPatch')

          props_root = ET.parse(root / 'launcher' / 'Directory.Packages.props').getroot()
          versions = [
              item.attrib.get('Version')
              for item in props_root.findall('.//PackageVersion')
          ]
          if not versions or any(v != '11.3.12' for v in versions):
              raise SystemExit('launcher/Directory.Packages.props must centrally pin Avalonia packages to 11.3.12')

          baseline = (root / 'docs' / 'engineering' / 'baseline.md').read_text(encoding='utf-8')
          expected_snippets = [
              'Go `1.25.8`',
              'Node.js `24.14.0`',
              '`pnpm 10.32.1`',
              'Python `3.12.13`',
              '`10.0.103`',
              '`11.3.12`',
              '`127.0.0.1`',
              '`onebot.ws_url`'
          ]
          for snippet in expected_snippets:
              if snippet not in baseline:
                  raise SystemExit(f'baseline.md missing expected snippet: {snippet}')

          command_snippet = 'go build ./cmd/raylea-server'
          docs_to_check = {
              'AGENTS.md': (root / 'AGENTS.md').read_text(encoding='utf-8'),
              'docs/engineering/baseline.md': baseline,
              'docs/engineering/implementation-order.md': (root / 'docs' / 'engineering' / 'implementation-order.md').read_text(encoding='utf-8'),
          }
          for label, text in docs_to_check.items():
              if command_snippet not in text:
                  raise SystemExit(f'{label} must mention the server build command: {command_snippet}')

          manifest = json.loads((root / '.deps' / 'manifest.json').read_text(encoding='utf-8'))
          if manifest.get('manifest_version') != 1:
              raise SystemExit('.deps/manifest.json manifest_version must be 1')
          resource_ids = {item.get('id') for item in manifest.get('resources', [])}
          for expected in [
              'chromium-windows-x64',
              'chromium-linux-x64',
              'python-windows-x64',
              'python-linux-x64',
              'nodejs-windows-x64',
              'nodejs-linux-x64',
          ]:
              if expected not in resource_ids:
                  raise SystemExit(f'.deps/manifest.json missing resource: {expected}')

          print('baseline validation passed')
          PY

  server-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Run go test
        working-directory: server
        run: go test ./...

      - name: Build server shell
        working-directory: server
        run: go build ./cmd/raylea-server

  ci-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web unit tests
        working-directory: web
        run: pnpm test

      - name: Build web shell
        working-directory: web
        run: pnpm build

  smoke-pr:
    runs-on: ubuntu-latest
    needs:
      - server-smoke
      - ci-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mocked web smoke
        working-directory: web
        run: pnpm test:e2e

      - name: Run release helper tests
        run: python -m unittest discover -s scripts/release/tests

      - name: Build linux server package inputs
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/server
          (cd server && go build -o ../dist/server/raylea-server ./cmd/raylea-server)

      - name: Build web dist for packaging
        working-directory: web
        run: pnpm build

      - name: Package linux-x64-server smoke artifact
        shell: bash
        run: |
          set -euo pipefail
          VERSION="0.0.0-smoke"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          RELEASE_NOTES_REF="https://github.com/${GITHUB_REPOSITORY}/releases"
          python scripts/release/release_tool.py package \
            --artifact-id linux-x64-server \
            --version "$VERSION" \
            --git-commit "$GIT_COMMIT" \
            --release-notes-ref "$RELEASE_NOTES_REF" \
            --server-bin dist/server/raylea-server \
            --web-dist web/dist \
            --builtin-dir plugins/builtin \
            --deps-dir .deps \
            --default-config config/default.yaml \
            --systemd-file packaging/systemd/rayleabot.service \
            --output-dir dist/release
          python scripts/release/smoke_release.py \
            --artifact-id linux-x64-server \
            --archive dist/release/RayleaBot-v${VERSION}-linux-x64-server.tar.gz

      - name: Generate and verify smoke release metadata
        shell: bash
        run: |
          set -euo pipefail
          VERSION="0.0.0-smoke"
          GIT_COMMIT="$(git rev-parse --short HEAD)"
          CONFIG_SCHEMA_VERSION="$(python -c "import json; print(json.load(open('contracts/config.user.schema.json', encoding='utf-8'))['properties']['schema_version']['const'])")"
          DB_SCHEMA_VERSION="$(python -c "from pathlib import Path; print(len(list(Path('server/internal/storage/migrations').glob('*.sql'))))")"
          RELEASE_NOTES_REF="https://github.com/${GITHUB_REPOSITORY}/releases"
          python scripts/release/release_tool.py metadata \
            --version "$VERSION" \
            --git-commit "$GIT_COMMIT" \
            --config-schema-version "$CONFIG_SCHEMA_VERSION" \
            --db-schema-version "$DB_SCHEMA_VERSION" \
            --plugin-protocol-version "1" \
            --release-notes-ref "$RELEASE_NOTES_REF" \
            --deps-manifest .deps/manifest.json \
            --sidecar dist/release/RayleaBot-v${VERSION}-linux-x64-server.tar.gz.artifact.json \
            --output-dir dist/release/metadata
          python scripts/release/release_tool.py verify \
            --manifest dist/release/metadata/release_manifest.json \
            --checksums dist/release/metadata/SHA256SUMS.txt \
            --artifact-dir dist/release

  ci-launcher:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: launcher/global.json

      - name: Run launcher tests
        run: dotnet test ./launcher

      - name: Publish launcher shell
        run: dotnet publish ./launcher -c Release
