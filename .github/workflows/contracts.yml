name: contracts

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: contracts-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  baseline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate repository baseline
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path(".")

          required_dirs = [
              root / "docs" / "engineering",
              root / "docs" / "architecture",
              root / "docs" / "dev",
              root / "docs" / "plugin",
              root / "docs" / "plugin" / "sdk",
              root / "docs" / "user",
              root / "docs" / "release",
              root / "fixtures",
              root / "examples",
              root / ".deps",
              root / "server",
              root / "web",
              root / "launcher",
              root / ".github" / "workflows",
          ]

          required_files = [
              root / "AGENTS.md",
              root / "docs" / "engineering" / "baseline.md",
              root / "docs" / "engineering" / "implementation-order.md",
              root / ".deps" / "manifest.json",
              root / "server" / "go.mod",
              root / "server" / "go.sum",
              root / "web" / "package.json",
              root / "web" / "pnpm-lock.yaml",
              root / "launcher" / "package.json",
              root / "launcher" / "pnpm-lock.yaml",
          ]

          for path in required_dirs:
              if not path.is_dir():
                  raise SystemExit(f"missing directory: {path}")

          for path in required_files:
              if not path.exists():
                  raise SystemExit(f"missing file: {path}")

          go_mod = (root / "server" / "go.mod").read_text(encoding="utf-8")
          if "module github.com/RayleaBot/RayleaBot/server" not in go_mod:
              raise SystemExit("server/go.mod must use module path github.com/RayleaBot/RayleaBot/server")
          if "go 1.25.8" not in go_mod:
              raise SystemExit("server/go.mod must pin Go 1.25.8")

          for package_path in [root / "web" / "package.json", root / "launcher" / "package.json"]:
              package_json = json.loads(package_path.read_text(encoding="utf-8"))
              if package_json.get("packageManager") != "pnpm@10.32.1":
                  raise SystemExit(f"{package_path} packageManager must be pnpm@10.32.1")
              engines = package_json.get("engines", {})
              if engines.get("node") != "24.14.0":
                  raise SystemExit(f"{package_path} engines.node must be 24.14.0")
              if engines.get("pnpm") != "10.32.1":
                  raise SystemExit(f"{package_path} engines.pnpm must be 10.32.1")

          launcher_package = json.loads((root / "launcher" / "package.json").read_text(encoding="utf-8"))
          launcher_deps = launcher_package.get("dependencies", {})
          launcher_dev_deps = launcher_package.get("devDependencies", {})
          if launcher_deps.get("react") != "18.3.1":
              raise SystemExit("launcher/package.json must pin react 18.3.1")
          if launcher_deps.get("@fluentui/react-components") != "9.73.5":
              raise SystemExit("launcher/package.json must pin @fluentui/react-components 9.73.5")
          if launcher_dev_deps.get("electron") != "41.1.0":
              raise SystemExit("launcher/package.json must pin electron 41.1.0")
          if launcher_dev_deps.get("electron-builder") != "26.8.1":
              raise SystemExit("launcher/package.json must pin electron-builder 26.8.1")

          baseline = (root / "docs" / "engineering" / "baseline.md").read_text(encoding="utf-8")
          expected_snippets = [
              "Go `1.25.8`",
              "Node.js `24.14.0`",
              "`pnpm 10.32.1`",
              "Python `3.12.13`",
              "Electron `41.1.0`",
              "`127.0.0.1`",
              "`onebot.reverse_ws.url`",
              "`onebot.forward_ws.url`",
              "`onebot.http_api.url`",
              "`onebot.webhook.url`",
          ]
          for snippet in expected_snippets:
              if snippet not in baseline:
                  raise SystemExit(f"baseline.md missing expected snippet: {snippet}")

          docs_to_check = {
              "AGENTS.md": (root / "AGENTS.md").read_text(encoding="utf-8"),
              "docs/engineering/baseline.md": baseline,
              "CLAUDE.md": (root / "CLAUDE.md").read_text(encoding="utf-8"),
          }
          required_commands = [
              "go build ./cmd/raylea-server",
              "pnpm install --frozen-lockfile",
              "pnpm test",
              "pnpm build",
          ]
          for label, text in docs_to_check.items():
              for command in required_commands:
                  if command not in text:
                      raise SystemExit(f"{label} must mention command: {command}")

          manifest = json.loads((root / ".deps" / "manifest.json").read_text(encoding="utf-8"))
          if manifest.get("manifest_version") != 3:
              raise SystemExit(".deps/manifest.json manifest_version must be 3")
          resources = manifest.get("resources", [])
          resource_ids = {item.get("id") for item in manifest.get("resources", [])}
          for expected in [
              "chromium-windows-x64",
              "chromium-linux-x64",
              "chromium-macos-arm64",
              "python-windows-x64",
              "python-linux-x64",
              "python-macos-arm64",
              "nodejs-windows-x64",
              "nodejs-linux-x64",
              "nodejs-macos-arm64",
          ]:
              if expected not in resource_ids:
                  raise SystemExit(f".deps/manifest.json missing resource: {expected}")

          for resource in resources:
              if not isinstance(resource, dict):
                  raise SystemExit(".deps/manifest.json resources must contain objects only")
              sources = resource.get("sources")
              sha256 = str(resource.get("sha256", "")).strip().lower()
              archive_format = str(resource.get("archive_format", "")).strip()
              entrypoints = resource.get("entrypoints")
              if not isinstance(sources, list) or len(sources) == 0:
                  raise SystemExit(f".deps/manifest.json resource must include sources: {resource}")
              seen_urls = set()
              for source in sources:
                  if not isinstance(source, dict):
                      raise SystemExit(f".deps/manifest.json resource source must be an object: {resource}")
                  url = str(source.get("url", "")).strip()
                  kind = str(source.get("kind", "")).strip()
                  if not url.startswith("https://") or "TODO(" in url:
                      raise SystemExit(f".deps/manifest.json resource has invalid source url: {resource}")
                  if kind not in {"upstream", "mirror"}:
                      raise SystemExit(f".deps/manifest.json resource has invalid source kind: {resource}")
                  if url in seen_urls:
                      raise SystemExit(f".deps/manifest.json resource has duplicate source url: {resource}")
                  seen_urls.add(url)
              if len(sha256) != 64 or any(ch not in "0123456789abcdef" for ch in sha256):
                  raise SystemExit(f".deps/manifest.json resource has invalid sha256: {resource}")
              if archive_format not in {"zip", "tar.gz", "tar.xz"}:
                  raise SystemExit(f".deps/manifest.json resource has invalid archive_format: {resource}")
              if not isinstance(entrypoints, dict) or not entrypoints:
                  raise SystemExit(f".deps/manifest.json resource must include entrypoints: {resource}")

          print("baseline validation passed")
          PY

  validate-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate contracts
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          root = Path('.')
          contracts = root / 'contracts'
          fixtures = root / 'fixtures'
          examples = root / 'examples'

          required_files = {
              'README.md',
              'backup-manifest.schema.json',
              'deps-manifest.schema.json',
              'plugin-info.schema.json',
              'plugin-protocol.schema.json',
              'web-api.openapi.yaml',
              'websocket-events.yaml',
              'config.user.schema.json',
              'error-codes.yaml',
              'release-manifest.schema.json',
              'cli-commands.yaml',
          }

          existing = {p.name for p in contracts.iterdir() if p.is_file()}
          missing = required_files - existing
          if missing:
              raise SystemExit(f'missing contract files: {sorted(missing)}')

          required_fixture_dirs = [
              fixtures / 'config',
              fixtures / 'backup-manifest',
              fixtures / 'deps-manifest',
              fixtures / 'web-api',
              fixtures / 'websocket',
              fixtures / 'errors',
              fixtures / 'plugin-info',
              fixtures / 'plugin-protocol',
              fixtures / 'release-manifest',
              fixtures / 'cli',
          ]
          required_example_files = [
              examples / 'plugins' / 'hello-python' / 'info.json',
              examples / 'plugins' / 'hello-node' / 'info.json',
              examples / 'plugins' / 'example-permission-scope' / 'info.json',
          ]
          for path in required_fixture_dirs:
              if not path.is_dir():
                  raise SystemExit(f'missing fixture directory: {path}')

          for path in required_example_files:
              if not path.is_file():
                  raise SystemExit(f'missing example manifest: {path}')

          for path in required_fixture_dirs:
              names = {p.name for p in path.iterdir() if p.is_file()}
              for prefix in ['ok.', 'invalid.', 'edge.']:
                  if not any(name.startswith(prefix) for name in names):
                      raise SystemExit(f'fixture category {path} must contain at least one file starting with {prefix}')

          def load_json(path: Path):
              with path.open('r', encoding='utf-8') as f:
                  return json.load(f)

          def load_yaml(path: Path):
              with path.open('r', encoding='utf-8') as f:
                  return yaml.safe_load(f)

          def load_any(path: Path):
              if path.suffix == '.json':
                  return load_json(path)
              if path.suffix in {'.yaml', '.yml'}:
                  return load_yaml(path)
              raise SystemExit(f'unsupported fixture extension: {path}')

          def collect_fixture_refs(document, refs):
              if isinstance(document, dict):
                  for key, value in document.items():
                      if key in {'x-fixtures', 'example_ref'}:
                          if isinstance(value, list):
                              refs.extend(value)
                          else:
                              refs.append(value)
                      collect_fixture_refs(value, refs)
              elif isinstance(document, list):
                  for item in document:
                      collect_fixture_refs(item, refs)

          for path in fixtures.rglob('*'):
              if path.is_file() and path.suffix in {'.json', '.yaml', '.yml'}:
                  load_any(path)

          for path in required_example_files:
              load_json(path)

          plugin_info = load_json(contracts / 'plugin-info.schema.json')
          plugin_protocol = load_json(contracts / 'plugin-protocol.schema.json')
          config_schema = load_json(contracts / 'config.user.schema.json')
          deps_manifest_schema = load_json(contracts / 'deps-manifest.schema.json')
          release_schema = load_json(contracts / 'release-manifest.schema.json')
          web_api = load_yaml(contracts / 'web-api.openapi.yaml')
          websocket_events = load_yaml(contracts / 'websocket-events.yaml')
          error_codes = load_yaml(contracts / 'error-codes.yaml')

          def resolve_component_schema(ref_or_schema, label):
              schema_obj = ref_or_schema
              if isinstance(schema_obj, dict) and '$ref' in schema_obj:
                  ref = schema_obj['$ref']
                  prefix = '#/components/schemas/'
                  if not ref.startswith(prefix):
                      raise SystemExit(f'{label} must use a local components schema ref; got {ref}')
                  schema_name = ref[len(prefix):]
                  schema_obj = web_api['components']['schemas'].get(schema_name)
                  if not isinstance(schema_obj, dict):
                      raise SystemExit(f'web-api.openapi.yaml missing components schema: {schema_name}')
              if not isinstance(schema_obj, dict):
                  raise SystemExit(f'{label} must resolve to an object schema')
              return schema_obj

          def schema_properties(ref_or_schema, label):
              schema_obj = resolve_component_schema(ref_or_schema, label)
              properties = schema_obj.get('properties')
              if not isinstance(properties, dict):
                  raise SystemExit(f'{label} must declare properties')
              return schema_obj, properties

          if deps_manifest_schema.get('type') != 'object':
              raise SystemExit('deps-manifest.schema.json must define an object schema')
          if deps_manifest_schema.get('properties', {}).get('manifest_version', {}).get('const') != 3:
              raise SystemExit('deps-manifest.schema.json manifest_version must be fixed to 3')
          resource_base = deps_manifest_schema.get('$defs', {}).get('resourceBase', {})
          for field in ['id', 'kind', 'version', 'platform', 'sources', 'sha256', 'archive_format', 'entrypoints']:
              if field not in resource_base.get('required', []):
                  raise SystemExit(f'deps-manifest.schema.json resourceBase missing required field: {field}')
          source_entry = deps_manifest_schema.get('$defs', {}).get('sourceEntry', {})
          if set(source_entry.get('required', [])) != {'url', 'kind'}:
              raise SystemExit('deps-manifest.schema.json sourceEntry must require url and kind')
          if set(source_entry.get('properties', {}).get('kind', {}).get('enum', [])) != {'upstream', 'mirror'}:
              raise SystemExit('deps-manifest.schema.json sourceEntry kind enum mismatch')
          archive_formats = set(resource_base.get('properties', {}).get('archive_format', {}).get('enum', []))
          if archive_formats != {'zip', 'tar.gz', 'tar.xz'}:
              raise SystemExit(f'deps-manifest.schema.json archive_format enum mismatch: {sorted(archive_formats)}')
          entrypoint_props = set(deps_manifest_schema.get('$defs', {}).get('entrypoints', {}).get('properties', {}).keys())
          if entrypoint_props != {'browser', 'python', 'pip', 'node', 'npm'}:
              raise SystemExit(f'deps-manifest.schema.json entrypoints keys mismatch: {sorted(entrypoint_props)}')

          if plugin_info.get('type') != 'object':
              raise SystemExit('plugin-info.schema.json must define an object schema')
          for field in ['id', 'name', 'version', 'manifest_version', 'plugin_protocol_version', 'type', 'runtime', 'entry', 'license']:
              if field not in plugin_info.get('required', []):
                  raise SystemExit(f'plugin-info.schema.json missing required field: {field}')
          info_props = plugin_info.get('properties', {})
          for field in ['description', 'author', 'sdk_min_version', 'runtime_version', 'min_core_version', 'data_schema_version', 'concurrency', 'role', 'default_config', 'capabilities', 'permissions', 'dependencies', 'require_install_scripts', 'platforms', 'render_templates']:
              if field not in info_props:
                  raise SystemExit(f'plugin-info.schema.json missing property: {field}')
          if 'authors' in info_props:
              raise SystemExit('plugin-info.schema.json must not define authors')
          if info_props['runtime'].get('type') != 'string':
              raise SystemExit('plugin-info.schema.json runtime must remain a string field')
          if set(info_props['type'].get('enum', [])) != {'managed_runtime', 'dev_source'}:
              raise SystemExit('plugin-info.schema.json type must only allow managed_runtime and dev_source')
          if set(info_props['runtime'].get('enum', [])) != {'python', 'nodejs'}:
              raise SystemExit('plugin-info.schema.json runtime must only allow python and nodejs')
          role_enum = set(info_props['role'].get('enum', []))
          if role_enum != {'builtin', 'user', 'example', 'dev'}:
              raise SystemExit(f'plugin-info.schema.json role must exactly allow builtin/user/example/dev; got {sorted(role_enum)}')
          default_config = info_props['default_config']
          if default_config.get('type') != 'object' or default_config.get('additionalProperties') is not True:
              raise SystemExit('plugin-info.schema.json default_config must be a free-form object')
          scope_props = info_props['permissions']['properties']['scopes']['properties']
          for scope in ['http_hosts', 'storage_roots', 'webhooks']:
              if scope not in scope_props:
                  raise SystemExit(f'plugin-info.schema.json permissions.scopes missing {scope}')
          if set(scope_props['storage_roots']['items'].get('enum', [])) != {'plugin_data'}:
              raise SystemExit('plugin-info.schema.json storage_roots must only allow plugin_data')

          proto_defs = plugin_protocol.get('$defs', {})
          expected_proto_defs = {
              'action',
              'action_config_read',
              'action_config_read_data',
              'action_config_write',
              'action_config_write_data',
              'action_event_expose_webhook',
              'action_event_expose_webhook_data',
              'action_governance_blacklist_read',
              'action_governance_blacklist_write',
              'action_governance_blacklist_write_data',
              'action_governance_command_policy_read',
              'action_governance_read_data',
              'action_governance_whitelist_read',
              'action_governance_whitelist_write',
              'action_governance_whitelist_write_data',
              'action_http_request',
              'action_http_request_base64_body_data',
              'action_http_request_no_body_data',
              'action_http_request_text_body_data',
              'action_logger_write',
              'action_logger_write_data',
              'action_message_reply',
              'action_message_reply_data',
              'action_message_send',
              'action_message_send_data',
              'action_onebot_family',
              'action_onebot_family_data',
              'action_plugin_list',
              'action_plugin_list_data',
              'action_provider_extension',
              'action_render_image',
              'action_render_image_data',
              'action_scheduler_create',
              'action_scheduler_create_data',
              'action_secret_read',
              'action_secret_read_data',
              'action_storage_file',
              'action_storage_file_delete_data',
              'action_storage_file_list_data',
              'action_storage_file_read_data',
              'action_storage_file_write_base64_data',
              'action_storage_file_write_text_data',
              'action_storage_kv',
              'action_storage_kv_delete_data',
              'action_storage_kv_get_data',
              'action_storage_kv_list_data',
              'action_storage_kv_set_data',
              'base_capability_name',
              'capability_name',
              'common',
              'error',
              'event',
              'init',
              'init_ack',
              'init_progress',
              'onebot_action_kind',
              'outbound_message',
              'outbound_message_non_reply_segment',
              'outbound_message_segment',
              'outbound_message_segment_at',
              'outbound_message_segment_at_all',
              'outbound_message_segment_contact',
              'outbound_message_segment_dice',
              'outbound_message_segment_face',
              'outbound_message_segment_file',
              'outbound_message_segment_forward',
              'outbound_message_segment_image',
              'outbound_message_segment_json',
              'outbound_message_segment_keyboard',
              'outbound_message_segment_markdown',
              'outbound_message_segment_mface',
              'outbound_message_segment_music',
              'outbound_message_segment_node',
              'outbound_message_segment_passthrough_media',
              'outbound_message_segment_passthrough_payload',
              'outbound_message_segment_poke',
              'outbound_message_segment_record',
              'outbound_message_segment_reply',
              'outbound_message_segment_rps',
              'outbound_message_segment_shake',
              'outbound_message_segment_text',
              'outbound_message_segment_video',
              'outbound_message_segment_xml',
              'ping',
              'pong',
              'provider_extension_action_kind',
              'result',
              'shutdown',
          }
          if set(proto_defs.keys()) != expected_proto_defs:
              raise SystemExit(f'plugin-protocol.schema.json $defs must exactly match {sorted(expected_proto_defs)}; got {sorted(proto_defs.keys())}')
          message_catalog = plugin_protocol.get('x-message-catalog', [])
          if not message_catalog:
              raise SystemExit('plugin-protocol.schema.json must define x-message-catalog')
          catalog_types = {item.get('type') for item in message_catalog}
          expected_catalog_types = {'init', 'init_progress', 'init_ack', 'event', 'action', 'result', 'error', 'ping', 'pong', 'shutdown'}
          if catalog_types != expected_catalog_types:
              raise SystemExit(f'plugin-protocol.schema.json x-message-catalog must exactly match {sorted(expected_catalog_types)}; got {sorted(catalog_types)}')
          action_oneOf = plugin_protocol['$defs']['action'].get('oneOf', [])
          action_refs = {item.get('$ref', '').split('/')[-1] for item in action_oneOf}
          expected_action_refs = {
              'action_config_read',
              'action_config_write',
              'action_event_expose_webhook',
              'action_governance_blacklist_read',
              'action_governance_blacklist_write',
              'action_governance_command_policy_read',
              'action_governance_whitelist_read',
              'action_governance_whitelist_write',
              'action_http_request',
              'action_logger_write',
              'action_message_reply',
              'action_message_send',
              'action_onebot_family',
              'action_plugin_list',
              'action_provider_extension',
              'action_render_image',
              'action_scheduler_create',
              'action_secret_read',
              'action_storage_file',
              'action_storage_kv',
          }
          if action_refs != expected_action_refs:
              raise SystemExit(f'plugin-protocol.schema.json action oneOf must reference {sorted(expected_action_refs)}; got {sorted(action_refs)}')
          outbound_segment_refs = {item.get('$ref', '').split('/')[-1] for item in plugin_protocol['$defs']['outbound_message_segment'].get('oneOf', [])}
          expected_outbound_segment_refs = {
              'outbound_message_segment_at',
              'outbound_message_segment_at_all',
              'outbound_message_segment_contact',
              'outbound_message_segment_dice',
              'outbound_message_segment_face',
              'outbound_message_segment_file',
              'outbound_message_segment_forward',
              'outbound_message_segment_image',
              'outbound_message_segment_json',
              'outbound_message_segment_keyboard',
              'outbound_message_segment_markdown',
              'outbound_message_segment_mface',
              'outbound_message_segment_music',
              'outbound_message_segment_node',
              'outbound_message_segment_poke',
              'outbound_message_segment_record',
              'outbound_message_segment_reply',
              'outbound_message_segment_rps',
              'outbound_message_segment_shake',
              'outbound_message_segment_text',
              'outbound_message_segment_video',
              'outbound_message_segment_xml',
          }
          if outbound_segment_refs != expected_outbound_segment_refs:
              raise SystemExit(f'plugin-protocol.schema.json outbound_message_segment oneOf must reference {sorted(expected_outbound_segment_refs)}; got {sorted(outbound_segment_refs)}')
          non_reply_refs = {item.get('$ref', '').split('/')[-1] for item in plugin_protocol['$defs']['outbound_message_non_reply_segment'].get('oneOf', [])}
          expected_non_reply_refs = {
              'outbound_message_segment_at',
              'outbound_message_segment_at_all',
              'outbound_message_segment_contact',
              'outbound_message_segment_dice',
              'outbound_message_segment_face',
              'outbound_message_segment_file',
              'outbound_message_segment_forward',
              'outbound_message_segment_image',
              'outbound_message_segment_json',
              'outbound_message_segment_keyboard',
              'outbound_message_segment_markdown',
              'outbound_message_segment_mface',
              'outbound_message_segment_music',
              'outbound_message_segment_node',
              'outbound_message_segment_poke',
              'outbound_message_segment_record',
              'outbound_message_segment_rps',
              'outbound_message_segment_shake',
              'outbound_message_segment_text',
              'outbound_message_segment_video',
              'outbound_message_segment_xml',
          }
          if non_reply_refs != expected_non_reply_refs:
              raise SystemExit(f'plugin-protocol.schema.json outbound_message_non_reply_segment oneOf must reference {sorted(expected_non_reply_refs)}; got {sorted(non_reply_refs)}')
          message_segments = plugin_protocol['$defs']['outbound_message']['properties']['segments']
          if len(message_segments.get('oneOf', [])) != 2:
              raise SystemExit('plugin-protocol.schema.json outbound_message.segments must distinguish plain body arrays from reply-prefixed arrays')
          send_def = plugin_protocol['$defs']['action_message_send']['allOf'][1]
          if send_def['properties']['action'].get('const') != 'message.send':
              raise SystemExit('plugin-protocol.schema.json action_message_send must freeze action const to message.send')
          send_data = send_def['properties']['data']
          if send_data.get('$ref') != '#/$defs/action_message_send_data':
              raise SystemExit('plugin-protocol.schema.json action_message_send.data must reference action_message_send_data')
          send_data_shape = plugin_protocol['$defs']['action_message_send_data']
          if send_data_shape.get('required') != ['target_type', 'target_id', 'message']:
