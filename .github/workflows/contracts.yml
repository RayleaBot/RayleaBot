name: contracts

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-contracts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate contracts
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          import yaml

          root = Path('.')
          contracts = root / 'contracts'
          fixtures = root / 'fixtures'
          examples = root / 'examples'

          required_files = {
              'README.md',
              'plugin-info.schema.json',
              'plugin-protocol.schema.json',
              'web-api.openapi.yaml',
              'websocket-events.yaml',
              'config.user.schema.json',
              'error-codes.yaml',
              'release-manifest.schema.json',
              'cli-commands.yaml',
          }

          existing = {p.name for p in contracts.iterdir() if p.is_file()}
          missing = required_files - existing
          if missing:
              raise SystemExit(f'missing contract files: {sorted(missing)}')

          required_fixture_dirs = [
              fixtures / 'config',
              fixtures / 'web-api',
              fixtures / 'websocket',
              fixtures / 'errors',
              fixtures / 'plugin-info',
              fixtures / 'plugin-protocol',
              fixtures / 'release-manifest',
              fixtures / 'cli',
          ]
          required_example_files = [
              examples / 'plugins' / 'hello-python' / 'info.json',
              examples / 'plugins' / 'hello-node' / 'info.json',
              examples / 'plugins' / 'example-permission-scope' / 'info.json',
          ]
          for path in required_fixture_dirs:
              if not path.is_dir():
                  raise SystemExit(f'missing fixture directory: {path}')

          for path in required_example_files:
              if not path.is_file():
                  raise SystemExit(f'missing example manifest: {path}')

          for path in required_fixture_dirs:
              names = {p.name for p in path.iterdir() if p.is_file()}
              for prefix in ['ok.', 'invalid.', 'edge.']:
                  if not any(name.startswith(prefix) for name in names):
                      raise SystemExit(f'fixture category {path} must contain at least one file starting with {prefix}')

          def load_json(path: Path):
              with path.open('r', encoding='utf-8') as f:
                  return json.load(f)

          def load_yaml(path: Path):
              with path.open('r', encoding='utf-8') as f:
                  return yaml.safe_load(f)

          def load_any(path: Path):
              if path.suffix == '.json':
                  return load_json(path)
              if path.suffix in {'.yaml', '.yml'}:
                  return load_yaml(path)
              raise SystemExit(f'unsupported fixture extension: {path}')

          def collect_fixture_refs(document, refs):
              if isinstance(document, dict):
                  for key, value in document.items():
                      if key in {'x-fixtures', 'example_ref'}:
                          if isinstance(value, list):
                              refs.extend(value)
                          else:
                              refs.append(value)
                      collect_fixture_refs(value, refs)
              elif isinstance(document, list):
                  for item in document:
                      collect_fixture_refs(item, refs)

          for path in fixtures.rglob('*'):
              if path.is_file() and path.suffix in {'.json', '.yaml', '.yml'}:
                  load_any(path)

          for path in required_example_files:
              load_json(path)

          plugin_info = load_json(contracts / 'plugin-info.schema.json')
          plugin_protocol = load_json(contracts / 'plugin-protocol.schema.json')
          config_schema = load_json(contracts / 'config.user.schema.json')
          release_schema = load_json(contracts / 'release-manifest.schema.json')
          web_api = load_yaml(contracts / 'web-api.openapi.yaml')
          websocket_events = load_yaml(contracts / 'websocket-events.yaml')
          error_codes = load_yaml(contracts / 'error-codes.yaml')

          if plugin_info.get('type') != 'object':
              raise SystemExit('plugin-info.schema.json must define an object schema')
          for field in ['id', 'name', 'version', 'manifest_version', 'plugin_protocol_version', 'type', 'runtime', 'entry', 'license']:
              if field not in plugin_info.get('required', []):
                  raise SystemExit(f'plugin-info.schema.json missing required field: {field}')
          info_props = plugin_info.get('properties', {})
          for field in ['description', 'author', 'sdk_min_version', 'runtime_version', 'min_core_version', 'data_schema_version', 'capabilities', 'permissions', 'dependencies', 'require_install_scripts', 'platforms']:
              if field not in info_props:
                  raise SystemExit(f'plugin-info.schema.json missing property: {field}')
          if 'authors' in info_props:
              raise SystemExit('plugin-info.schema.json must not define authors')
          if info_props['runtime'].get('type') != 'string':
              raise SystemExit('plugin-info.schema.json runtime must remain a string field')
          if set(info_props['type'].get('enum', [])) != {'managed_runtime', 'dev_source'}:
              raise SystemExit('plugin-info.schema.json type must only allow managed_runtime and dev_source')
          if set(info_props['runtime'].get('enum', [])) != {'python', 'nodejs'}:
              raise SystemExit('plugin-info.schema.json runtime must only allow python and nodejs')
          if 'default_config' in info_props:
              raise SystemExit('plugin-info.schema.json must not introduce default_config in Phase 2')
          scope_props = info_props['permissions']['properties']['scopes']['properties']
          for scope in ['http_hosts', 'storage_roots', 'webhooks']:
              if scope not in scope_props:
                  raise SystemExit(f'plugin-info.schema.json permissions.scopes missing {scope}')
          if set(scope_props['storage_roots']['items'].get('enum', [])) != {'plugin_data'}:
              raise SystemExit('plugin-info.schema.json storage_roots must only allow plugin_data')

          proto_defs = plugin_protocol.get('$defs', {})
          expected_proto_defs = {
              'common',
              'init',
              'init_progress',
              'init_ack',
              'event',
              'outbound_message',
              'outbound_message_segment',
              'outbound_message_non_reply_segment',
              'outbound_message_segment_text',
              'outbound_message_segment_image',
              'outbound_message_segment_at',
              'outbound_message_segment_at_all',
              'outbound_message_segment_face',
              'outbound_message_segment_reply',
              'action_message_send_legacy_data',
              'action_message_send_rich_data',
              'action_message_reply_legacy_data',
              'action_message_reply_rich_data',
              'action_logger_write_data',
              'action_storage_kv_get_data',
              'action_storage_kv_set_data',
              'action_storage_kv_delete_data',
              'action_storage_kv_list_data',
              'action_storage_file_read_data',
              'action_storage_file_write_text_data',
              'action_storage_file_write_base64_data',
              'action_storage_file_delete_data',
              'action_storage_file_list_data',
              'action_http_request_no_body_data',
              'action_http_request_text_body_data',
              'action_http_request_base64_body_data',
              'action',
              'action_message_send',
              'action_message_reply',
              'action_message_send_image',
              'action_logger_write',
              'action_storage_kv',
              'action_storage_file',
              'action_http_request',
              'result',
              'error',
              'ping',
              'pong',
              'shutdown',
          }
          if set(proto_defs.keys()) != expected_proto_defs:
              raise SystemExit(f'plugin-protocol.schema.json $defs must exactly match {sorted(expected_proto_defs)}; got {sorted(proto_defs.keys())}')
          message_catalog = plugin_protocol.get('x-message-catalog', [])
          if not message_catalog:
              raise SystemExit('plugin-protocol.schema.json must define x-message-catalog')
          catalog_types = {item.get('type') for item in message_catalog}
          expected_catalog_types = {'init', 'init_progress', 'init_ack', 'event', 'action', 'result', 'error', 'ping', 'pong', 'shutdown'}
          if catalog_types != expected_catalog_types:
              raise SystemExit(f'plugin-protocol.schema.json x-message-catalog must exactly match {sorted(expected_catalog_types)}; got {sorted(catalog_types)}')
          action_oneOf = plugin_protocol['$defs']['action'].get('oneOf', [])
          action_refs = {item.get('$ref', '').split('/')[-1] for item in action_oneOf}
          expected_action_refs = {
              'action_message_send',
              'action_message_reply',
              'action_message_send_image',
              'action_logger_write',
              'action_storage_kv',
              'action_storage_file',
              'action_http_request',
          }
          if action_refs != expected_action_refs:
              raise SystemExit(f'plugin-protocol.schema.json action oneOf must reference {sorted(expected_action_refs)}; got {sorted(action_refs)}')
          outbound_segment_refs = {item.get('$ref', '').split('/')[-1] for item in plugin_protocol['$defs']['outbound_message_segment'].get('oneOf', [])}
          expected_outbound_segment_refs = {
              'outbound_message_segment_text',
              'outbound_message_segment_image',
              'outbound_message_segment_at',
              'outbound_message_segment_at_all',
              'outbound_message_segment_face',
              'outbound_message_segment_reply',
          }
          if outbound_segment_refs != expected_outbound_segment_refs:
              raise SystemExit(f'plugin-protocol.schema.json outbound_message_segment oneOf must reference {sorted(expected_outbound_segment_refs)}; got {sorted(outbound_segment_refs)}')
          non_reply_refs = {item.get('$ref', '').split('/')[-1] for item in plugin_protocol['$defs']['outbound_message_non_reply_segment'].get('oneOf', [])}
          expected_non_reply_refs = {
              'outbound_message_segment_text',
              'outbound_message_segment_image',
              'outbound_message_segment_at',
              'outbound_message_segment_at_all',
              'outbound_message_segment_face',
          }
          if non_reply_refs != expected_non_reply_refs:
              raise SystemExit(f'plugin-protocol.schema.json outbound_message_non_reply_segment oneOf must reference {sorted(expected_non_reply_refs)}; got {sorted(non_reply_refs)}')
          message_segments = plugin_protocol['$defs']['outbound_message']['properties']['segments']
          if len(message_segments.get('oneOf', [])) != 2:
              raise SystemExit('plugin-protocol.schema.json outbound_message.segments must distinguish plain body arrays from reply-prefixed arrays')
          send_def = plugin_protocol['$defs']['action_message_send']['allOf'][1]
          if send_def['properties']['action'].get('const') != 'message.send':
              raise SystemExit('plugin-protocol.schema.json action_message_send must freeze action const to message.send')
          send_data = send_def['properties']['data']
          send_data_refs = {item.get('$ref', '').split('/')[-1] for item in send_data.get('oneOf', [])}
          if send_data_refs != {'action_message_send_legacy_data', 'action_message_send_rich_data'}:
              raise SystemExit('plugin-protocol.schema.json action_message_send.data must support both legacy and rich payloads')
          send_legacy = plugin_protocol['$defs']['action_message_send_legacy_data']
          if send_legacy.get('required') != ['target_type', 'target_id', 'text']:
              raise SystemExit('plugin-protocol.schema.json action_message_send_legacy_data must require target_type, target_id, and text')
          if set(send_legacy['properties']['target_type'].get('enum', [])) != {'group', 'private'}:
              raise SystemExit('plugin-protocol.schema.json action_message_send_legacy_data.target_type must only allow group and private')
          send_rich = plugin_protocol['$defs']['action_message_send_rich_data']
          if send_rich.get('required') != ['target_type', 'target_id', 'message']:
              raise SystemExit('plugin-protocol.schema.json action_message_send_rich_data must require target_type, target_id, and message')
          if send_rich['properties']['message'].get('$ref') != '#/$defs/outbound_message':
              raise SystemExit('plugin-protocol.schema.json action_message_send_rich_data.message must reference outbound_message')
          reply_def = plugin_protocol['$defs']['action_message_reply']['allOf'][1]
          if reply_def['properties']['action'].get('const') != 'message.reply':
              raise SystemExit('plugin-protocol.schema.json action_message_reply must freeze action const to message.reply')
          reply_data_refs = {item.get('$ref', '').split('/')[-1] for item in reply_def['properties']['data'].get('oneOf', [])}
          if reply_data_refs != {'action_message_reply_legacy_data', 'action_message_reply_rich_data'}:
              raise SystemExit('plugin-protocol.schema.json action_message_reply.data must support both legacy and rich payloads')
          reply_rich = plugin_protocol['$defs']['action_message_reply_rich_data']
          if reply_rich.get('required') != ['reply_to_event_id', 'message']:
              raise SystemExit('plugin-protocol.schema.json action_message_reply_rich_data must require reply_to_event_id and message')
          if reply_rich['properties']['message'].get('$ref') != '#/$defs/outbound_message':
              raise SystemExit('plugin-protocol.schema.json action_message_reply_rich_data.message must reference outbound_message')
          send_image_def = plugin_protocol['$defs']['action_message_send_image']['allOf'][1]
          if send_image_def['properties']['action'].get('const') != 'message.send_image':
              raise SystemExit('plugin-protocol.schema.json action_message_send_image must freeze action const to message.send_image')
          send_image_data = send_image_def['properties']['data']
          if send_image_data.get('required') != ['target_type', 'target_id', 'file']:
              raise SystemExit('plugin-protocol.schema.json action_message_send_image.data must require target_type, target_id, and file')
          if plugin_protocol['$defs']['shutdown']['allOf'][1]['properties']['reason']['enum'] != ['stop', 'restart', 'reload']:
              raise SystemExit('plugin-protocol.schema.json shutdown.reason must be stop/restart/reload')

          props = config_schema.get('properties', {})
          for top in ['schema_version', 'server', 'onebot', 'database', 'storage', 'http', 'logging', 'auth', 'runtime', 'render', 'web', 'backup', 'retention', 'command', 'cooldown']:
              if top not in props:
                  raise SystemExit(f'config.user.schema.json missing top-level property: {top}')
          if props['server']['properties']['host'].get('default') != '127.0.0.1':
              raise SystemExit('config.user.schema.json server.host default must be 127.0.0.1')
          if 'ws_url' not in props['onebot']['properties']:
              raise SystemExit('config.user.schema.json must use onebot.ws_url')
          if props['database']['properties']['engine'].get('const') != 'sqlite':
              raise SystemExit('config.user.schema.json database.engine must be fixed to sqlite')
          if 'path' not in props['database']['properties']:
              raise SystemExit('config.user.schema.json database.path must exist')
          auth_props = set(props['auth']['properties'].keys())
          web_props = set(props['web']['properties'].keys())
          forbidden_in_auth = {'host', 'port', 'exposure_mode', 'setup_local_only'}
          forbidden_in_web = {
              'super_admins',
              'default_level',
              'auto_grant_capabilities',
              'session_ttl_days',
              'sliding_renewal',
              'max_sessions',
              'login_fail_limit',
              'login_fail_window_seconds',
          }
          if auth_props & forbidden_in_auth:
              raise SystemExit(f'auth must not contain web exposure fields: {sorted(auth_props & forbidden_in_auth)}')
          if web_props & forbidden_in_web:
              raise SystemExit(f'web must not contain auth/session fields: {sorted(web_props & forbidden_in_web)}')

          if web_api.get('openapi') != '3.1.0':
              raise SystemExit('web-api.openapi.yaml must use OpenAPI 3.1.0')
          required_paths = {
              '/healthz',
              '/readyz',
              '/api/setup/admin',
              '/api/setup/status',
              '/api/session/login',
              '/api/session',
              '/api/session/launcher-token',
              '/api/config',
              '/api/system/status',
              '/api/system/shutdown',
              '/api/logs',
              '/api/tasks',
              '/api/tasks/{task_id}',
              '/api/tasks/{task_id}/cancel',
              '/api/plugins',
              '/api/plugins/{plugin_id}',
              '/api/plugins/{plugin_id}/enable',
              '/api/plugins/{plugin_id}/disable',
              '/api/plugins/{plugin_id}/reload',
              '/api/plugins/{plugin_id}/grants',
              '/api/plugins/{plugin_id}/grants/{capability}',
              '/api/plugins/install',
          }
          actual_paths = set(web_api.get('paths', {}).keys())
          if actual_paths != required_paths:
              raise SystemExit(f'web-api.openapi.yaml paths must exactly match the current frozen set: {sorted(required_paths)}; got {sorted(actual_paths)}')
          if web_api['paths']['/api/plugins/{plugin_id}/enable']['post']['responses'].get('202'):
              raise SystemExit('enable must be synchronous and must not return 202')
          if web_api['paths']['/api/plugins/{plugin_id}/disable']['post']['responses'].get('202'):
              raise SystemExit('disable must be synchronous and must not return 202')
          if 'task_id' not in web_api['components']['schemas']['TaskAcceptedResponse']['required']:
              raise SystemExit('TaskAcceptedResponse must require task_id')

          channels = {item.get('path') for item in websocket_events.get('channels', [])}
          for expected in ['/ws/logs', '/ws/events', '/ws/tasks', '/ws/plugins/{id}/console']:
              if expected not in channels:
                  raise SystemExit(f'websocket-events.yaml missing channel path: {expected}')
          envelope = websocket_events.get('envelope', {})
          for field in ['channel', 'type', 'timestamp', 'data']:
              if field not in envelope.get('required', []):
                  raise SystemExit(f'websocket-events.yaml envelope missing required field: {field}')
          event_names = []
          for channel in websocket_events.get('channels', []):
              for event in channel.get('events', []):
                  event_names.append(event.get('event'))
          required_events = {'tasks.updated', 'logs.appended', 'events.received', 'plugins.console'}
          if set(event_names) != required_events:
              raise SystemExit(f'websocket-events.yaml events must exactly match {sorted(required_events)}; got {sorted(event_names)}')
          events_received = None
          for channel in websocket_events.get('channels', []):
              for event in channel.get('events', []):
                  if event.get('event') == 'events.received':
                      events_received = event
                      break
              if events_received is not None:
                  break
          if events_received is None:
              raise SystemExit('websocket-events.yaml must define events.received')
          description = events_received.get('description', '')
          if 'not a raw chat' not in description:
              raise SystemExit('events.received description must explicitly forbid raw chat event broadcasting')
          payload_variants = events_received.get('payload_schema', {}).get('oneOf', [])
          bridge_runtime_variant = None
          for variant in payload_variants:
              scope = variant.get('properties', {}).get('observability_scope', {})
              if scope.get('enum') == ['bridge_runtime']:
                  bridge_runtime_variant = variant
                  break
          if bridge_runtime_variant is None:
              raise SystemExit('events.received must define a bridge_runtime observability variant')
          bridge_required = bridge_runtime_variant.get('required', [])
          if bridge_required != ['observability_scope', 'summary', 'delivered_count', 'result_count', 'error_count']:
              raise SystemExit('bridge_runtime observability variant must require observability_scope, summary, delivered_count, result_count, and error_count')
          bridge_props = bridge_runtime_variant.get('properties', {})
          if 'last_runtime_protocol_error_summary' in bridge_props:
              raise SystemExit('bridge_runtime observability variant must not expose free-form runtime error summaries')

          codes = error_codes.get('codes', {})
          for code in [
              'platform.render_timeout',
              'platform.render_queue_full',
              'platform.invalid_request',
              'platform.invalid_config',
              'platform.task_timeout',
              'platform.task_not_cancellable',
              'plugin.not_handled',
              'plugin.internal_error',
              'plugin.init_timeout',
              'plugin.protocol_violation',
              'plugin.install_failed',
              'plugin.migration_failed',
              'plugin.permission_pending',
              'permission.denied',
              'permission.scope_violation',
              'permission.blacklisted',
              'adapter.connection_failed',
              'adapter.send_failed',
              'adapter.reply_target_missing',
              'adapter.connection_lost',
              'adapter.auth_failed',
          ]:
              if code not in codes:
                  raise SystemExit(f'error-codes.yaml missing code: {code}')
              for field in ['code', 'message_key', 'message', 'description', 'http_status', 'retryable', 'applies_to']:
                  if field not in codes[code]:
                      raise SystemExit(f'error-codes.yaml code missing {field}: {code}')

          if 'oneOf' not in release_schema:
              raise SystemExit('release-manifest.schema.json must distinguish release_manifest and build_info via oneOf')
          artifact = release_schema['$defs']['artifact']
          for field in ['artifact_id', 'file_name', 'platform', 'sha256', 'size', 'support_level', 'deps_manifest_sha256', 'smoke_profile']:
              if field not in artifact.get('required', []):
                  raise SystemExit(f'release-manifest.schema.json artifact missing required field: {field}')
          if set(artifact['properties']['artifact_id'].get('enum', [])) != {'windows-x64-full', 'linux-x64-server'}:
              raise SystemExit('release-manifest.schema.json artifact_id must exactly match the v0.1 official matrix')

          contracts_snapshot = json.dumps(
              {
                  'plugin_info': plugin_info,
                  'plugin_protocol': plugin_protocol,
                  'release': release_schema,
                  'error_codes': error_codes,
                  'websocket_events': websocket_events,
              },
              ensure_ascii=False,
          )
          for legacy in ['platform.config_error', '"task.updated"', '"authors"', '"default_config"']:
              if legacy in contracts_snapshot:
                  raise SystemExit(f'legacy or out-of-scope Phase 2 content leaked into formal contracts: {legacy}')

          refs = []
          for document in [plugin_info, plugin_protocol, config_schema, release_schema, error_codes, web_api, websocket_events]:
              collect_fixture_refs(document, refs)
          if not refs:
              raise SystemExit('fixture-ready contracts must declare fixture references')
          for ref in refs:
              ref_path = root / ref
              if not ref_path.exists():
                  raise SystemExit(f'missing referenced fixture: {ref}')
              if ref_path.is_file() and ref_path.suffix in {'.json', '.yaml', '.yml'}:
                  load_any(ref_path)

          cli_commands = load_yaml(contracts / 'cli-commands.yaml')
          expected_cli_commands = {'reset-admin', 'backup', 'restore', 'doctor', 'migrate', 'cleanup'}
          actual_cli_commands = set(cli_commands.get('commands', {}).keys())
          if actual_cli_commands != expected_cli_commands:
              raise SystemExit(f'cli-commands.yaml commands must exactly match {sorted(expected_cli_commands)}; got {sorted(actual_cli_commands)}')
          cli_fixture_refs = cli_commands.get('x-fixtures', [])
          if not cli_fixture_refs:
              raise SystemExit('cli-commands.yaml must declare top-level x-fixtures')
          aggregated_cli_refs = set()
          for cmd_name, cmd in cli_commands.get('commands', {}).items():
              avail = cmd.get('availability', {})
              if 'online' not in avail or 'offline' not in avail:
                  raise SystemExit(f'cli-commands.yaml command {cmd_name} must declare online and offline availability')
              cmd_refs = cmd.get('x-fixtures', [])
              if len(cmd_refs) < 3:
                  raise SystemExit(f'cli-commands.yaml command {cmd_name} must declare at least 3 fixture refs')
              categories = {Path(ref).name.split('.')[0] for ref in cmd_refs}
              if categories != {'ok', 'invalid', 'edge'}:
                  raise SystemExit(f'cli-commands.yaml command {cmd_name} must provide ok/invalid/edge fixtures; got {sorted(categories)}')
              aggregated_cli_refs.update(cmd_refs)
              for ref in cmd_refs:
                  ref_path = root / ref
                  if not ref_path.is_file():
                      raise SystemExit(f'missing CLI fixture: {ref}')
                  document = load_any(ref_path)
                  if not isinstance(document, dict):
                      raise SystemExit(f'CLI fixture must be an object: {ref}')
                  if document.get('contract') != f'contracts/cli-commands.yaml#commands.{cmd_name}':
                      raise SystemExit(f'CLI fixture contract ref mismatch for {ref}')
                  fixture_input = document.get('input', {})
                  fixture_expect = document.get('expect', {})
                  if fixture_input.get('command') != cmd_name:
                      raise SystemExit(f'CLI fixture input.command mismatch for {ref}')
                  if 'mode' not in fixture_input:
                      raise SystemExit(f'CLI fixture input.mode missing for {ref}')
                  if 'valid' not in fixture_expect:
                      raise SystemExit(f'CLI fixture expect.valid missing for {ref}')
                  prefix = Path(ref).name.split('.')[0]
                  mode = fixture_input.get('mode')
                  if prefix in {'ok', 'edge'}:
                      if fixture_expect.get('valid') is not True:
                          raise SystemExit(f'CLI fixture {ref} must set expect.valid=true')
                      if mode not in {'online', 'offline'}:
                          raise SystemExit(f'CLI fixture {ref} must use online/offline mode for valid cases')
                      if not avail.get(mode):
                          raise SystemExit(f'CLI fixture {ref} uses unavailable mode {mode!r} for command {cmd_name}')
                      exit_code = fixture_expect.get('exit_code')
                      if str(exit_code) not in {str(code) for code in cmd.get('exit_codes', {}).keys()}:
                          raise SystemExit(f'CLI fixture {ref} uses exit_code {exit_code!r} not declared by {cmd_name}')
                      if fixture_expect.get('task_model') != bool(cmd.get('task_model')):
                          raise SystemExit(f'CLI fixture {ref} task_model mismatch for {cmd_name}')
