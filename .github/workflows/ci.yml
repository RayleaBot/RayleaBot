name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.detect.outputs.server }}
      web: ${{ steps.detect.outputs.web }}
      launcher: ${{ steps.detect.outputs.launcher }}
      sdk: ${{ steps.detect.outputs.sdk }}
      contracts: ${{ steps.detect.outputs.contracts }}
      release: ${{ steps.detect.outputs.release }}
      docs_only: ${{ steps.detect.outputs.docs_only }}
      ci: ${{ steps.detect.outputs.ci }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: detect
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: python scripts/ci/detect_changes.py --base "$BASE_SHA" --head "$HEAD_SHA"

  contracts-lite:
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate contracts
        run: python scripts/ci/validate_contracts.py --mode=strict

  server:
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0

      - name: Run server doctor
        run: make doctor

      - name: Run go test
        working-directory: server
        run: go test ./...

      - name: Build server
        working-directory: server
        run: mkdir -p dist && go build -o dist/raylea-server ./cmd/raylea-server

      - name: Check sqlc generated code drift
        working-directory: server
        run: sqlc diff

  web:
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Check generated types drift
        working-directory: web
        run: |
          pnpm generate:types
          git diff --exit-code src/types/generated.ts src/types/websocket.generated.ts

      - name: Run web typecheck
        working-directory: web
        run: pnpm run typecheck

      - name: Run web tests
        working-directory: web
        run: pnpm test

      - name: Build web
        working-directory: web
        run: pnpm build

  launcher:
    if: needs.changes.outputs.launcher == 'true' || needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install launcher dependencies
        working-directory: launcher
        run: pnpm install --frozen-lockfile

      - name: Check generated types drift
        working-directory: launcher
        run: |
          pnpm generate:types
          git diff --exit-code src/shared/web-api.generated.ts

      - name: Run launcher typecheck
        working-directory: launcher
        run: pnpm run typecheck

      - name: Run launcher tests
        working-directory: launcher
        run: pnpm test

  sdk:
    if: needs.changes.outputs.sdk == 'true' || needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: npm
          cache-dependency-path: sdk/nodejs/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Node SDK dependencies
        working-directory: sdk/nodejs
        run: npm ci

      - name: Build Node SDK
        working-directory: sdk/nodejs
        run: npm run build

      - name: Check Node SDK dist drift
        working-directory: sdk/nodejs
        run: git diff --exit-code dist

      - name: Run Node SDK typecheck
        working-directory: sdk/nodejs
        run: npm run typecheck

      - name: Run Node SDK tests
        working-directory: sdk/nodejs
        run: node --test tests/*.test.mjs

      - name: Run Python SDK tests
        working-directory: sdk/python
        run: python -m unittest discover -s tests

  release-helper:
    if: needs.changes.outputs.release == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check release scripts
        run: |
          python -m py_compile scripts/release/*.py
          python -m unittest discover -s scripts/release/tests

  agent-docs:
    if: needs.changes.outputs.docs_only == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Check agent docs
        run: node scripts/check-agent-docs.mjs

  ci-self-check:
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Check CI scripts
        run: |
          python -m py_compile scripts/ci/*.py
          python scripts/ci/detect_changes.py --self-test
          python scripts/ci/validate_contracts.py --mode=strict

  ci-required:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - changes
      - contracts-lite
      - server
      - web
      - launcher
      - sdk
      - release-helper
      - agent-docs
      - ci-self-check

    steps:
      - name: Check required CI result
        shell: bash
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          allowed = {"success", "skipped"}
          failed = {name: data["result"] for name, data in needs.items() if data["result"] not in allowed}
          for name, data in sorted(needs.items()):
              print(f"{name}: {data['result']}")
          if failed:
              print(f"ci-required failed: {failed}", file=sys.stderr)
              raise SystemExit(1)
          print("ci-required passed")
          PY
