name: nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  nightly-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run server tests
        working-directory: server
        run: go test ./...

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web unit tests
        working-directory: web
        run: pnpm test

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web end-to-end tests
        working-directory: web
        run: pnpm test:e2e

      - name: Run release helper tests
        run: python -m unittest discover -s scripts/release/tests

  nightly-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: launcher/global.json

      - name: Run launcher tests
        run: dotnet test ./launcher

      - name: Publish launcher shell
        run: dotnet publish ./launcher -c Release
