name: nightly

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  server-full:
    runs-on: ubuntu-latest
    env:
      CGO_ENABLED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run go test
        working-directory: server
        run: go test ./...

      - name: Run go race tests
        working-directory: server
        run: go test -race ./...

      - name: Run Go coverage
        shell: bash
        working-directory: server
        run: |
          set -euo pipefail
          mapfile -t packages < <(go list ./... | grep -v '/cmd/raylea-server$')
          go test -covermode=atomic -coverprofile=coverage.out "${packages[@]}"
          go tool cover -func=coverage.out | awk '/^total:/ {print "Go coverage total: " $3}'

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          install-mode: goinstall
          working-directory: server
          args: --timeout=10m --disable-all -E errcheck -E staticcheck -E govet -E unused -E ineffassign ./...

  server-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run govulncheck
        shell: bash
        working-directory: server
        run: |
          set -euo pipefail
          tmp_bin="$(mktemp)"
          trap 'rm -f "$tmp_bin"' EXIT
          go build -o "$tmp_bin" ./cmd/raylea-server
          go run golang.org/x/vuln/cmd/govulncheck@v1.1.4 -mode=binary "$tmp_bin"

  web-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web coverage
        working-directory: web
        run: pnpm test:coverage

      - name: Install Playwright browser
        working-directory: web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run web E2E
        working-directory: web
        run: pnpm test:e2e

      - name: Build web
        working-directory: web
        run: pnpm build

  launcher-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: launcher/pnpm-lock.yaml

      - name: Install launcher dependencies
        working-directory: launcher
        run: pnpm install --frozen-lockfile

      - name: Run launcher coverage
        working-directory: launcher
        run: pnpm test:coverage

      - name: Build launcher
        working-directory: launcher
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm build

  contracts-strict:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install YAML parser
        run: python -m pip install --disable-pip-version-check pyyaml

      - name: Validate contracts strictly
        run: python scripts/ci/validate_contracts.py --mode=strict

  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Run web dependency audit
        working-directory: web
        run: pnpm audit --prod --audit-level=high --registry=https://registry.npmjs.org

      - name: Install launcher dependencies
        working-directory: launcher
        run: pnpm install --frozen-lockfile

      - name: Run launcher dependency audit
        working-directory: launcher
        run: pnpm audit --prod --audit-level=high --registry=https://registry.npmjs.org

  release-dry-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24.14.0"
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run release helper tests
        run: python -m unittest discover -s scripts/release/tests

      - name: Build server
        run: |
          mkdir -p dist/server
          (cd server && go build -o ../dist/server/raylea-server ./cmd/raylea-server)

      - name: Install web dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Build web
        working-directory: web
        run: pnpm build

      - name: Package linux server artifact
        shell: bash
        run: |
          set -euo pipefail
          python scripts/release/package_artifact.py \
            --artifact-id linux-x64-server \
            --version 9999.0.0-nightly \
            --git-commit "$(git rev-parse --short HEAD)" \
            --release-notes-ref "https://github.com/${GITHUB_REPOSITORY}/actions/workflows/nightly.yml" \
            --server-bin dist/server/raylea-server \
            --systemd-file packaging/systemd/rayleabot.service \
            --output-dir dist/release \
            --run-smoke
