  /api/system/metrics:
    get:
      summary: Expose runtime metrics in Prometheus exposition format.
      description: >
        Returns counters, gauges, and histograms covering the event pipeline
        (adapter / bridge / dispatcher / runtime), task execution, render queue,
        outbound send, plugin runtime state, dispatcher drops, and webhook
        replay protection. Label cardinality is bounded by static enumerations
        and the set of registered plugins. Scrape with the standard Prometheus
        exposition parser (text/plain; version=0.0.4).
      operationId: getSystemMetrics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Prometheus text exposition payload.
          content:
            text/plain:
              schema:
                type: string
