                $ref: '#/components/schemas/ThirdPartyMonitorsResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/third-party/media:
    get:
      summary: Fetch a controlled third-party media resource for management UI display.
      operationId: getThirdPartyMedia
      security:
        - BearerAuth: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
            minLength: 1
      responses:
        '200':
          description: Controlled media resource bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/webp:
              schema:
                type: string
                format: binary
            image/gif:
              schema:
                type: string
                format: binary
            image/avif:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/bilibili/login/qrcode:
    post:
      summary: Start a Bilibili QR code login session.
      operationId: createBilibiliQRCodeLogin
      security:
        - BearerAuth: []
      responses:
        '200':
          description: QR code login session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilibiliQRCodeLoginCreateResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/bilibili/login/qrcode/{login_id}:
    get:
      summary: Poll a Bilibili QR code login session.
      operationId: pollBilibiliQRCodeLogin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BilibiliQRCodeLoginId'
      responses:
        '200':
          description: Current QR code login state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilibiliQRCodeLoginPollResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/bilibili/source/status:
    get:
      summary: Query the built-in Bilibili source status.
      operationId: getBilibiliSourceStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current Bilibili source status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilibiliSourceStatusResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/bilibili/users/resolve:
    get:
      summary: Resolve a Bilibili user by UID or search keyword for management UI forms.
      operationId: resolveBilibiliUser
      security:
        - BearerAuth: []
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Resolved Bilibili user or candidate list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilibiliUserResolveResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/bilibili/source/restart:
    post:
      summary: Restart the built-in Bilibili source.
      operationId: restartBilibiliSource
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Restart accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BilibiliSourceRestartResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/webhooks/{plugin_id}/{route}:
    post:
      summary: Receive a controlled plugin webhook and enqueue a webhook.received event for the target plugin.
      operationId: postPluginWebhook
      parameters:
        - $ref: '#/components/parameters/PluginId'
        - name: route
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9](?:[a-z0-9_-]{0,31})$'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          text/plain:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Webhook request accepted for controlled dispatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Session token issued by /api/session/login or /api/setup/admin,
        passed as a Bearer token in the Authorization header.

  parameters:
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LogId:
      name: log_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PluginId:
      name: plugin_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    GovernanceEntryType:
      name: entry_type
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/GovernanceEntryType'
    GovernanceTargetId:
      name: target_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    SchedulerJobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    ThirdPartyPlatform:
      name: platform
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/ThirdPartyPlatform'
    ThirdPartyAccountId:
      name: account_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,62}[a-z0-9])?$'
    BilibiliQRCodeLoginId:
      name: login_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'
    ThirdPartyQRCodeLoginId:
      name: login_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'

  responses:
    Error:
      description: Standard structured error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, message_key, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            message_key:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, secret]
      properties:
        identifier:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1

    SessionLoginResponse:
      type: object
      additionalProperties: false
      required: [session_token]
      properties:
        session_token:
          type: string
          minLength: 1
          description: Opaque management session token for later BearerAuth or auth=session_token admission.

    SetupStatusResponse:
      type: object
      additionalProperties: false
      required: [initialized]
      properties:
        initialized:
          type: boolean
          description: Whether the initial management credential source has been bootstrapped.

    ConfigDocument:
      $ref: './config.user.schema.json'

    ConfigSnapshotResponse:
      type: object
      additionalProperties: false
      required: [config]
      properties:
        config:
          $ref: '#/components/schemas/ConfigDocument'
        redacted_fields:
          type: array
          items:
            type: string

    ConfigApplyEffects:
      type: object
      additionalProperties: false
      required: [applied_now, reloaded_now, restart_required_fields]
      properties:
        applied_now:
          type: array
          items:
            type: string
        reloaded_now:
          type: array
          items:
            type: string
        restart_required_fields:
          type: array
          items:
            type: string

    ConfigUpdateResponse:
      type: object
      additionalProperties: false
      required: [config, restart_required, apply_effects]
      properties:
        config:
          $ref: '#/components/schemas/ConfigDocument'
        redacted_fields:
          type: array
          items:
            type: string
        restart_required:
          type: boolean
          description: Whether a server restart is required before the new config takes effect.
        apply_effects:
          $ref: '#/components/schemas/ConfigApplyEffects'

    SystemStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [running, shutting_down]
        adapter_state:
          type: string
        active_plugins:
          type: integer
          minimum: 0
          description: Number of plugin runtimes currently active for compatibility with existing clients.
        running_plugins:
          type: integer
          minimum: 0
          description: Number of plugins currently in the running state.
        failed_plugins:
          type: integer
          minimum: 0
          description: Number of plugins currently in the failed state.
        db_schema_version:
          type: string
          description: Current database schema migration version.
        uptime_seconds:
          type: integer
          minimum: 0
        recovery_summary:
          $ref: '#/components/schemas/RecoveryCompatibilitySummary'
        health:
          $ref: '#/components/schemas/ReadinessStatusResponse'

    SystemDiagnosticsResponse:
      type: object
      additionalProperties: false
      required: [generated_at, build, system, config, secrets, database, adapter, plugins, render, third_party, bilibili_source, scheduler, tasks, dependencies, filesystem, recent_errors, issues]
      properties:
        generated_at:
          type: string
          format: date-time
        build:
          $ref: '#/components/schemas/SystemDiagnosticsBuild'
        system:
          $ref: '#/components/schemas/SystemDiagnosticsSystem'
        config:
          $ref: '#/components/schemas/SystemDiagnosticsConfig'
        secrets:
          $ref: '#/components/schemas/SystemDiagnosticsSecrets'
        database:
          $ref: '#/components/schemas/SystemDiagnosticsDatabase'
        adapter:
          $ref: '#/components/schemas/SystemDiagnosticsAdapter'
        plugins:
          $ref: '#/components/schemas/SystemDiagnosticsPlugins'
        render:
          $ref: '#/components/schemas/SystemDiagnosticsIssueGroup'
        third_party:
          $ref: '#/components/schemas/SystemDiagnosticsThirdParty'
        bilibili_source:
          $ref: '#/components/schemas/SystemDiagnosticsBilibiliSource'
        scheduler:
          $ref: '#/components/schemas/SystemDiagnosticsScheduler'
        tasks:
          $ref: '#/components/schemas/SystemDiagnosticsTaskSummary'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/SystemDiagnosticsDependency'
        filesystem:
          type: array
          items:
            $ref: '#/components/schemas/SystemDiagnosticsPathPermission'
        recent_errors:
          type: array
          items:
            $ref: '#/components/schemas/LogSummary'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticIssue'
        recovery_summary:
          $ref: '#/components/schemas/RecoveryCompatibilitySummary'

    SystemDiagnosticsBuild:
      type: object
      additionalProperties: false
      required: [core_version]
      properties:
        core_version:
          type: string

    SystemDiagnosticsSystem:
      type: object
      additionalProperties: false
      required: [status, uptime_seconds]
      properties:
        status:
          type: string
          enum: [running, shutting_down]
        uptime_seconds:
          type: integer
          minimum: 0

    SystemDiagnosticsConfig:
      type: object
      additionalProperties: false
      required: [schema_version, status, apply_state, config_path, schema_path, database_engine, database_path, onebot_configured]
      properties:
        schema_version:
          type: string
        status:
          type: string
          enum: [loaded]
        apply_state:
          type: string
          enum: [applied]
        config_path:
          type: string
        schema_path:
          type: string
        database_engine:
          type: string
        database_path:
          type: string
        onebot_configured:
          type: boolean

    SystemDiagnosticsSecrets:
      type: object
      additionalProperties: false
      required: [unresolved_refs]
      properties:
        unresolved_refs:
          type: array
          items:
            type: string

    SystemDiagnosticsDatabase:
      type: object
      additionalProperties: false
      required: [schema_version, applied_migrations]
      properties:
        schema_version:
          type: string
        applied_migrations:
          type: array
          items:
            $ref: '#/components/schemas/SystemDiagnosticsMigration'

    SystemDiagnosticsMigration:
      type: object
      additionalProperties: false
      required: [version, name, applied_at]
      properties:
        version:
          type: string
        name:
          type: string
        applied_at:
          type: string

    SystemDiagnosticsAdapter:
      type: object
      additionalProperties: false
      required: [state]
      properties:
        state:
          type: string

    SystemDiagnosticsPlugins:
      type: object
      additionalProperties: false
      required: [total, active, running, failed]
      properties:
        total:
          type: integer
          minimum: 0
        active:
          type: integer
          minimum: 0
        running:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0

    SystemDiagnosticsIssueGroup:
      type: object
      additionalProperties: false
      required: [status, issues]
      properties:
        status:
          type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticIssue'

    SystemDiagnosticsThirdParty:
      type: object
      additionalProperties: false
      required: [total, enabled, configured, invalid, platforms]
      properties:
        total:
          type: integer
          minimum: 0
        enabled:
          type: integer
          minimum: 0
        configured:
          type: integer
          minimum: 0
        invalid:
          type: integer
          minimum: 0
        platforms:
          type: array
          items:
            $ref: '#/components/schemas/SystemDiagnosticsThirdPartyPlatform'

    SystemDiagnosticsThirdPartyPlatform:
      type: object
      additionalProperties: false
      required: [platform, total, enabled, configured, invalid]
      properties:
        platform:
          $ref: '#/components/schemas/ThirdPartyPlatform'
        total:
          type: integer
          minimum: 0
        enabled:
          type: integer
          minimum: 0
        configured:
          type: integer
          minimum: 0
        invalid:
          type: integer
          minimum: 0

    SystemDiagnosticsBilibiliSource:
      type: object
      additionalProperties: false
      required: [status, summary, diagnosis_level, watched_rooms, watched_uids, issues]
      properties:
        status:
          type: string
          enum: [disabled, idle, connecting, connected, degraded, failed]
        summary:
          type: string
        diagnosis_level:
          type: string
        watched_rooms:
          type: integer
          minimum: 0
        watched_uids:
          type: integer
          minimum: 0
        live_last_event_at:
          type: string
          format: date-time
        dynamic_last_poll_at:
          type: string
          format: date-time
        issues:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticIssue'

    SystemDiagnosticsScheduler:
      type: object
      additionalProperties: false
      required: [total, enabled, disabled, pending, running, failed]
      properties:
        total:
          type: integer
          minimum: 0
        enabled:
          type: integer
          minimum: 0
        disabled:
          type: integer
          minimum: 0
        pending:
          type: integer
          minimum: 0
        running:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0

    SystemDiagnosticsTaskSummary:
      type: object
      additionalProperties: false
      required: [pending, running, failed]
      properties:
        pending:
          type: integer
          minimum: 0
        running:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0

    SystemDiagnosticsDependency:
      type: object
      additionalProperties: false
      required: [kind, status, metadata_complete, cached_archive_present, prepared_store_present, system_browser]
      properties:
        kind:
          type: string
          enum: [chromium, python-runtime, nodejs-runtime]
        status:
          type: string
          enum: [ready, cached, on_demand, metadata_incomplete, unavailable]
        metadata_complete:
          type: boolean
        cached_archive_present:
          type: boolean
        prepared_store_present:
          type: boolean
        system_browser:
          type: boolean

    SystemDiagnosticsPathPermission:
      type: object
      additionalProperties: false
      required: [label, path, status, is_dir]
      properties:
        label:
          type: string
        path:
          type: string
        status:
          type: string
          enum: [ok, missing, unreadable, unknown]
        is_dir:
          type: boolean

    ProtocolProvider:
      type: string
      enum: [unknown, standard, napcat, luckylillia]

    ProtocolTransportKey:
      type: string
      enum: [reverse_ws, forward_ws, http_api, webhook]

    ProtocolTransportState:
      type: string
      enum: [idle, listening, connecting, connected, auth_failed, reconnecting, stopped]

    ProtocolReadinessStatus:
      type: string
      enum: [ready, degraded, failed, setup_required]

    ProtocolIssue:
      type: object
      additionalProperties: false
      required: [code, severity, summary]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [info, warning, error]
        summary:
          type: string

    ProtocolTransportStatus:
      type: object
      additionalProperties: false
      required: [transport, enabled, configured, endpoint, state, summary]
      properties:
        transport:
          $ref: '#/components/schemas/ProtocolTransportKey'
        enabled:
          type: boolean
        configured:
          type: boolean
        endpoint:
          type: string
        state:
          $ref: '#/components/schemas/ProtocolTransportState'
        summary:
          type: string
        provider:
          $ref: '#/components/schemas/ProtocolProvider'
        app_name:
          type: string
        protocol_version:
          type: string
        app_version:
          type: string
        user_id:
          type: string
        nickname:
          type: string

    OneBot11ProtocolSnapshotResponse:
      type: object
      additionalProperties: false
      required:
        [protocol, provider, configured_transports, active_transports, transport_status, readiness_status, summary, recent_transport_issues]
      properties:
        protocol:
          type: string
          const: onebot11
        provider:
          $ref: '#/components/schemas/ProtocolProvider'
        configured_transports:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolTransportKey'
        active_transports:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolTransportKey'
        transport_status:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolTransportStatus'
        readiness_status:
          $ref: '#/components/schemas/ProtocolReadinessStatus'
        summary:
          type: string
        recent_transport_issues:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolIssue'

    OneBot11TargetIssue:
      type: object
      additionalProperties: false
      required: [scope, message]
      properties:
        scope:
          type: string
          enum: [protocol, groups, private_users, identity]
        message:
          type: string
          minLength: 1

    OneBot11GroupTarget:
      type: object
      additionalProperties: false
      required: [target_type, target_id, target_name]
      properties:
        target_type:
          type: string
          const: group
        target_id:
          type: string
          pattern: '^[0-9]+$'
        target_name:
          type: string
          minLength: 1

    OneBot11PrivateTarget:
      type: object
      additionalProperties: false
      required: [target_type, target_id, nickname]
      properties:
        target_type:
          type: string
          const: private
        target_id:
          type: string
          pattern: '^[0-9]+$'
        nickname:
          type: string
          minLength: 1

    OneBot11ProtocolTargetsResponse:
      type: object
      additionalProperties: false
      required: [protocol, available, groups, private_users, issues]
      properties:
        protocol:
          type: string
          const: onebot11
        available:
          type: boolean
        groups:
          type: array
          items:
            $ref: '#/components/schemas/OneBot11GroupTarget'
        private_users:
          type: array
          items:
            $ref: '#/components/schemas/OneBot11PrivateTarget'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/OneBot11TargetIssue'

    OneBot11IdentityResolveItem:
      type: object
      additionalProperties: false
      required: [target_type, target_id, user_id]
      properties:
        target_type:
          type: string
          enum: [group, private]
        target_id:
          type: string
          pattern: '^[0-9]+$'
        user_id:
          type: string
          pattern: '^[0-9]+$'

    OneBot11IdentityResolveRequest:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/OneBot11IdentityResolveItem'

    OneBot11Identity:
      type: object
      additionalProperties: false
      required: [target_type, target_id, user_id, nickname, avatar_url]
      properties:
        target_type:
          type: string
          enum: [group, private]
        target_id:
          type: string
          pattern: '^[0-9]+$'
        user_id:
          type: string
          pattern: '^[0-9]+$'
        nickname:
          type: string
        group_nickname:
          type: string
        title:
          type: string
        role:
          type: string
        role_label:
          type: string
        avatar_url:
          type: string

    OneBot11IdentityResolveResponse:
      type: object
      additionalProperties: false
      required: [items, issues]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OneBot11Identity'
        issues:
          type: array
          items:
            $ref: '#/components/schemas/OneBot11TargetIssue'

    ProtocolCompatibilityCategoryKey:
      type: string
      enum: [events, message_segments, read_capabilities, provider_extensions]

    ProtocolCompatibilitySupportStatus:
      type: string
      enum: [supported, unsupported]

    ProtocolCompatibilitySupportMap:
      type: object
      additionalProperties: false
      required: [standard, napcat, luckylillia]
      properties:
        standard:
          $ref: '#/components/schemas/ProtocolCompatibilitySupportStatus'
        napcat:
          $ref: '#/components/schemas/ProtocolCompatibilitySupportStatus'
        luckylillia:
          $ref: '#/components/schemas/ProtocolCompatibilitySupportStatus'

    ProtocolCompatibilityItem:
      type: object
      additionalProperties: false
      required: [key, label, support, summary]
      properties:
        key:
          type: string
          minLength: 1
        label:
          type: string
          minLength: 1
        support:
          $ref: '#/components/schemas/ProtocolCompatibilitySupportMap'
        summary:
          type: string
          minLength: 1

    ProtocolCompatibilityCategory:
      type: object
      additionalProperties: false
      required: [key, title, items]
      properties:
        key:
          $ref: '#/components/schemas/ProtocolCompatibilityCategoryKey'
        title:
          type: string
          minLength: 1
        items:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolCompatibilityItem'

    OneBot11ProtocolCompatibilityResponse:
      type: object
      additionalProperties: false
      required: [protocol, categories]
      properties:
        protocol:
          type: string
          const: onebot11
        categories:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolCompatibilityCategory'

    SystemShutdownResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean

    LogLevel:
      type: string
      enum: [debug, info, warn, error]

    LogProtocol:
      type: string
      enum: [onebot11]

    LogScope:
      type: string
      enum: [history, current_session]
      default: history

    LogSummary:
      type: object
      additionalProperties: false
      required: [log_id, timestamp, level, source, message]
      properties:
        log_id:
          type: string
          minLength: 1
        timestamp:
          type: string
        level:
