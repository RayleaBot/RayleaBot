paths:
  /healthz:
    get:
      summary: Probe whether the RayleaBot process is alive.
      operationId: getHealthz
      responses:
        '200':
          description: Process liveness status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /readyz:
    get:
      summary: Probe whether the management surface is ready for normal use.
      operationId: getReadyz
      responses:
        '200':
          description: Service is ready or degraded-but-manageable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        '503':
          description: Service is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/admin:
    post:
      summary: Bootstrap the initial management credential source and issue a session token.
      operationId: setupAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Initial management credential source created and session token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/status:
    get:
      summary: Query whether the initial management credential source has been bootstrapped.
      operationId: getSetupStatus
      responses:
        '200':
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/session/login:
    post:
      summary: Exchange management credentials for a session token.
      description: >
        When the configured max_sessions limit is already reached, the service
        may recycle the oldest active management session before issuing a new one.
      operationId: loginSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Session token issued for later management admission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session:
    delete:
      summary: Invalidate the current session token.
      operationId: logoutSession
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Session invalidated.
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session/launcher-token:
    post:
      summary: Issue a single-use short-lived token for local Launcher bootstrap.
      operationId: issueLauncherToken
      responses:
        '200':
          description: Single-use launcher token issued for a local loopback Launcher bootstrap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LauncherTokenResponse'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session/launcher-admission:
    post:
      summary: Consume a single-use launcher token and issue a normal management session token.
      description: >
        When the configured max_sessions limit is already reached, the service
        may recycle the oldest active management session before issuing a new one.
      operationId: admitLauncherSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LauncherAdmissionRequest'
      responses:
        '200':
          description: Launcher token consumed and management session issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/config:
    get:
      summary: Query the current effective management configuration snapshot.
      operationId: getConfig
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current effective config snapshot with sensitive fields redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSnapshotResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Validate and persist a new management configuration snapshot.
      operationId: updateConfig
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigDocument'
      responses:
        '200':
          description: Config written successfully. restart_required indicates whether a restart is still needed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigUpdateResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/blacklist:
    get:
      summary: Query the current chat-side blacklist snapshot for management review.
      operationId: getGovernanceBlacklist
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user and group blacklist entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceBlacklistResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/command-policy:
    get:
      summary: Query the effective command permission and cooldown policy snapshot.
      operationId: getGovernanceCommandPolicy
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Effective command permission defaults, cooldown configuration, and command-level policy view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceCommandPolicyResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/status:
    get:
      summary: Query the current system operational status.
      operationId: getSystemStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current system status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/shutdown:
    post:
      summary: Request a graceful server shutdown.
      operationId: shutdownSystem
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Shutdown request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemShutdownResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/backup:
    post:
      summary: Start an asynchronous online backup task.
      operationId: createBackup
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Backup task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11:
    get:
      summary: Query the current OneBot11 protocol snapshot without reconstructing it from system summary fragments.
      operationId: getOneBot11ProtocolSnapshot
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OneBot11 protocol snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneBot11ProtocolSnapshotResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/reverse-ws:
    get:
      summary: Accept a OneBot11 reverse WebSocket callback session.
      operationId: connectOneBot11ReverseWs
      responses:
        '101':
          description: Reverse WebSocket upgrade accepted.
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/webhook:
    post:
      summary: Accept a OneBot11 webhook event payload.
      operationId: ingestOneBot11Webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Webhook event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/recovery/recheck:
    post:
      summary: Start an asynchronous recovery.recheck task to recompute and persist the current recovery summary.
      operationId: createRecoveryRecheck
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Recovery recheck task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/recovery/confirm:
    post:
      summary: Start an asynchronous recovery.confirm task to record operator confirmation for the current skipped plugin list.
      operationId: createRecoveryConfirm
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecoveryConfirmRequest'
      responses:
        '202':
          description: Recovery confirmation task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/runtime/bootstrap:
    post:
      summary: Start an asynchronous runtime.bootstrap task to prepare managed runtime resources for the current platform.
      operationId: createRuntimeBootstrap
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuntimeBootstrapRequest'
      responses:
        '202':
          description: Runtime bootstrap task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/preview:
    post:
      summary: Start an asynchronous render.preview task for management-side template debugging.
      operationId: createRenderPreview
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderPreviewRequest'
      responses:
        '202':
          description: Render preview task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '413':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        '503':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/artifacts/{artifact_id}:
    get:
      summary: Stream a previously rendered preview artifact for same-origin management inspection.
      operationId: getRenderArtifact
      security:
        - BearerAuth: []
      parameters:
        - name: artifact_id
          in: path
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Render artifact image bytes.
          content:
            image/png:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/templates:
    get:
      summary: List managed render templates available to the online template editor.
      operationId: listRenderTemplates
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Managed render template list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateListResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/templates/{template_id}:
    get:
      summary: Get one managed render template detail snapshot.
      operationId: getRenderTemplate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Managed render template detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/templates/{template_id}/source:
    get:
      summary: Read the current source bundle for one managed render template.
      operationId: getRenderTemplateSource
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Current template source bundle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateSourceResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Save a new source bundle revision for one managed render template.
      operationId: updateRenderTemplateSource
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderTemplateSourceUpdateRequest'
      responses:
        '200':
          description: Template source stored as a new revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateDetailResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/templates/{template_id}/validate:
    post:
      summary: Validate the current or draft source bundle for one managed render template.
      operationId: validateRenderTemplate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderTemplateValidateRequest'
      responses:
        '200':
          description: Template validation result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateValidateResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/templates/{template_id}/versions:
    get:
      summary: List stored source revisions for one managed render template.
      operationId: listRenderTemplateVersions
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '200':
          description: Template revision history from newest to oldest.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateVersionListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/render/templates/{template_id}/rollback:
    post:
      summary: Create a new managed render template revision by rolling back to a previous revision.
      operationId: rollbackRenderTemplate
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RenderTemplateRollbackRequest'
      responses:
        '200':
          description: Rollback stored as a new template revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RenderTemplateDetailResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/diagnostics/export:
    get:
      summary: Export a bounded diagnostics bundle for support and recovery triage.
      operationId: exportDiagnostics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Diagnostics ZIP archive.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks:
    get:
      summary: List recent background tasks.
      operationId: listTasks
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: task_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskType'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Recent task snapshots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks/{task_id}:
    get:
      summary: Get a background task snapshot.
      operationId: getTask
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Latest task snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks/{task_id}/cancel:
    post:
      summary: Request cancellation for a cancellable background task.
      operationId: cancelTask
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '202':
          description: Cancellation request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/logs:
    get:
      summary: List redacted management log summaries for current-session or historical browsing.
      operationId: listLogs
      security:
        - BearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogScope'
          description: >
            Select whether to browse persisted history or only the current
            server boot session. start_at and end_at are only valid when
            scope=history.
        - name: level
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogLevel'
        - name: source
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: protocol
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogProtocol'
        - name: plugin_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: request_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Opaque cursor issued by the server for log history pagination.
        - name: direction
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogPageDirection'
          description: Cursor direction for incremental log loading. When cursor is omitted, the server returns the latest window.
        - name: start_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive UTC RFC3339 lower time bound. Only valid when scope=history.
        - name: end_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive UTC RFC3339 upper time bound. Only valid when scope=history.
      responses:
        '200':
          description: Bounded log summaries using the same whitelist fields as /ws/logs plus cursor window metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/logs/{log_id}:
    get:
      summary: Get one redacted management log detail.
      operationId: getLogDetail
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LogId'
      responses:
        '200':
          description: One redacted log detail with the same summary fields as /api/logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins:
    get:
      summary: List registered plugins with tri-layer state snapshots.
      operationId: listPlugins
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Plugin list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginListResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/enable:
    post:
      summary: Set the plugin desired_state to enabled.
      operationId: enablePlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Desired state updated. The runtime may still be catching up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/disable:
    post:
      summary: Set the plugin desired_state to disabled.
      operationId: disablePlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Desired state updated. The runtime may still be stopping the plugin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/reload:
    post:
      summary: Restart the plugin runtime without changing desired_state.
      operationId: reloadPlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Reload accepted. The runtime may still be restarting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/grants:
    get:
      summary: List the plugin's currently effective grants.
      operationId: listPluginGrants
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Current effective grants after expiry filtering.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginGrantListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Grant one declared capability to a plugin.
      operationId: grantPluginCapability
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginGrantRequest'
      responses:
        '200':
          description: Capability grant persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginGrantSummary'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/grants/{capability}:
    delete:
      summary: Revoke one capability grant from a plugin.
      operationId: revokePluginCapabilityGrant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
        - name: capability
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z]+\.[a-z_]+$'
      responses:
        '204':
          description: Capability grant revoked.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}:
    get:
      summary: Get one plugin snapshot.
      operationId: getPlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Latest plugin snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Uninstall a plugin asynchronously.
      operationId: uninstallPlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '202':
          description: Uninstall task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/install:
    post:
      summary: Start asynchronous plugin installation from a local source.
      operationId: installPlugin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginInstallRequest'
      responses:
        '202':
          description: Installation task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/webhooks/{plugin_id}/{route}:
    post:
      summary: Receive a controlled plugin webhook and enqueue a webhook.received event for the target plugin.
      operationId: postPluginWebhook
      parameters:
        - $ref: '#/components/parameters/PluginId'
        - name: route
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9](?:[a-z0-9_-]{0,31})$'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          text/plain:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Webhook request accepted for controlled dispatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Session token issued by /api/session/login or /api/setup/admin,
        passed as a Bearer token in the Authorization header.

  parameters:
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    LogId:
      name: log_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PluginId:
      name: plugin_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    TemplateId:
      name: template_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

  responses:
    Error:
      description: Standard structured error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, message_key, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            message_key:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, secret]
      properties:
        identifier:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1

    SessionLoginResponse:
      type: object
      additionalProperties: false
      required: [session_token]
      properties:
        session_token:
          type: string
          minLength: 1
          description: Opaque management session token for later BearerAuth or auth=session_token admission.

    SetupStatusResponse:
      type: object
      additionalProperties: false
      required: [initialized]
      properties:
        initialized:
          type: boolean
          description: Whether the initial management credential source has been bootstrapped.

    LauncherTokenResponse:
      type: object
      additionalProperties: false
      required: [launcher_token]
      properties:
        launcher_token:
          type: string
          minLength: 1
          description: Single-use short-lived token for Launcher admission. Valid for one use only.

    LauncherAdmissionRequest:
      type: object
      additionalProperties: false
      required: [launcher_token]
      properties:
        launcher_token:
          type: string
          minLength: 1
          description: Single-use short-lived launcher token obtained from /api/session/launcher-token.

    ConfigDocument:
      $ref: './config.user.schema.json'

    ConfigSnapshotResponse:
      type: object
      additionalProperties: false
      required: [config]
      properties:
        config:
          $ref: '#/components/schemas/ConfigDocument'
        redacted_fields:
          type: array
          items:
            type: string

    ConfigUpdateResponse:
      type: object
      additionalProperties: false
      required: [config, restart_required]
      properties:
        config:
          $ref: '#/components/schemas/ConfigDocument'
        redacted_fields:
          type: array
          items:
            type: string
        restart_required:
          type: boolean
          description: Whether a server restart is required before the new config takes effect.

    SystemStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [running, shutting_down]
        adapter_state:
          type: string
        active_plugins:
          type: integer
          minimum: 0
        uptime_seconds:
          type: integer
          minimum: 0
        recovery_summary:
          $ref: '#/components/schemas/RecoveryCompatibilitySummary'

    ProtocolProvider:
      type: string
      enum: [standard, napcat, luckylillia]

    ProtocolTransportKey:
      type: string
      enum: [reverse_ws, forward_ws, http_api, webhook]

    ProtocolTransportState:
      type: string
      enum: [idle, listening, connecting, connected, auth_failed, reconnecting, stopped]

    ProtocolReadinessStatus:
      type: string
      enum: [ready, degraded, failed, setup_required]

    ProtocolIssue:
      type: object
      additionalProperties: false
      required: [code, severity, summary]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [info, warning, error]
        summary:
          type: string

    ProtocolTransportStatus:
      type: object
      additionalProperties: false
      required: [transport, enabled, configured, endpoint, state, summary]
      properties:
        transport:
          $ref: '#/components/schemas/ProtocolTransportKey'
        enabled:
          type: boolean
        configured:
          type: boolean
        endpoint:
          type: string
        state:
          $ref: '#/components/schemas/ProtocolTransportState'
        summary:
          type: string

    OneBot11ProtocolSnapshotResponse:
      type: object
      additionalProperties: false
      required:
        [protocol, provider, configured_transports, active_transports, transport_status, readiness_status, summary, recent_transport_issues]
      properties:
        protocol:
          type: string
          const: onebot11
        provider:
          $ref: '#/components/schemas/ProtocolProvider'
        configured_transports:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolTransportKey'
        active_transports:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolTransportKey'
        transport_status:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolTransportStatus'
        readiness_status:
          $ref: '#/components/schemas/ProtocolReadinessStatus'
        summary:
          type: string
        recent_transport_issues:
          type: array
          items:
            $ref: '#/components/schemas/ProtocolIssue'

    SystemShutdownResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean

    LogLevel:
      type: string
      enum: [debug, info, warn, error]

    LogProtocol:
      type: string
      enum: [onebot11]

    LogScope:
      type: string
      enum: [history, current_session]
      default: history

    LogSummary:
      type: object
      additionalProperties: false
      required: [log_id, timestamp, level, source, message]
      properties:
        log_id:
          type: string
          minLength: 1
        timestamp:
          type: string
        level:
          $ref: '#/components/schemas/LogLevel'
        source:
          type: string
        message:
          type: string
          description: OneBot11 bridge inbound message summaries may include bot, conversation, sender, and message preview context.
        protocol:
          $ref: '#/components/schemas/LogProtocol'
        plugin_id:
          type: string
        request_id:
          type: string

    LogListResponse:
      type: object
      additionalProperties: false
      required: [items, page]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LogSummary'
        page:
          $ref: '#/components/schemas/LogPage'

    LogPageDirection:
      type: string
      enum: [older, newer]
      default: older

    LogPage:
      type: object
      additionalProperties: false
      required: [limit, has_older, has_newer, older_cursor, newer_cursor]
      properties:
        limit:
          type: integer
          minimum: 1
        has_older:
          type: boolean
        has_newer:
          type: boolean
        older_cursor:
          type: string
          nullable: true
          description: Opaque cursor used to request the next older page relative to the current oldest item.
        newer_cursor:
          type: string
          nullable: true
          description: Opaque cursor used to request the next newer page relative to the current newest item.

    LogDetailResponse:
      allOf:
        - $ref: '#/components/schemas/LogSummary'
        - type: object
          additionalProperties: false
          required: [details]
          properties:
            details:
              type: object
              additionalProperties: true
              description: Redacted structured detail payload. OneBot11 log details keep the canonical structured form and may omit protocol-native mirror fields when the value can be derived directly from retained fields such as sender, event_timestamp, conversation_id, or message_id.

    LivenessStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: ok

    ReadinessStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, degraded, setup_required, failed]
        reason:
          type: string
        reason_codes:
          type: array
          items:
            type: string
        checks:
          type: object
          additionalProperties: false
          properties:
            config:
              type: string
            database:
              type: string
            runtime:
              type: string
            adapter:
              type: string
            render:
              type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/DiagnosticIssue'
        recovery_summary:
          $ref: '#/components/schemas/RecoveryCompatibilitySummary'

    DiagnosticIssue:
      type: object
      additionalProperties: false
      required: [code, severity, summary]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [ok, warning, error]
        summary:
          type: string
        remediation:
          type: string

    RecoveryCompatibilityIssue:
      type: object
      additionalProperties: false
      required: [code, severity, summary]
      properties:
        code:
          type: string
        severity:
          type: string
          enum: [warning, error]
        summary:
          type: string
        remediation:
          type: string

    RecoveryCompatibilitySkippedPlugin:
      type: object
      additionalProperties: false
      required: [plugin_id, reason_code, summary, review_id, review_status]
      properties:
        plugin_id:
          type: string
        version:
          type: string
        reason_code:
          type: string
        summary:
          type: string
        review_id:
          type: string
        review_status:
          type: string
          enum: [pending, confirmed]
        reviewed_at:
          type: string
          format: date-time
        reviewed_by:
          type: string
        manual_action:
          type: string
        manifest_path:
          type: string

    RecoveryCompatibilityAuditItem:
      type: object
      additionalProperties: false
      required: [review_id, plugin_id, reason_code, summary]
      properties:
        review_id:
          type: string
        plugin_id:
          type: string
        reason_code:
          type: string
        summary:
          type: string
        version:
          type: string

    RecoveryCompatibilityAuditEntry:
      type: object
      additionalProperties: false
      required: [task_id, created_at, operator_id, note, items]
      properties:
        task_id:
          type: string
        created_at:
          type: string
          format: date-time
        operator_id:
          type: string
        note:
          type: string
          maxLength: 500
        items:
          type: array
          items:
            $ref: '#/components/schemas/RecoveryCompatibilityAuditItem'

    RecoveryConfirmRequest:
      type: object
      additionalProperties: false
      required: [review_ids]
      properties:
        review_ids:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            minLength: 1
        note:
          type: string
          maxLength: 500

    RecoveryCompatibilitySummary:
      type: object
      additionalProperties: false
      required: [status, phase, operation, created_at, updated_at]
      properties:
        status:
          type: string
          enum: [pending, compatible, degraded, blocked]
        phase:
          type: string
          enum: [pre_restore, post_startup]
        operation:
          type: string
          enum: [restore, upgrade, rollback]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        source_core_version:
          type: string
        target_core_version:
          type: string
        source_config_schema_version:
          type: string
        target_config_schema_version:
          type: string
        source_db_schema_version:
          type: string
        target_db_schema_version:
          type: string
        requires_post_start_checks:
          type: boolean
        issues:
          type: array
          items:
            $ref: '#/components/schemas/RecoveryCompatibilityIssue'
        skipped_plugins:
          type: array
          items:
            $ref: '#/components/schemas/RecoveryCompatibilitySkippedPlugin'
        manual_actions:
          type: array
          description: Post-startup degraded summaries keep stable operator actions here; compatible summaries omit this field.
          items:
            type: string
        next_steps:
          type: array
          description: Post-startup degraded summaries keep stable follow-up steps here; compatible summaries omit this field.
          items:
            type: string
        audit:
          type: array
          maxItems: 50
          items:
            $ref: '#/components/schemas/RecoveryCompatibilityAuditEntry'

    TaskStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled, interrupted]

    TaskType:
      type: string
      enum:
        - plugin.install
        - plugin.uninstall
        - plugin.reload
        - backup.create
        - recovery.recheck
        - recovery.confirm
        - restore.apply
        - config.migrate
        - db.migrate
        - runtime.bootstrap
        - render.preview

    TaskErrorSummary:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    TaskResultSummary:
      type: object
      additionalProperties: false
      required: [summary]
      properties:
        summary:
          type: string
        details:
          type: object
          additionalProperties: true

    TaskSummary:
      type: object
      additionalProperties: false
      required: [task_id, task_type, status, summary]
      properties:
        task_id:
          type: string
        task_type:
          $ref: '#/components/schemas/TaskType'
        status:
          $ref: '#/components/schemas/TaskStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/TaskResultSummary'
        error:
          $ref: '#/components/schemas/TaskErrorSummary'

    TaskListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'

    TaskDetailResponse:
      type: object
      additionalProperties: false
      required: [task]
      properties:
        task:
          $ref: '#/components/schemas/TaskSummary'

    TaskAcceptedResponse:
      type: object
      additionalProperties: false
      required: [task_id]
      properties:
        task_id:
          type: string

    RuntimeBootstrapResource:
      type: string
      enum: [chromium, python-runtime, nodejs-runtime]

    RuntimeBootstrapRequest:
      type: object
      additionalProperties: false
      properties:
        resources:
          type: array
          items:
            $ref: '#/components/schemas/RuntimeBootstrapResource'
          uniqueItems: true

    RenderPreviewRequest:
      type: object
      additionalProperties: false
      required: [template, data]
      properties:
        template:
          type: string
          minLength: 1
        theme:
          type: string
          minLength: 1
          default: default
        output:
          type: string
          enum: [png, jpeg]
          default: png
        data:
          type: object
          additionalProperties: true
        draft:
          $ref: '#/components/schemas/RenderTemplateDraft'

    RenderTemplateDraft:
      type: object
      additionalProperties: false
      required: [source]
      properties:
        source:
          $ref: '#/components/schemas/RenderTemplateSource'

    RenderTemplateFiles:
      type: object
      additionalProperties: false
      required: [manifest, html, stylesheet, input_schema]
      properties:
        manifest:
          type: string
          minLength: 1
        html:
          type: string
          minLength: 1
        stylesheet:
          type: string
          minLength: 1
        input_schema:
          type: string
          minLength: 1
          nullable: true

    RenderTemplateValidationStatus:
      type: object
      additionalProperties: false
      required: [valid, checked_at, issue_count]
      properties:
        valid:
          type: boolean
        checked_at:
          type: string
          format: date-time
        issue_count:
          type: integer
          minimum: 0

    RenderTemplateVersion:
      type: object
      additionalProperties: false
      required: [revision_id, template_version, saved_at, kind]
      properties:
        revision_id:
          type: string
          minLength: 1
        template_version:
          type: string
          minLength: 1
        saved_at:
          type: string
          format: date-time
        kind:
          type: string
          enum: [save, rollback]
        message:
          type: string
          nullable: true

    RenderTemplateSummary:
      type: object
      additionalProperties: false
      required: [id, version, width, height, has_input_schema, current_revision_id, updated_at]
      properties:
        id:
          type: string
          minLength: 1
        version:
          type: string
          minLength: 1
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1
        has_input_schema:
          type: boolean
        current_revision_id:
          type: string
          minLength: 1
        updated_at:
          type: string
          format: date-time

    RenderTemplateListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RenderTemplateSummary'

    RenderTemplateDetail:
      allOf:
        - $ref: '#/components/schemas/RenderTemplateSummary'
        - type: object
          additionalProperties: false
          required: [files, current_revision, last_validation]
          properties:
            files:
              $ref: '#/components/schemas/RenderTemplateFiles'
            current_revision:
              $ref: '#/components/schemas/RenderTemplateVersion'
            last_validation:
              $ref: '#/components/schemas/RenderTemplateValidationStatus'

    RenderTemplateDetailResponse:
      type: object
      additionalProperties: false
      required: [template]
      properties:
        template:
          $ref: '#/components/schemas/RenderTemplateDetail'

    RenderTemplateSource:
      type: object
      additionalProperties: false
      required: [manifest_json, html, stylesheet, input_schema_json]
      properties:
        manifest_json:
          type: object
          additionalProperties: true
        html:
          type: string
        stylesheet:
          type: string
        input_schema_json:
          type: object
          additionalProperties: true
          nullable: true

    RenderTemplateSourceResponse:
      type: object
      additionalProperties: false
      required: [template_id, revision_id, source]
      properties:
        template_id:
          type: string
          minLength: 1
        revision_id:
          type: string
          minLength: 1
        source:
          $ref: '#/components/schemas/RenderTemplateSource'

    RenderTemplateSourceUpdateRequest:
      type: object
      additionalProperties: false
      required: [base_revision_id, source, message]
      properties:
        base_revision_id:
          type: string
          minLength: 1
        source:
          $ref: '#/components/schemas/RenderTemplateSource'
        message:
          type: string
          minLength: 1

    RenderTemplateValidationIssue:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        path:
          type: string

    RenderTemplateValidateRequest:
      type: object
      additionalProperties: false
      properties:
        source:
          $ref: '#/components/schemas/RenderTemplateSource'

    RenderTemplateValidateResponse:
      type: object
      additionalProperties: false
      required: [valid, issues, normalized_manifest]
      properties:
        valid:
          type: boolean
        issues:
          type: array
          items:
            $ref: '#/components/schemas/RenderTemplateValidationIssue'
        normalized_manifest:
          type: object
          additionalProperties: true

    RenderTemplateVersionListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RenderTemplateVersion'

    RenderTemplateRollbackRequest:
      type: object
      additionalProperties: false
      required: [target_revision_id, base_revision_id, message]
      properties:
        target_revision_id:
          type: string
          minLength: 1
        base_revision_id:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1

    BlacklistEntry:
      type: object
      additionalProperties: false
      required: [entry_type, target_id, reason, created_at]
      properties:
        entry_type:
          type: string
          enum: [user, group]
        target_id:
          type: string
          minLength: 1
        reason:
          type: string
        created_at:
          type: string
          format: date-time

    GovernanceBlacklistResponse:
      type: object
      additionalProperties: false
      required: [user_entries, group_entries]
      properties:
        user_entries:
          type: array
          items:
            $ref: '#/components/schemas/BlacklistEntry'
        group_entries:
          type: array
          items:
            $ref: '#/components/schemas/BlacklistEntry'

    CommandPermissionLevel:
      type: string
      enum: [super_admin, group_admin, everyone]

    CommandPermissionSource:
      type: string
      enum: [declared, default_level]

    GovernanceCommandCooldown:
      type: object
      additionalProperties: false
      required: [user_command_rate_limit, group_command_rate_limit, cooldown_reply]
      properties:
        user_command_rate_limit:
          type: string
          minLength: 1
        group_command_rate_limit:
          type: string
          minLength: 1
        cooldown_reply:
          type: boolean

    GovernanceCommandPolicyEntry:
      type: object
      additionalProperties: false
      required: [plugin_id, plugin_name, command, aliases, declared_permission, effective_permission, permission_source]
      properties:
        plugin_id:
          type: string
          minLength: 1
        plugin_name:
          type: string
          minLength: 1
        command:
          type: string
          minLength: 1
        aliases:
          type: array
          items:
            type: string
        declared_permission:
          $ref: '#/components/schemas/CommandPermissionLevel'
          nullable: true
        effective_permission:
          $ref: '#/components/schemas/CommandPermissionLevel'
        permission_source:
          $ref: '#/components/schemas/CommandPermissionSource'

    GovernanceCommandPolicyResponse:
      type: object
      additionalProperties: false
      required: [default_level, cooldown, commands]
      properties:
        default_level:
          $ref: '#/components/schemas/CommandPermissionLevel'
        cooldown:
          $ref: '#/components/schemas/GovernanceCommandCooldown'
        commands:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceCommandPolicyEntry'

    PluginRegistrationState:
      type: string
      enum: [installed, removed]

    PluginDesiredState:
      type: string
      enum: [enabled, disabled]

    PluginRuntimeState:
      type: string
      enum: [starting, running, stopping, crashed, backoff, dead_letter, stopped]

    PluginRole:
      type: string
      enum: [builtin, user, example, dev]

    PluginRuntimeFamily:
      type: string
      enum: [python, nodejs]

    PluginPackageType:
      type: string
      enum: [managed_runtime, dev_source]

    PluginPlatform:
      type: string
      enum: [windows-x64, linux-x64]

    PluginTrustSummary:
      type: object
      additionalProperties: false
      required: [level, label]
      properties:
        level:
          type: string
          enum: [official, third_party, unverified, development]
        label:
          type: string

    PluginSourceSummary:
      type: object
      additionalProperties: false
      required: [root, verified]
      properties:
        root:
          type: string
        package_source_type:
          type: string
          enum: [local_zip, local_directory, remote_url]
        package_source_ref:
          type: string
        verified:
          type: boolean

    PluginCommandSummary:
      type: object
      additionalProperties: false
      required: [name]
      properties:
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        description:
          type: string
        usage:
          type: string
        permission:
          type: string

    PluginSummary:
      type: object
      additionalProperties: false
      required: [id, name, role, registration_state, desired_state, runtime_state, commands]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/PluginRole'
        registration_state:
          $ref: '#/components/schemas/PluginRegistrationState'
        desired_state:
          $ref: '#/components/schemas/PluginDesiredState'
        runtime_state:
          $ref: '#/components/schemas/PluginRuntimeState'
        display_state:
          type: string
        source:
          $ref: '#/components/schemas/PluginSourceSummary'
        trust:
          $ref: '#/components/schemas/PluginTrustSummary'
        commands:
          type: array
          items:
            $ref: '#/components/schemas/PluginCommandSummary'
        command_conflicts:
          type: array
          items:
            type: string

    PluginListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginSummary'

    PluginPermissionRequirement:
      type: string
      enum: [required, optional]

    PluginPermissionStatus:
      type: string
      enum: [granted, not_granted]

    PluginGrantSource:
      type: string
      enum: [builtin_auto, config_auto, persisted]

    PluginPermissionSource:
      type: string
      enum: [builtin_auto, config_auto, persisted, none]

    PluginPermissionSummary:
      type: object
      additionalProperties: false
      required: [capability, requirement, status, source]
      properties:
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        requirement:
          $ref: '#/components/schemas/PluginPermissionRequirement'
        status:
          $ref: '#/components/schemas/PluginPermissionStatus'
        source:
          $ref: '#/components/schemas/PluginPermissionSource'
        expires_at:
          type: string
          format: date-time
          nullable: true

    PluginDependencies:
      type: object
      additionalProperties: false
      properties:
        python:
          type: array
          items:
            type: string
        nodejs:
          type: array
          items:
            type: string

    PluginWebhookScope:
      type: object
      additionalProperties: false
      required: [route, auth_strategy, header, secret_ref]
      properties:
        route:
          type: string
        auth_strategy:
          type: string
          enum: [fixed_token, hmac_sha256]
        header:
          type: string
        secret_ref:
          type: string
        source_ips:
          type: array
          items:
            type: string

    PluginScopes:
      type: object
      additionalProperties: false
      properties:
        http_hosts:
          type: array
          items:
            type: string
        storage_roots:
          type: array
          items:
            type: string
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/PluginWebhookScope'

    PluginScreenshot:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
        alt:
          type: string

    PluginDetail:
      allOf:
        - $ref: '#/components/schemas/PluginSummary'
        - type: object
          additionalProperties: false
          required: [permissions]
          properties:
            permissions:
              type: array
              items:
                $ref: '#/components/schemas/PluginPermissionSummary'
            version:
              type: string
            runtime:
              $ref: '#/components/schemas/PluginRuntimeFamily'
            type:
              $ref: '#/components/schemas/PluginPackageType'
            entry:
              type: string
            description:
              type: string
            author:
              type: string
            license:
              type: string
            sdk_min_version:
              type: string
            runtime_version:
              type: string
            min_core_version:
              type: string
            data_schema_version:
              type: string
            concurrency:
              type: integer
              minimum: 1
            platforms:
              type: array
              items:
                $ref: '#/components/schemas/PluginPlatform'
            default_config:
              type: object
              additionalProperties: true
            declared_capabilities:
              type: array
              items:
                type: string
                pattern: '^[a-z]+\.[a-z_]+$'
            dependencies:
              $ref: '#/components/schemas/PluginDependencies'
            scopes:
              $ref: '#/components/schemas/PluginScopes'
            icon:
              type: string
            repo:
              type: string
              format: uri
              pattern: '^https://.+$'
            homepage:
              type: string
              format: uri
              pattern: '^https://.+$'
            keywords:
              type: array
              items:
                type: string
            screenshots:
              type: array
              items:
                $ref: '#/components/schemas/PluginScreenshot'
            system_dependencies:
              type: array
              items:
                type: string

    PluginDetailResponse:
      type: object
      additionalProperties: false
      required: [plugin]
      properties:
        plugin:
          $ref: '#/components/schemas/PluginDetail'

    PluginGrantRequest:
      type: object
      additionalProperties: false
      required: [capability]
      properties:
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        expires_at:
          type: string
          format: date-time
          description: Optional absolute UTC RFC3339 expiry timestamp. When omitted, the grant remains valid until revoked.

    PluginGrantSummary:
      type: object
      additionalProperties: false
      required: [plugin_id, capability, source]
      properties:
        plugin_id:
          type: string
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        granted_at:
          type: string
          format: date-time
          nullable: true
        source:
          $ref: '#/components/schemas/PluginGrantSource'
        expires_at:
          type: string
          format: date-time
          nullable: true

    PluginGrantListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginGrantSummary'

    PluginInstallRequest:
      type: object
      additionalProperties: false
      required: [source_type, source]
      properties:
        source_type:
          type: string
          enum: [local_zip, local_directory, remote_url]
        source:
          type: string
          minLength: 1
          description: >
            Local filesystem path to the plugin package or directory,
            or an HTTPS URL to a remote ZIP archive.
        allow_install_scripts:
          type: boolean
          description: >
            Explicitly authorizes install-time scripts for plugins whose manifest
            declares require_install_scripts=true. When omitted or false, the
            install task keeps the default safety policy and may later fail with
            platform.install_script_blocked.

    WebhookAcceptedResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean
