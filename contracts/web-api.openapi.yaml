  /api/logs:
    get:
      summary: List redacted management log summaries for current-session or historical browsing.
      operationId: listLogs
      security:
        - BearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogScope'
          description: >
            Select whether to browse persisted history or only the current
            server boot session. start_at and end_at are only valid when
            scope=history.
        - name: level
          in: query
          required: false
          schema:
            type: array
            uniqueItems: true
            items:
              $ref: '#/components/schemas/LogLevel'
          style: form
          explode: true
          description: Repeat level to include logs matching any selected level.
        - name: source
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: protocol
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogProtocol'
        - name: plugin_id
          in: query
          required: false
          schema:
            type: array
            uniqueItems: true
            items:
              type: string
              minLength: 1
          style: form
          explode: true
          description: Repeat plugin_id to include logs for any selected plugin.
        - name: request_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            minLength: 1
          description: Opaque cursor issued by the server for log history pagination.
        - name: direction
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogPageDirection'
          description: Cursor direction for incremental log loading. When cursor is omitted, the server returns the latest window.
        - name: start_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive UTC RFC3339 lower time bound. Only valid when scope=history.
        - name: end_at
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Inclusive UTC RFC3339 upper time bound. Only valid when scope=history.
      responses:
        '200':
          description: Bounded log summaries using the same whitelist fields as /ws/logs plus cursor window metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

