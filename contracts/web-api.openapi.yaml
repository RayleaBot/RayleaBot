        plugin_id:
          type: string
          minLength: 1
        plugin_name:
          type: string
          minLength: 1
        command:
          type: string
          minLength: 1
        aliases:
          type: array
          items:
            type: string
        command_source:
          $ref: '#/components/schemas/PluginCommandSource'
        declaration_id:
          type: string
          minLength: 1
        declared_permission:
          $ref: '#/components/schemas/CommandPermissionLevel'
          nullable: true
        effective_permission:
          $ref: '#/components/schemas/CommandPermissionLevel'
        permission_source:
          $ref: '#/components/schemas/CommandPermissionSource'

    GovernanceCommandPolicyResponse:
      type: object
      additionalProperties: false
      required: [default_level, cooldown, commands]
      properties:
        default_level:
          $ref: '#/components/schemas/CommandPermissionLevel'
        cooldown:
          $ref: '#/components/schemas/GovernanceCommandCooldown'
        commands:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceCommandPolicyEntry'

    PluginRegistrationState:
      type: string
      enum: [installed, removed]

    PluginDesiredState:
      type: string
      enum: [enabled, disabled]

    PluginRuntimeState:
      type: string
      enum: [starting, running, stopping, crashed, backoff, dead_letter, stopped]

    PluginDisplayState:
      type: string
      enum:
        - discovered
        - invalid_manifest
        - conflict
        - removed
        - enabled
        - enabling
        - running
        - disabling
        - stopping
        - crashed
        - backoff
        - dead_letter
        - disabled

    PluginRole:
      type: string
      enum: [builtin, user, example, dev]

    PluginRuntimeFamily:
      type: string
      enum: [python, nodejs]

    PluginPackageType:
      type: string
      enum: [managed_runtime, dev_source]

    PluginPlatform:
      type: string
      enum: [windows-x64, linux-x64, macos-arm64]

    PluginTrustSummary:
      type: object
      additionalProperties: false
      required: [level, label]
      properties:
        level:
          type: string
          enum: [official, third_party, unverified, development]
        label:
          type: string

    PluginSourceSummary:
      type: object
      additionalProperties: false
      required: [root, verified]
      properties:
        root:
          type: string
        package_source_type:
          type: string
          enum: [local_zip, local_directory, remote_url]
        package_source_ref:
          type: string
        verified:
          type: boolean

    PluginCommandSummary:
      type: object
      additionalProperties: false
      required: [name, command_source]
      properties:
        name:
          type: string
        aliases:
          type: array
          items:
            type: string
        description:
          type: string
        usage:
          type: string
        permission:
          type: string
        command_source:
          $ref: '#/components/schemas/PluginCommandSource'
        declaration_id:
          type: string

    PluginSummary:
      type: object
      additionalProperties: false
      required: [id, name, role, registration_state, desired_state, runtime_state, display_state, commands, help]
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        author:
          type: string
        role:
          $ref: '#/components/schemas/PluginRole'
        registration_state:
          $ref: '#/components/schemas/PluginRegistrationState'
        desired_state:
          $ref: '#/components/schemas/PluginDesiredState'
        runtime_state:
          $ref: '#/components/schemas/PluginRuntimeState'
        display_state:
          $ref: '#/components/schemas/PluginDisplayState'
        source:
          $ref: '#/components/schemas/PluginSourceSummary'
        trust:
          $ref: '#/components/schemas/PluginTrustSummary'
        commands:
          type: array
          items:
            $ref: '#/components/schemas/PluginCommandSummary'
        help:
          $ref: '#/components/schemas/PluginHelp'
        command_conflicts:
          type: array
          items:
            type: string
        dead_letter:
          $ref: '#/components/schemas/PluginDeadLetterSummary'

    PluginDeadLetterSummary:
      type: object
      additionalProperties: false
      required: [entered_at, crash_count]
      description: |
        Present only when runtime_state equals `dead_letter`. Captures
        the moment the runtime exhausted its crash-restart budget so the
        management surface can show dwell time and the most recent
        crash error without scraping logs.
      properties:
        entered_at:
          type: string
          format: date-time
        crash_count:
          type: integer
          minimum: 0
        last_error_code:
          type: string
        last_error_message:
          type: string

    PluginHelpItem:
      type: object
      additionalProperties: false
      required: [title]
      properties:
        title:
          type: string
        description:
          type: string
        usage:
          type: string
        command:
          type: string
        permission:
          type: string

    PluginHelpGroup:
      type: object
      additionalProperties: false
      required: [title, items]
      properties:
        title:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginHelpItem'

    PluginHelp:
      type: object
      additionalProperties: false
      required: [groups]
      properties:
        title:
          type: string
        summary:
          type: string
        groups:
          type: array
          items:
            $ref: '#/components/schemas/PluginHelpGroup'

    PluginListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginSummary'

    PluginPermissionRequirement:
      type: string
      enum: [required, optional]

    PluginPermissionStatus:
      type: string
      enum: [granted, not_granted]

    PluginGrantSource:
      type: string
      enum: [builtin_auto, config_auto, persisted]

    PluginPermissionSource:
      type: string
      enum: [builtin_auto, config_auto, persisted, none]

    PluginPermissionSummary:
      type: object
      additionalProperties: false
      required: [capability, requirement, status, source]
      properties:
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        requirement:
          $ref: '#/components/schemas/PluginPermissionRequirement'
        status:
          $ref: '#/components/schemas/PluginPermissionStatus'
        source:
          $ref: '#/components/schemas/PluginPermissionSource'
        expires_at:
          type: string
          format: date-time
          nullable: true

    PluginDependencies:
      type: object
      additionalProperties: false
      properties:
        python:
          type: array
          items:
            type: string
        nodejs:
          type: array
          items:
            type: string

    PluginWebhookScope:
      type: object
      additionalProperties: false
      required: [route, auth_strategy, header, secret_ref]
      properties:
        route:
          type: string
        auth_strategy:
          type: string
          enum: [fixed_token, hmac_sha256]
        header:
          type: string
        secret_ref:
          type: string
        source_ips:
          type: array
          items:
            type: string

    PluginScopes:
      type: object
      additionalProperties: false
      properties:
        http_hosts:
          type: array
          items:
            type: string
        storage_roots:
          type: array
          items:
            type: string
        webhooks:
          type: array
          items:
            $ref: '#/components/schemas/PluginWebhookScope'

    PluginScreenshot:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string
        alt:
          type: string

    PluginManagementUISummary:
      type: object
      additionalProperties: false
      required: [pages]
      properties:
        pages:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PluginManagementUIPage'

    PluginManagementUIPage:
      type: object
      additionalProperties: false
      required: [id, label, entry]
      properties:
        id:
          type: string
          pattern: '^[a-z0-9](?:[a-z0-9._-]{0,62}[a-z0-9])?$'
        label:
          type: string
        entry:
          type: string
          pattern: '^[A-Za-z0-9._/-]+\.html$'

    PluginRenderTemplateSummary:
      type: object
      additionalProperties: false
      required: [path]
      properties:
        path:
          type: string

    PluginDetail:
      allOf:
        - $ref: '#/components/schemas/PluginSummary'
        - type: object
          additionalProperties: false
          required: [permissions]
          properties:
            permissions:
              type: array
              items:
                $ref: '#/components/schemas/PluginPermissionSummary'
            version:
              type: string
            runtime:
              $ref: '#/components/schemas/PluginRuntimeFamily'
            type:
              $ref: '#/components/schemas/PluginPackageType'
            entry:
              type: string
            description:
              type: string
            author:
              type: string
            license:
              type: string
            sdk_min_version:
              type: string
            runtime_version:
              type: string
            min_core_version:
              type: string
            data_schema_version:
              type: string
            concurrency:
              type: integer
              minimum: 1
            platforms:
              type: array
              items:
                $ref: '#/components/schemas/PluginPlatform'
            default_config:
              type: object
              additionalProperties: true
            declared_capabilities:
              type: array
              items:
                type: string
                pattern: '^[a-z]+\.[a-z_]+$'
            dependencies:
              $ref: '#/components/schemas/PluginDependencies'
            scopes:
              $ref: '#/components/schemas/PluginScopes'
            icon:
              type: string
            repo:
              type: string
              format: uri
              pattern: '^https://.+$'
            homepage:
              type: string
              format: uri
              pattern: '^https://.+$'
            keywords:
              type: array
              items:
                type: string
            screenshots:
              type: array
              items:
                $ref: '#/components/schemas/PluginScreenshot'
            management_ui:
              $ref: '#/components/schemas/PluginManagementUISummary'
            render_templates:
              type: array
              items:
                $ref: '#/components/schemas/PluginRenderTemplateSummary'
            system_dependencies:
              type: array
              items:
                type: string

    PluginDetailResponse:
      type: object
      additionalProperties: false
      required: [plugin]
      properties:
        plugin:
          $ref: '#/components/schemas/PluginDetail'

    PluginSettingsResponse:
      type: object
      additionalProperties: false
      required: [plugin_id, values]
      properties:
        plugin_id:
          type: string
        values:
          type: object
          additionalProperties: true

    PluginSettingsUpdateRequest:
      type: object
      additionalProperties: false
      required: [values]
      properties:
        values:
          type: object
          additionalProperties: true

    PluginSettingsUpdateResponse:
      type: object
      additionalProperties: false
      required: [plugin_id, changed_keys, values]
      properties:
        plugin_id:
          type: string
        changed_keys:
          type: array
          items:
            type: string
          uniqueItems: true
        values:
          type: object
          additionalProperties: true

    ThirdPartyPlatform:
      type: string
      enum: [bilibili]

    ThirdPartyAccountSummary:
      type: object
      additionalProperties: false
