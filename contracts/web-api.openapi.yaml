  /api/plugins/{plugin_id}/dead_letter/recover:
    post:
      summary: Restart a plugin that exhausted its crash retries.
      description: >
        Reset the plugin's crash counter and start the runtime again.
        Only accepted when the current runtime_state is `dead_letter`;
        any other state returns 409 with `plugin.not_in_dead_letter`.
        The plugin's webhook routes were already removed when it
        entered dead_letter and remain removed until the recovered
        runtime registers them again.
      operationId: recoverPluginFromDeadLetter
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
