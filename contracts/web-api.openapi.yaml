openapi: 3.1.0
info:
  title: RayleaBot Web API
  version: 0.1.0
  description: >
    Fixture-ready HTTP contract. This file intentionally contains only
    the currently frozen management routes. Other planned
    routes remain TODOs in contracts/README.md and are not formalized here yet.
x-fixtures:
  - fixtures/web-api/ok.healthz-response.yaml
  - fixtures/web-api/ok.setup-admin.yaml
  - fixtures/web-api/ok.session-login.yaml
  - fixtures/web-api/ok.plugins-install-accepted.yaml
  - fixtures/web-api/ok.plugins-enable-response.yaml
  - fixtures/web-api/edge.plugins-disable-response.yaml
  - fixtures/web-api/edge.readyz-degraded-response.yaml
  - fixtures/web-api/edge.setup-admin-already-initialized.yaml
  - fixtures/web-api/edge.session-login-max-sessions.yaml
  - fixtures/web-api/invalid.setup-admin-bad-request.yaml
  - fixtures/web-api/invalid.session-login-bad-credentials.yaml
  - fixtures/web-api/invalid.tasks-cancel-not-cancellable.yaml

paths:
  /healthz:
    get:
      summary: Probe whether the RayleaBot process is alive.
      operationId: getHealthz
      responses:
        '200':
          description: Process liveness status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /readyz:
    get:
      summary: Probe whether the management surface is ready for normal use.
      operationId: getReadyz
      responses:
        '200':
          description: Service is ready or degraded-but-manageable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        '503':
          description: Service is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/admin:
    post:
      summary: Bootstrap the initial management credential source and issue a session token.
      operationId: setupAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Initial management credential source created and session token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session/login:
    post:
      summary: Exchange management credentials for a session token.
      operationId: loginSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Session token issued for later management admission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks:
    get:
      summary: List recent background tasks.
      operationId: listTasks
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: task_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskType'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Recent task snapshots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks/{task_id}:
    get:
      summary: Get a background task snapshot.
      operationId: getTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Latest task snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailResponse'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks/{task_id}/cancel:
    post:
      summary: Request cancellation for a cancellable background task.
      operationId: cancelTask
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '202':
          description: Cancellation request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins:
    get:
      summary: List registered plugins with tri-layer state snapshots.
      operationId: listPlugins
      responses:
        '200':
          description: Plugin list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginListResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}:
    get:
      summary: Get one plugin snapshot.
      operationId: getPlugin
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Latest plugin snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/enable:
    post:
      summary: Set the plugin desired_state to enabled.
      operationId: enablePlugin
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Desired state updated. The runtime may still be catching up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/disable:
    post:
      summary: Set the plugin desired_state to disabled.
      operationId: disablePlugin
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Desired state updated. The runtime may still be stopping the plugin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/install:
    post:
      summary: Start asynchronous plugin installation from a local source.
      operationId: installPlugin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginInstallRequest'
      responses:
        '202':
          description: Installation task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        default:
          $ref: '#/components/responses/Error'

components:
  parameters:
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PluginId:
      name: plugin_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

  responses:
    Error:
      description: Standard structured error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, message_key, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            message_key:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, secret]
      properties:
        identifier:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1

    SessionLoginResponse:
      type: object
      additionalProperties: false
      required: [session_token]
      properties:
        session_token:
          type: string
          minLength: 1
          description: Opaque management session token for later auth=session_token admission.

    LivenessStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: ok

    ReadinessStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, degraded, setup_required, failed]
        reason:
          type: string
        reason_codes:
          type: array
          items:
            type: string
        checks:
          type: object
          additionalProperties: false
          properties:
            config:
              type: string
            database:
              type: string
            runtime:
              type: string
            adapter:
              type: string
            render:
              type: string

    TaskStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled, interrupted]

    TaskType:
      type: string
      enum:
        - plugin.install
        - plugin.uninstall
        - plugin.reload
        - backup.create
        - restore.apply
        - config.migrate
        - db.migrate
        - render.preview

    TaskErrorSummary:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    TaskResultSummary:
      type: object
      additionalProperties: false
      required: [summary]
      properties:
        summary:
          type: string
        details:
          type: object
          additionalProperties: true

    TaskSummary:
      type: object
      additionalProperties: false
      required: [task_id, task_type, status, summary]
      properties:
        task_id:
          type: string
        task_type:
          $ref: '#/components/schemas/TaskType'
        status:
          $ref: '#/components/schemas/TaskStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/TaskResultSummary'
        error:
          $ref: '#/components/schemas/TaskErrorSummary'

    TaskListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'

    TaskDetailResponse:
      type: object
      additionalProperties: false
      required: [task]
      properties:
        task:
          $ref: '#/components/schemas/TaskSummary'

    TaskAcceptedResponse:
      type: object
      additionalProperties: false
      required: [task_id]
      properties:
        task_id:
          type: string

    PluginRegistrationState:
      type: string
      enum: [installed, removed]

    PluginDesiredState:
      type: string
      enum: [enabled, disabled]

    PluginRuntimeState:
      type: string
      enum: [starting, running, stopping, crashed, backoff, dead_letter, stopped]

    PluginSummary:
      type: object
      additionalProperties: false
      required: [id, registration_state, desired_state, runtime_state]
      properties:
        id:
          type: string
        registration_state:
          $ref: '#/components/schemas/PluginRegistrationState'
        desired_state:
          $ref: '#/components/schemas/PluginDesiredState'
        runtime_state:
          $ref: '#/components/schemas/PluginRuntimeState'
        display_state:
          type: string

    PluginListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginSummary'

    PluginDetailResponse:
      type: object
      additionalProperties: false
      required: [plugin]
      properties:
        plugin:
          $ref: '#/components/schemas/PluginSummary'

    PluginInstallRequest:
      type: object
      additionalProperties: false
      required: [source_type, source]
      properties:
        source_type:
          type: string
          enum: [local_zip, local_directory]
        source:
          type: string
          minLength: 1
          description: Local filesystem path to the plugin package or directory.
