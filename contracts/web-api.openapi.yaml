openapi: 3.1.0
info:
  title: RayleaBot Web API
  version: 0.1.0
  description: >
    Fixture-ready HTTP contract. This file intentionally contains only
    the currently frozen management routes. Other planned
    routes remain TODOs in contracts/README.md and are not formalized here yet.
x-fixtures:
  - fixtures/web-api/ok.healthz-response.yaml
  - fixtures/web-api/ok.setup-admin.yaml
  - fixtures/web-api/ok.setup-status.yaml
  - fixtures/web-api/ok.session-login.yaml
  - fixtures/web-api/ok.session-logout.yaml
  - fixtures/web-api/ok.session-launcher-token.yaml
  - fixtures/web-api/ok.session-launcher-admission.yaml
  - fixtures/web-api/ok.config-get-response.yaml
  - fixtures/web-api/ok.config-update-response.yaml
  - fixtures/web-api/ok.system-status.yaml
  - fixtures/web-api/ok.system-shutdown.yaml
  - fixtures/web-api/ok.system-backup-accepted.yaml
  - fixtures/web-api/ok.system-diagnostics-export.yaml
  - fixtures/web-api/ok.logs-list-response.yaml
  - fixtures/web-api/ok.tasks-list-response.yaml
  - fixtures/web-api/ok.task-detail-response.yaml
  - fixtures/web-api/ok.task-detail-succeeded-install.yaml
  - fixtures/web-api/ok.task-cancel-accepted.yaml
  - fixtures/web-api/ok.plugins-install-accepted.yaml
  - fixtures/web-api/ok.plugins-install-accepted-with-scripts.yaml
  - fixtures/web-api/ok.plugins-install-remote-url.yaml
  - fixtures/web-api/ok.plugins-list-response.yaml
  - fixtures/web-api/ok.plugin-detail-response.yaml
  - fixtures/web-api/ok.plugins-enable-response.yaml
  - fixtures/web-api/ok.plugins-grants-list-response.yaml
  - fixtures/web-api/ok.plugins-grant-response.yaml
  - fixtures/web-api/ok.plugins-grant-with-expiry-response.yaml
  - fixtures/web-api/ok.webhook-accepted.yaml
  - fixtures/web-api/edge.task-detail-running-install.yaml
  - fixtures/web-api/edge.task-detail-failed-install.yaml
  - fixtures/web-api/edge.task-detail-failed-install-script-blocked.yaml
  - fixtures/web-api/edge.plugins-disable-response.yaml
  - fixtures/web-api/edge.plugins-command-conflict-response.yaml
  - fixtures/web-api/edge.plugins-enable-permission-pending-expired-grant.yaml
  - fixtures/web-api/edge.readyz-degraded-response.yaml
  - fixtures/web-api/edge.logs-empty-response.yaml
  - fixtures/web-api/edge.setup-admin-already-initialized.yaml
  - fixtures/web-api/edge.session-login-max-sessions.yaml
  - fixtures/web-api/edge.session-login-rate-limited.yaml
  - fixtures/web-api/invalid.setup-admin-bad-request.yaml
  - fixtures/web-api/invalid.session-login-bad-credentials.yaml
  - fixtures/web-api/invalid.auth-missing-token.yaml
  - fixtures/web-api/invalid.auth-invalid-bearer.yaml
  - fixtures/web-api/invalid.session-launcher-admission-invalid-token.yaml
  - fixtures/web-api/invalid.config-update-invalid.yaml
  - fixtures/web-api/invalid.plugins-grant-invalid-expires-at.yaml
  - fixtures/web-api/ok.plugins-reload-response.yaml
  - fixtures/web-api/ok.plugins-uninstall-accepted.yaml
  - fixtures/web-api/invalid.plugins-reload-not-enabled.yaml
  - fixtures/web-api/invalid.plugins-uninstall-not-found.yaml
  - fixtures/web-api/invalid.tasks-cancel-not-cancellable.yaml

paths:
  /healthz:
    get:
      summary: Probe whether the RayleaBot process is alive.
      operationId: getHealthz
      responses:
        '200':
          description: Process liveness status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /readyz:
    get:
      summary: Probe whether the management surface is ready for normal use.
      operationId: getReadyz
      responses:
        '200':
          description: Service is ready or degraded-but-manageable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        '503':
          description: Service is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/admin:
    post:
      summary: Bootstrap the initial management credential source and issue a session token.
      operationId: setupAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Initial management credential source created and session token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/status:
    get:
      summary: Query whether the initial management credential source has been bootstrapped.
      operationId: getSetupStatus
      responses:
        '200':
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/session/login:
    post:
      summary: Exchange management credentials for a session token.
      description: >
        When the configured max_sessions limit is already reached, the service
        may recycle the oldest active management session before issuing a new one.
      operationId: loginSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Session token issued for later management admission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session:
    delete:
      summary: Invalidate the current session token.
      operationId: logoutSession
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Session invalidated.
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session/launcher-token:
    post:
      summary: Issue a single-use short-lived token for local Launcher bootstrap.
      operationId: issueLauncherToken
      responses:
        '200':
          description: Single-use launcher token issued for a local loopback Launcher bootstrap.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LauncherTokenResponse'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session/launcher-admission:
    post:
      summary: Consume a single-use launcher token and issue a normal management session token.
      description: >
        When the configured max_sessions limit is already reached, the service
        may recycle the oldest active management session before issuing a new one.
      operationId: admitLauncherSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LauncherAdmissionRequest'
      responses:
        '200':
          description: Launcher token consumed and management session issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/config:
    get:
      summary: Query the current effective management configuration snapshot.
      operationId: getConfig
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current effective config snapshot with sensitive fields redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSnapshotResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Validate and persist a new management configuration snapshot.
      operationId: updateConfig
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigDocument'
      responses:
        '200':
          description: Config written successfully. restart_required indicates whether a restart is still needed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigUpdateResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/status:
    get:
      summary: Query the current system operational status.
      operationId: getSystemStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current system status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/shutdown:
    post:
      summary: Request a graceful server shutdown.
      operationId: shutdownSystem
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Shutdown request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemShutdownResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/backup:
    post:
      summary: Start an asynchronous online backup task.
      operationId: createBackup
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Backup task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/diagnostics/export:
    get:
      summary: Export a bounded diagnostics bundle for support and recovery triage.
      operationId: exportDiagnostics
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Diagnostics ZIP archive.
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks:
    get:
      summary: List recent background tasks.
      operationId: listTasks
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskStatus'
        - name: task_type
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TaskType'
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        '200':
          description: Recent task snapshots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks/{task_id}:
    get:
      summary: Get a background task snapshot.
      operationId: getTask
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '200':
          description: Latest task snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/tasks/{task_id}/cancel:
    post:
      summary: Request cancellation for a cancellable background task.
      operationId: cancelTask
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TaskId'
      responses:
        '202':
          description: Cancellation request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/logs:
    get:
      summary: List recent redacted management log summaries.
      operationId: listLogs
      security:
        - BearerAuth: []
      parameters:
        - name: level
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/LogLevel'
        - name: source
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: plugin_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: request_id
          in: query
          required: false
          schema:
            type: string
            minLength: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: Recent bounded log summaries using the same whitelist fields as /ws/logs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins:
    get:
      summary: List registered plugins with tri-layer state snapshots.
      operationId: listPlugins
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Plugin list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginListResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/enable:
    post:
      summary: Set the plugin desired_state to enabled.
      operationId: enablePlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Desired state updated. The runtime may still be catching up.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/disable:
    post:
      summary: Set the plugin desired_state to disabled.
      operationId: disablePlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Desired state updated. The runtime may still be stopping the plugin.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/reload:
    post:
      summary: Restart the plugin runtime without changing desired_state.
      operationId: reloadPlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Reload accepted. The runtime may still be restarting.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/grants:
    get:
      summary: List the plugin's currently effective grants.
      operationId: listPluginGrants
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Current effective grants after expiry filtering.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginGrantListResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Grant one declared capability to a plugin.
      operationId: grantPluginCapability
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginGrantRequest'
      responses:
        '200':
          description: Capability grant persisted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginGrantSummary'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}/grants/{capability}:
    delete:
      summary: Revoke one capability grant from a plugin.
      operationId: revokePluginCapabilityGrant
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
        - name: capability
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z]+\.[a-z_]+$'
      responses:
        '204':
          description: Capability grant revoked.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/{plugin_id}:
    get:
      summary: Get one plugin snapshot.
      operationId: getPlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '200':
          description: Latest plugin snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PluginDetailResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Uninstall a plugin asynchronously.
      operationId: uninstallPlugin
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PluginId'
      responses:
        '202':
          description: Uninstall task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/plugins/install:
    post:
      summary: Start asynchronous plugin installation from a local source.
      operationId: installPlugin
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PluginInstallRequest'
      responses:
        '202':
          description: Installation task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/webhooks/{plugin_id}/{route}:
    post:
      summary: Receive a controlled plugin webhook and enqueue a webhook.received event for the target plugin.
      operationId: postPluginWebhook
      parameters:
        - $ref: '#/components/parameters/PluginId'
        - name: route
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-z0-9](?:[a-z0-9_-]{0,31})$'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
          text/plain:
            schema:
              type: string
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '202':
          description: Webhook request accepted for controlled dispatch.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Session token issued by /api/session/login or /api/setup/admin,
        passed as a Bearer token in the Authorization header.

  parameters:
    TaskId:
      name: task_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1
    PluginId:
      name: plugin_id
      in: path
      required: true
      schema:
        type: string
        minLength: 1

  responses:
    Error:
      description: Standard structured error response.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  schemas:
    ErrorEnvelope:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, message_key, request_id]
          properties:
            code:
              type: string
            message:
              type: string
            message_key:
              type: string
            request_id:
              type: string
            details:
              type: object
              additionalProperties: true

    SessionLoginRequest:
      type: object
      additionalProperties: false
      required: [identifier, secret]
      properties:
        identifier:
          type: string
          minLength: 1
        secret:
          type: string
          minLength: 1

    SessionLoginResponse:
      type: object
      additionalProperties: false
      required: [session_token]
      properties:
        session_token:
          type: string
          minLength: 1
          description: Opaque management session token for later BearerAuth or auth=session_token admission.

    SetupStatusResponse:
      type: object
      additionalProperties: false
      required: [initialized]
      properties:
        initialized:
          type: boolean
          description: Whether the initial management credential source has been bootstrapped.

    LauncherTokenResponse:
      type: object
      additionalProperties: false
      required: [launcher_token]
      properties:
        launcher_token:
          type: string
          minLength: 1
          description: Single-use short-lived token for Launcher admission. Valid for one use only.

    LauncherAdmissionRequest:
      type: object
      additionalProperties: false
      required: [launcher_token]
      properties:
        launcher_token:
          type: string
          minLength: 1
          description: Single-use short-lived launcher token obtained from /api/session/launcher-token.

    ConfigDocument:
      $ref: './config.user.schema.json'

    ConfigSnapshotResponse:
      type: object
      additionalProperties: false
      required: [config]
      properties:
        config:
          $ref: '#/components/schemas/ConfigDocument'
        redacted_fields:
          type: array
          items:
            type: string

    ConfigUpdateResponse:
      type: object
      additionalProperties: false
      required: [config, restart_required]
      properties:
        config:
          $ref: '#/components/schemas/ConfigDocument'
        redacted_fields:
          type: array
          items:
            type: string
        restart_required:
          type: boolean
          description: Whether a server restart is required before the new config takes effect.

    SystemStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [running, shutting_down]
        adapter_state:
          type: string
        active_plugins:
          type: integer
          minimum: 0
        uptime_seconds:
          type: integer
          minimum: 0

    SystemShutdownResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean

    LogLevel:
      type: string
      enum: [debug, info, warn, error]

    LogSummary:
      type: object
      additionalProperties: false
      required: [timestamp, level, source, message]
      properties:
        timestamp:
          type: string
        level:
          $ref: '#/components/schemas/LogLevel'
        source:
          type: string
        message:
          type: string
        plugin_id:
          type: string
        request_id:
          type: string

    LogListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/LogSummary'

    LivenessStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          const: ok

    ReadinessStatusResponse:
      type: object
      additionalProperties: false
      required: [status]
      properties:
        status:
          type: string
          enum: [ready, degraded, setup_required, failed]
        reason:
          type: string
        reason_codes:
          type: array
          items:
            type: string
        checks:
          type: object
          additionalProperties: false
          properties:
            config:
              type: string
            database:
              type: string
            runtime:
              type: string
            adapter:
              type: string
            render:
              type: string

    TaskStatus:
      type: string
      enum: [pending, running, succeeded, failed, cancelled, interrupted]

    TaskType:
      type: string
      enum:
        - plugin.install
        - plugin.uninstall
        - plugin.reload
        - backup.create
        - restore.apply
        - config.migrate
        - db.migrate
        - render.preview

    TaskErrorSummary:
      type: object
      additionalProperties: false
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties: true

    TaskResultSummary:
      type: object
      additionalProperties: false
      required: [summary]
      properties:
        summary:
          type: string
        details:
          type: object
          additionalProperties: true

    TaskSummary:
      type: object
      additionalProperties: false
      required: [task_id, task_type, status, summary]
      properties:
        task_id:
          type: string
        task_type:
          $ref: '#/components/schemas/TaskType'
        status:
          $ref: '#/components/schemas/TaskStatus'
        progress:
          type: integer
          minimum: 0
          maximum: 100
        summary:
          type: string
        started_at:
          type: string
          format: date-time
        finished_at:
          type: string
          format: date-time
        result:
          $ref: '#/components/schemas/TaskResultSummary'
        error:
          $ref: '#/components/schemas/TaskErrorSummary'

    TaskListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'

    TaskDetailResponse:
      type: object
      additionalProperties: false
      required: [task]
      properties:
        task:
          $ref: '#/components/schemas/TaskSummary'

    TaskAcceptedResponse:
      type: object
      additionalProperties: false
      required: [task_id]
      properties:
        task_id:
          type: string

    PluginRegistrationState:
      type: string
      enum: [installed, removed]

    PluginDesiredState:
      type: string
      enum: [enabled, disabled]

    PluginRuntimeState:
      type: string
      enum: [starting, running, stopping, crashed, backoff, dead_letter, stopped]

    PluginRole:
      type: string
      enum: [builtin, user, example, dev]

    PluginTrustSummary:
      type: object
      additionalProperties: false
      required: [level, label]
      properties:
        level:
          type: string
          enum: [official, third_party, unverified, development]
        label:
          type: string

    PluginSourceSummary:
      type: object
      additionalProperties: false
      required: [root, verified]
      properties:
        root:
          type: string
        package_source_type:
          type: string
          enum: [local_zip, local_directory, remote_url]
        package_source_ref:
          type: string
        verified:
          type: boolean

    PluginSummary:
      type: object
      additionalProperties: false
      required: [id, name, role, registration_state, desired_state, runtime_state]
      properties:
        id:
          type: string
        name:
          type: string
        role:
          $ref: '#/components/schemas/PluginRole'
        registration_state:
          $ref: '#/components/schemas/PluginRegistrationState'
        desired_state:
          $ref: '#/components/schemas/PluginDesiredState'
        runtime_state:
          $ref: '#/components/schemas/PluginRuntimeState'
        display_state:
          type: string
        source:
          $ref: '#/components/schemas/PluginSourceSummary'
        trust:
          $ref: '#/components/schemas/PluginTrustSummary'
        command_conflicts:
          type: array
          items:
            type: string

    PluginListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginSummary'

    PluginDetailResponse:
      type: object
      additionalProperties: false
      required: [plugin]
      properties:
        plugin:
          $ref: '#/components/schemas/PluginSummary'

    PluginGrantRequest:
      type: object
      additionalProperties: false
      required: [capability]
      properties:
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        expires_at:
          type: string
          format: date-time
          description: Optional absolute UTC RFC3339 expiry timestamp. When omitted, the grant remains valid until revoked.

    PluginGrantSummary:
      type: object
      additionalProperties: false
      required: [plugin_id, capability, granted_at]
      properties:
        plugin_id:
          type: string
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        granted_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
          nullable: true

    PluginGrantListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginGrantSummary'

    PluginInstallRequest:
      type: object
      additionalProperties: false
      required: [source_type, source]
      properties:
        source_type:
          type: string
          enum: [local_zip, local_directory, remote_url]
        source:
          type: string
          minLength: 1
          description: >
            Local filesystem path to the plugin package or directory,
            or an HTTPS URL to a remote ZIP archive.
        allow_install_scripts:
          type: boolean
          description: >
            Explicitly authorizes install-time scripts for plugins whose manifest
            declares require_install_scripts=true. When omitted or false, the
            install task keeps the default safety policy and may later fail with
            platform.install_script_blocked.

    WebhookAcceptedResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean
