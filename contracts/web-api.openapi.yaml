paths:
  /healthz:
    get:
      summary: Probe whether the RayleaBot process is alive.
      operationId: getHealthz
      responses:
        '200':
          description: Process liveness status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /readyz:
    get:
      summary: Probe whether the management surface is ready for normal use.
      operationId: getReadyz
      responses:
        '200':
          description: Service is ready or degraded-but-manageable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        '503':
          description: Service is not ready yet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/admin:
    post:
      summary: Bootstrap the initial management credential source and issue a session token.
      operationId: setupAdmin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Initial management credential source created and session token issued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/setup/status:
    get:
      summary: Query whether the initial management credential source has been bootstrapped.
      operationId: getSetupStatus
      responses:
        '200':
          description: Setup status.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SetupStatusResponse'
        default:
          $ref: '#/components/responses/Error'

  /api/session/login:
    post:
      summary: Exchange management credentials for a session token.
      description: >
        When the configured max_sessions limit is already reached, the service
        may recycle the oldest active management session before issuing a new one.
      operationId: loginSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionLoginRequest'
      responses:
        '200':
          description: Session token issued for later management admission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionLoginResponse'
        '400':
          $ref: '#/components/responses/Error'
        '403':
          $ref: '#/components/responses/Error'
        '429':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/session:
    delete:
      summary: Invalidate the current session token.
      operationId: logoutSession
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Session invalidated.
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/launcher/status:
    get:
      summary: Query the current system status from a local Launcher process.
      description: >
        This endpoint accepts only direct loopback requests and rejects requests
        containing forwarding headers.
      operationId: getLauncherStatus
      responses:
        '200':
          description: Current system status snapshot for local Launcher display.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/launcher/shutdown:
    post:
      summary: Request graceful server shutdown from a local Launcher process.
      description: >
        This endpoint accepts only direct loopback requests and rejects requests
        containing forwarding headers.
      operationId: shutdownFromLauncher
      responses:
        '202':
          description: Shutdown request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemShutdownResponse'
        '403':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/config:
    get:
      summary: Query the current effective management configuration snapshot.
      operationId: getConfig
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current effective config snapshot with sensitive fields redacted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigSnapshotResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'
    put:
      summary: Validate and persist a new management configuration snapshot.
      operationId: updateConfig
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigDocument'
      responses:
        '200':
          description: Config written successfully. restart_required indicates whether a restart is still needed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigUpdateResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/blacklist:
    get:
      summary: Query the current chat-side blacklist snapshot for management review.
      operationId: getGovernanceBlacklist
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user and group blacklist entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceBlacklistResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/blacklist/entries:
    post:
      summary: Upsert one blacklist entry for chat-side governance.
      operationId: upsertGovernanceBlacklistEntry
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceEntryUpsertRequest'
      responses:
        '200':
          description: Blacklist entry stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceEntryUpsertResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/blacklist/entries/{entry_type}/{target_id}:
    delete:
      summary: Delete one blacklist entry for chat-side governance.
      operationId: deleteGovernanceBlacklistEntry
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GovernanceEntryType'
        - $ref: '#/components/parameters/GovernanceTargetId'
      responses:
        '204':
          description: Blacklist entry deleted successfully.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/whitelist:
    get:
      summary: Query the current chat-side whitelist snapshot for management review.
      operationId: getGovernanceWhitelist
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current whitelist enable state and user/group whitelist entries.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceWhitelistResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/whitelist/state:
    put:
      summary: Update the whitelist enable state for command dispatch admission.
      operationId: updateGovernanceWhitelistState
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceWhitelistStateUpdateRequest'
      responses:
        '200':
          description: Latest whitelist enable state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceWhitelistStateResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/whitelist/entries:
    post:
      summary: Upsert one whitelist entry for command dispatch admission.
      operationId: upsertGovernanceWhitelistEntry
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceEntryUpsertRequest'
      responses:
        '200':
          description: Whitelist entry stored successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceEntryUpsertResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/whitelist/entries/{entry_type}/{target_id}:
    delete:
      summary: Delete one whitelist entry for command dispatch admission.
      operationId: deleteGovernanceWhitelistEntry
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/GovernanceEntryType'
        - $ref: '#/components/parameters/GovernanceTargetId'
      responses:
        '204':
          description: Whitelist entry deleted successfully.
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/governance/command-policy:
    get:
      summary: Query the effective command permission and cooldown policy snapshot.
      operationId: getGovernanceCommandPolicy
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Effective command permission defaults, cooldown configuration, and command-level policy view.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceCommandPolicyResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/status:
    get:
      summary: Query the current system operational status.
      operationId: getSystemStatus
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current system status snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemStatusResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/shutdown:
    post:
      summary: Request a graceful server shutdown.
      operationId: shutdownSystem
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Shutdown request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemShutdownResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/backup:
    post:
      summary: Start an asynchronous online backup task.
      operationId: createBackup
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Backup task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11:
    get:
      summary: Query the current OneBot11 protocol snapshot without reconstructing it from system summary fragments.
      operationId: getOneBot11ProtocolSnapshot
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OneBot11 protocol snapshot.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneBot11ProtocolSnapshotResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/targets:
    get:
      summary: List current OneBot11 group and private message targets.
      operationId: getOneBot11ProtocolTargets
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current OneBot11 selectable targets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneBot11ProtocolTargetsResponse'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/identities/resolve:
    post:
      summary: Resolve OneBot11 user display identities for selected targets.
      operationId: resolveOneBot11ProtocolIdentities
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OneBot11IdentityResolveRequest'
      responses:
        '200':
          description: Resolved OneBot11 identities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneBot11IdentityResolveResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/compatibility:
    get:
      summary: Query the formal OneBot11 compatibility matrix for standard, NapCat, and LuckyLillia providers.
      operationId: getOneBot11ProtocolCompatibility
      security:
        - BearerAuth: []
      responses:
        '200':
          description: OneBot11 compatibility matrix.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OneBot11ProtocolCompatibilityResponse'
        '401':
          $ref: '#/components/responses/Error'
        '500':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/reverse-ws:
    get:
      summary: Accept a OneBot11 reverse WebSocket callback session.
      operationId: connectOneBot11ReverseWs
      responses:
        '101':
          description: Reverse WebSocket upgrade accepted.
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/protocols/onebot11/webhook:
    post:
      summary: Accept a OneBot11 webhook event payload.
      operationId: ingestOneBot11Webhook
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '202':
          description: Webhook event accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookAcceptedResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/recovery/recheck:
    post:
      summary: Start an asynchronous recovery.recheck task to recompute and persist the current recovery summary.
      operationId: createRecoveryRecheck
      security:
        - BearerAuth: []
      responses:
        '202':
          description: Recovery recheck task accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskAcceptedResponse'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        default:
          $ref: '#/components/responses/Error'

  /api/system/recovery/confirm:
    post:
