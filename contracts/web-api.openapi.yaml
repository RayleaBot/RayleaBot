      properties:
        platform:
          $ref: '#/components/schemas/ThirdPartyPlatform'
        account_id:
          type: string
          pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,62}[a-z0-9])?$'
        label:
          type: string
        enabled:
          type: boolean
        configured:
          type: boolean
        profile:
          $ref: '#/components/schemas/ThirdPartyAccountProfile'
        credential:
          $ref: '#/components/schemas/ThirdPartyCredentialStatus'
        polling:
          $ref: '#/components/schemas/ThirdPartyAccountPollingStatus'
        updated_at:
          type: string
          format: date-time

    ThirdPartyAccountProfile:
      type: object
      nullable: true
      additionalProperties: false
      required: [uid, nickname, avatar_url]
      properties:
        uid:
          type: string
          pattern: '^[0-9]+$'
        nickname:
          type: string
        avatar_url:
          type: string

    ThirdPartyCredentialState:
      type: string
      enum: [unknown, valid, invalid]

    ThirdPartyCredentialStatus:
      type: object
      additionalProperties: false
      required: [state, checked_at, last_error]
      properties:
        state:
          $ref: '#/components/schemas/ThirdPartyCredentialState'
        checked_at:
          type: string
          nullable: true
          format: date-time
        last_error:
          type: string

    ThirdPartyAccountPollingStatus:
      type: object
      additionalProperties: false
      required: [enabled, last_used_at]
      properties:
        enabled:
          type: boolean
        last_used_at:
          type: string
          nullable: true
          format: date-time

    ThirdPartyAccountsResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ThirdPartyAccountSummary'

    ThirdPartyAccountUpsertRequest:
      type: object
      additionalProperties: false
      required: [label, enabled]
      properties:
        label:
          type: string
        enabled:
          type: boolean
        cookie:
          type: string
          minLength: 1

    ThirdPartyAccountUpsertResponse:
      type: object
      additionalProperties: false
      required: [account]
      properties:
        account:
          $ref: '#/components/schemas/ThirdPartyAccountSummary'

    BilibiliQRCodeLoginState:
      type: string
      enum: [pending_scan, pending_confirm, expired, succeeded]

    BilibiliQRCodeLoginCreateResponse:
      type: object
      additionalProperties: false
      required: [login_id, qrcode_url, expires_at, state]
      properties:
        login_id:
          type: string
          pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'
        qrcode_url:
          type: string
          minLength: 1
        expires_at:
          type: string
          format: date-time
        state:
          $ref: '#/components/schemas/BilibiliQRCodeLoginState'

    BilibiliQRCodeLoginPollResponse:
      type: object
      additionalProperties: false
      required: [login_id, state, expires_at, cookie, account]
      properties:
        login_id:
          type: string
          pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'
        state:
          $ref: '#/components/schemas/BilibiliQRCodeLoginState'
        expires_at:
          type: string
          format: date-time
        cookie:
          type: string
          nullable: true
        account:
          $ref: '#/components/schemas/ThirdPartyAccountProfile'

    BilibiliSourceState:
      type: string
      enum: [disabled, idle, connecting, connected, degraded, failed]

    BilibiliSourceLiveStatus:
      type: object
      additionalProperties: false
      required: [watched_rooms, connected_rooms, failed_rooms, fallback_polling, last_event_at, last_error]
      properties:
        watched_rooms:
          type: integer
          minimum: 0
        connected_rooms:
          type: integer
          minimum: 0
        failed_rooms:
          type: integer
          minimum: 0
        fallback_polling:
          type: boolean
        last_event_at:
          type: string
          nullable: true
          format: date-time
        last_error:
          type: string

    BilibiliSourceDynamicStatus:
      type: object
      additionalProperties: false
      required: [enabled, interval_seconds, watched_uids, auto_follow, last_poll_at, last_event_at, last_error]
      properties:
        enabled:
          type: boolean
        interval_seconds:
          type: integer
          minimum: 1
        watched_uids:
          type: integer
          minimum: 0
        auto_follow:
          type: boolean
        last_poll_at:
          type: string
          nullable: true
          format: date-time
        last_event_at:
          type: string
          nullable: true
          format: date-time
        last_error:
          type: string

    BilibiliSourceStatusResponse:
      type: object
      additionalProperties: false
      required: [status, summary, live, dynamic, accounts]
      properties:
        status:
          $ref: '#/components/schemas/BilibiliSourceState'
        summary:
          type: string
        live:
          $ref: '#/components/schemas/BilibiliSourceLiveStatus'
        dynamic:
          $ref: '#/components/schemas/BilibiliSourceDynamicStatus'
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/ThirdPartyAccountSummary'

    BilibiliSourceRestartResponse:
      type: object
      additionalProperties: false
      required: [accepted, status]
      properties:
        accepted:
          type: boolean
        status:
          $ref: '#/components/schemas/BilibiliSourceStatusResponse'

    PluginSecretValues:
      type: object
      propertyNames:
        type: string
        pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'
      additionalProperties:
        type: string

    PluginSecretsResponse:
      type: object
      additionalProperties: false
      required: [plugin_id, values]
      properties:
        plugin_id:
          type: string
        values:
          $ref: '#/components/schemas/PluginSecretValues'

    PluginSecretsUpdateRequest:
      type: object
      additionalProperties: false
      required: [values]
      properties:
        values:
          $ref: '#/components/schemas/PluginSecretValues'
        deleted_keys:
          type: array
          items:
            type: string
            pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'
          uniqueItems: true

    PluginSecretsUpdateResponse:
      type: object
      additionalProperties: false
      required: [plugin_id, changed_keys, values]
      properties:
        plugin_id:
          type: string
        changed_keys:
          type: array
          items:
            type: string
            pattern: '^[a-z0-9](?:[a-z0-9_.-]{0,126}[a-z0-9])?$'
          uniqueItems: true
        values:
          $ref: '#/components/schemas/PluginSecretValues'

    PluginGrantRequest:
      type: object
      additionalProperties: false
      required: [capability]
      properties:
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        expires_at:
          type: string
          format: date-time
          description: Optional absolute UTC RFC3339 expiry timestamp. When omitted, the grant remains valid until revoked.

    PluginGrantSummary:
      type: object
      additionalProperties: false
      required: [plugin_id, capability, source]
      properties:
        plugin_id:
          type: string
        capability:
          type: string
          pattern: '^[a-z]+\.[a-z_]+$'
        granted_at:
          type: string
          format: date-time
          nullable: true
        source:
          $ref: '#/components/schemas/PluginGrantSource'
        expires_at:
          type: string
          format: date-time
          nullable: true

    PluginGrantListResponse:
      type: object
      additionalProperties: false
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/PluginGrantSummary'

    PluginInstallRequest:
      type: object
      additionalProperties: false
      required: [source_type, source]
      properties:
        source_type:
          type: string
          enum: [local_zip, local_directory, remote_url]
        source:
          type: string
          minLength: 1
          description: >
            Local filesystem path to the plugin package or directory,
            or an HTTPS URL to a remote ZIP archive.
        allow_install_scripts:
          type: boolean
          description: >
            Explicitly authorizes install-time scripts for plugins whose manifest
            declares require_install_scripts=true. When omitted or false, the
            install task keeps the default safety policy and may later fail with
            platform.install_script_blocked.

    WebhookAcceptedResponse:
      type: object
      additionalProperties: false
      required: [accepted]
      properties:
        accepted:
          type: boolean
