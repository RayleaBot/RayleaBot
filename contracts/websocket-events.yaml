version: 1
description: >
  Fixture-ready WebSocket contract. This file freezes the shared
  envelope and the smallest set of server-push event types needed by the
  management surface.
x-fixtures:
  - fixtures/websocket/ok.tasks-updated-running.json
  - fixtures/websocket/ok.tasks-updated-succeeded-recovery-recheck.json
  - fixtures/websocket/ok.tasks-updated-succeeded-recovery-confirm.json
  - fixtures/websocket/ok.tasks-updated-succeeded-install.json
  - fixtures/websocket/ok.tasks-updated-succeeded-runtime-bootstrap.json
  - fixtures/websocket/ok.logs-appended.json
  - fixtures/websocket/ok.logs-appended.protocol-onebot11.json
  - fixtures/websocket/ok.plugins-console-stderr.json
  - fixtures/websocket/ok.events-received-bridge-runtime-observability.json
  - fixtures/websocket/ok.events-received-protocol-snapshot.json
  - fixtures/websocket/edge.tasks-updated-failed-install.json
  - fixtures/websocket/edge.events-received-degraded.json
  - fixtures/websocket/edge.events-received-bridge-runtime-zeroed.json
  - fixtures/websocket/edge.events-received-plugin-crashed.json
  - fixtures/websocket/edge.session-expired.json
  - fixtures/websocket/invalid.events-received-plugin-invalid-display-state.json
  - fixtures/websocket/invalid.events-received-raw-chat.json
  - fixtures/websocket/invalid.events-received-bridge-runtime-raw-leak.json

envelope:
  description: Shared envelope for all management WebSocket channels.
  required:
    - channel
    - type
    - timestamp
    - data
  optional:
    - request_id
    - error
  properties:
    channel:
      type: string
      enum: [logs, events, tasks, plugin_console]
    type:
      type: string
    timestamp:
      type: string
      format: date-time
    data:
      type: object
    request_id:
      type: string
    error:
      type: object
      required: [code, message_key]
      properties:
        code:
          type: string
        message:
          type: string
        message_key:
          type: string
        details:
          type: object

channels:
  - path: /ws/tasks
    channel: tasks
    auth: session_token
    replay_policy: latest_task_updates
    events:
      - event: tasks.updated
        channel: tasks
        description: Push a task snapshot update for a long-running background task.
        payload_schema:
          type: object
          additionalProperties: false
          required: [task_id, task_type, status, summary]
          properties:
            task_id:
              type: string
            task_type:
              type: string
              enum:
                - plugin.install
                - plugin.uninstall
                - plugin.reload
                - backup.create
                - recovery.recheck
                - recovery.confirm
                - restore.apply
                - config.migrate
                - db.migrate
                - runtime.bootstrap
                - render.preview
            status:
              type: string
              enum: [pending, running, succeeded, failed, cancelled, interrupted]
            progress:
              type: integer
              minimum: 0
              maximum: 100
            summary:
              type: string
            result:
              type: object
              additionalProperties: false
              required: [summary]
              properties:
                summary:
                  type: string
                details:
                  type: object
            error:
              type: object
              additionalProperties: false
              required: [code, message]
              properties:
                code:
                  type: string
                message:
                  type: string
                details:
                  type: object
        required: [task_id, task_type, status, summary]
        example_ref: fixtures/websocket/ok.tasks-updated-running.json

  - path: /ws/logs
    channel: logs
    auth: session_token
    replay_policy: summary_only
    events:
      - event: logs.appended
        channel: logs
        description: Push a structured log line summary to the management surface. Deep history browsing stays on /api/logs cursor loading; this channel only replays the recent window for the current server boot session and real-time appends.
        payload_schema:
          type: object
          additionalProperties: false
          required: [log_id, timestamp, level, source, message]
          properties:
            log_id:
              type: string
              minLength: 1
            timestamp:
              type: string
              format: date-time
            level:
              type: string
              enum: [debug, info, warn, error]
            source:
              type: string
            message:
              type: string
              description: OneBot11 bridge inbound message summaries may include bot, conversation, sender, and message preview context.
            protocol:
              type: string
              enum: [onebot11]
            plugin_id:
              type: string
            request_id:
              type: string
        required: [log_id, timestamp, level, source, message]
        example_ref: fixtures/websocket/ok.logs-appended.protocol-onebot11.json

  - path: /ws/events
    channel: events
    auth: session_token
    replay_policy: state_changes_only
    events:
      - event: events.received
        channel: events
        description: >
          Push a management-facing summary event. This event is not a raw chat
          event broadcast and must not be used as a general replay stream for
          protocol events.
        payload_schema:
          description: The payload must satisfy exactly one of the branches below.
          oneOf:
            - type: object
              additionalProperties: false
              required: [service_status, summary]
              properties:
                service_status:
                  type: string
                  enum: [setup_required, stopped, starting, running, degraded, stopping, failed]
                summary:
                  type: string
                reason:
                  type: string
                reason_codes:
                  type: array
                  items:
                    type: string
            - type: object
              additionalProperties: false
              required: [plugin_id, registration_state, desired_state, runtime_state, display_state]
              properties:
                plugin_id:
                  type: string
                registration_state:
                  type: string
                  enum: [installed, removed]
                desired_state:
                  type: string
                  enum: [enabled, disabled]
                runtime_state:
                  type: string
                  enum: [starting, running, stopping, crashed, backoff, dead_letter, stopped]
                display_state:
                  type: string
                  enum:
                    - discovered
                    - invalid_manifest
                    - conflict
                    - removed
                    - enabled
                    - enabling
                    - running
                    - disabling
                    - stopping
                    - crashed
                    - backoff
                    - dead_letter
                    - disabled
            - type: object
              additionalProperties: false
              required: [connection_status, summary]
              properties:
                connection_status:
                  type: string
                  enum: [disconnected, connecting, connected, authenticated, auth_failed, reconnecting]
                summary:
                  type: string
            - type: object
              additionalProperties: false
              required: [event_type, summary]
              properties:
                event_type:
                  type: string
                summary:
                  type: string
            - type: object
              additionalProperties: false
              required: [protocol, protocol_snapshot]
              properties:
                protocol:
                  type: string
                  enum: [onebot11]
                protocol_snapshot:
                  type: object
                  additionalProperties: false
                  required:
                    [protocol, provider, configured_transports, active_transports, transport_status, readiness_status, summary, recent_transport_issues]
                  properties:
                    protocol:
                      type: string
                      enum: [onebot11]
                    provider:
                      type: string
                      enum: [standard, napcat, luckylillia]
                    configured_transports:
                      type: array
                      items:
                        type: string
                        enum: [reverse_ws, forward_ws, http_api, webhook]
                    active_transports:
                      type: array
                      items:
                        type: string
                        enum: [reverse_ws, forward_ws, http_api, webhook]
                    transport_status:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        required: [transport, enabled, configured, endpoint, state, summary]
                        properties:
                          transport:
                            type: string
                            enum: [reverse_ws, forward_ws, http_api, webhook]
                          enabled:
                            type: boolean
                          configured:
                            type: boolean
                          endpoint:
                            type: string
                          state:
                            type: string
                            enum: [idle, listening, connecting, connected, auth_failed, reconnecting, stopped]
                          summary:
                            type: string
                    readiness_status:
                      type: string
                      enum: [ready, degraded, failed, setup_required]
                    summary:
                      type: string
                    recent_transport_issues:
                      type: array
                      items:
                        type: object
                        additionalProperties: false
                        required: [code, severity, summary]
                        properties:
                          code:
                            type: string
                          severity:
                            type: string
                            enum: [info, warning, error]
                          summary:
                            type: string
            - type: object
              additionalProperties: false
              required: [observability_scope, summary, delivered_count, result_count, error_count]
              properties:
                observability_scope:
                  type: string
                  enum: [bridge_runtime]
                summary:
                  type: string
                  description: >
                    Aggregate-only bridge/runtime observability summary. This
                    summary must not include raw message content, protocol
                    payload fragments, request identifiers, sender identifiers,
                    or conversation identifiers.
                last_supported_event_kind:
                  type: string
                last_delivery_outcome:
                  type: string
                  enum: [delivered, error]
                delivered_count:
                  type: integer
                  minimum: 0
                result_count:
                  type: integer
                  minimum: 0
                error_count:
                  type: integer
                  minimum: 0
        example_ref: fixtures/websocket/ok.events-received-protocol-snapshot.json

  - path: /ws/plugins/{id}/console
    channel: plugin_console
    auth: session_token
    replay_policy: ring_buffer
    events:
      - event: plugins.console
        channel: plugin_console
        description: Push a single plugin console frame after platform-side redaction and rate limiting.
        payload_schema:
          type: object
          additionalProperties: false
          required: [plugin_id, stream, text, timestamp]
          properties:
            plugin_id:
              type: string
            stream:
              type: string
              enum: [stdout, stderr, system]
            text:
              type: string
            timestamp:
              type: string
              format: date-time
        required: [plugin_id, stream, text, timestamp]
        example_ref: fixtures/websocket/ok.plugins-console-stderr.json

session_events:
  - event: session_expired
    description: >
      Sent when the current management session expires or is invalidated. The
      client must reconnect with a fresh session token. This event is channel
      agnostic and does not authorize continued use of an expired connection.
    payload_schema:
      type: object
      additionalProperties: false
    required: []
    example_ref: fixtures/websocket/edge.session-expired.json
