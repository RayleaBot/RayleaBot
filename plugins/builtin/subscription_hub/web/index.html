<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f6f8fb" />
    <title>订阅设置</title>
    <link rel="stylesheet" href="./app.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到主要内容</a>
    <main id="main-content" class="page-shell" data-page="subscriptions">
      <header class="page-header">
        <div class="page-heading">
          <p class="eyebrow" translate="no">raylea.subscription-hub</p>
          <h1 id="page-title">订阅设置</h1>
          <p id="page-subtitle">管理 Bilibili 订阅和推送目标</p>
        </div>
        <div class="status-pill" id="status-text" aria-live="polite">正在等待宿主初始化…</div>
      </header>

      <section class="overview-grid" aria-label="订阅中心概览">
        <article class="metric">
          <span class="metric__label">状态</span>
          <strong id="metric-enabled">未载入</strong>
        </article>
        <article class="metric">
          <span class="metric__label">订阅</span>
          <strong id="metric-subscriptions">0 / 0</strong>
        </article>
        <article class="metric">
          <span class="metric__label">事件源</span>
          <strong id="metric-source">平台事件源</strong>
        </article>
        <article class="metric">
          <span class="metric__label">校验</span>
          <strong id="metric-validation">未校验</strong>
        </article>
      </section>

      <section class="layout-grid">
        <aside class="side-stack" aria-label="订阅中心设置">
          <section class="panel">
            <div class="section-title">
              <h2>订阅中心</h2>
              <p>控制订阅中心是否处理平台 Bilibili 事件。</p>
            </div>

            <label class="toggle-row" for="enabled-input">
              <input id="enabled-input" name="enabled" type="checkbox" autocomplete="off" />
              <span>
                <strong>启用订阅推送</strong>
                <small>关闭后保留配置，但不发送订阅卡片。</small>
              </span>
            </label>
          </section>
        </aside>

        <section class="workspace-stack">
          <section class="panel">
            <div class="section-title section-title--inline">
              <div>
                <h2>订阅管理</h2>
                <p>按 UID、目标和推送类型管理订阅。</p>
              </div>
              <button type="button" id="add-subscription-button" class="button button--primary-accent">添加订阅</button>
            </div>

            <div class="toolbar" role="search">
              <label class="field field--search" for="subscription-search-input">
                <span>搜索</span>
                <input id="subscription-search-input" name="subscription_search" type="search" autocomplete="off" placeholder="搜索 UID、名称或目标…" />
              </label>
              <label class="field" for="status-filter-input">
                <span>状态</span>
                <select id="status-filter-input" name="status_filter" autocomplete="off">
                  <option value="all">全部</option>
                  <option value="enabled">启用</option>
                  <option value="disabled">停用</option>
                </select>
              </label>
              <label class="field" for="service-filter-input">
                <span>类型</span>
                <select id="service-filter-input" name="service_filter" autocomplete="off">
                  <option value="all">全部类型</option>
                  <option value="live">直播</option>
                  <option value="video">视频</option>
                  <option value="image_text">图文</option>
                  <option value="article">文章</option>
                  <option value="repost">转发</option>
                </select>
              </label>
            </div>

            <div id="subscription-list" class="subscription-list"></div>
          </section>

          <section class="panel editor-panel" id="subscription-editor-panel">
            <div class="section-title section-title--inline">
              <div>
                <h2 id="subscription-editor-title">订阅编辑</h2>
                <p id="subscription-editor-subtitle">选择一条订阅，或新建订阅。</p>
              </div>
              <button type="button" id="close-editor-button" class="button button--small">收起</button>
            </div>

            <div id="subscription-editor" class="subscription-editor"></div>
          </section>

          <details class="panel advanced-panel">
            <summary>高级配置</summary>
            <p>用于批量编辑、排障和保留原始结构。保存仍会走上方结构化校验。</p>
            <div class="advanced-actions">
              <button type="button" id="export-json-button" class="button button--small">刷新预览</button>
              <button type="button" id="import-json-button" class="button button--small">导入 JSON</button>
            </div>
            <label class="field" for="raw-json-input">
              <span>原始配置</span>
              <textarea id="raw-json-input" name="raw_json" rows="12" spellcheck="false" autocomplete="off"></textarea>
              <small id="raw-json-error" class="field-error"></small>
            </label>
          </details>
        </section>
      </section>

      <footer class="actions">
        <div id="dirty-state" class="dirty-state" aria-live="polite">等待载入</div>
        <div class="footer-buttons">
          <button type="button" id="reload-button" class="button">重新载入</button>
          <button type="button" id="reset-button" class="button">恢复默认</button>
          <button type="button" id="manual-check-button" class="button">事件源状态</button>
          <button type="button" id="preview-button" class="button">打开卡片预览</button>
          <button type="button" id="save-button" class="button button--primary">保存设置</button>
        </div>
      </footer>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
