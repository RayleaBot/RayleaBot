contract: contracts/plugin-protocol.schema.json
case: ok
frames:
  - protocol_version: "1"
    type: action
    timestamp: 1710000404
    plugin_id: repo-watcher
    request_id: local_webhook_0001
    action: event.expose_webhook
    data:
      route: github
      methods:
        - POST
      auth_strategy: hmac_sha256
      header: X-Hub-Signature-256
      signature_prefix: sha256=
      secret_ref: webhook.github.secret
      replay_protection:
        timestamp_header: X-Raylea-Timestamp
        event_id_header: X-Raylea-Event-Id
        tolerance_seconds: 300
        enforce: true
expect:
  valid: true
  notes:
    - webhook exposure is controlled by route, auth strategy, a platform-managed secret reference, and a replay-protection contract.
    - When auth_strategy is hmac_sha256 the signature input concatenates the timestamp digits, a newline, the event id, a newline, and the raw body.
