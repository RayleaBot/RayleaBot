contract: contracts/plugin-protocol.schema.json
case: ok
frames:
  - protocol_version: "1"
    type: action
    timestamp: 1710000405
    plugin_id: repo-watcher
    request_id: local_webhook_grace_0001
    action: event.expose_webhook
    data:
      route: partner
      methods:
        - POST
      auth_strategy: fixed_token
      header: X-Webhook-Token
      secret_ref: webhook.partner.token
      replay_protection:
        timestamp_header: X-Raylea-Timestamp
        event_id_header: X-Raylea-Event-Id
        tolerance_seconds: 600
        enforce: false
expect:
  valid: true
  notes:
    - Grace-mode webhook route accepts partner senders that may omit timestamp or event id headers.
    - The platform still records webhook_replay_grace_observed counts but does not reject the request.
