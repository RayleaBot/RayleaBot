contract: contracts/plugin-protocol.schema.json
case: edge
frames:
  - protocol_version: "1"
    type: action
    timestamp: 1710000207
    plugin_id: notice-logger
    request_id: local_0006
    action: logger.write
    data:
      level: warn
      message: member notice contained masked token
      fields:
        redacted_field: token=__REDACTED__
  - protocol_version: "1"
    type: error
    timestamp: 1710000208
    plugin_id: notice-logger
    request_id: local_0006
    code: plugin.capability_violation
    message: capability is not declared
expect:
  valid: true
  notes:
    - Local platform actions may fail through the same error frame shape used by terminal plugin failures.
