          role: builtin
          registration_state: installed
          desired_state: enabled
          runtime_state: running
          display_state: running
          commands:
            - name: help
              aliases:
                - commands
              description: 显示插件帮助菜单
              usage: /help [插件或命令]
              permission: everyone
          command_conflicts: []
