contract: contracts/plugin-protocol.schema.json
case: edge
frames:
  - protocol_version: "1"
    type: action
    timestamp: 1710000411
    plugin_id: raylea.help
    request_id: local_plugin_list_0001
    action: plugin.list
    data: {}
  - protocol_version: "1"
    type: result
    timestamp: 1710000412
    plugin_id: raylea.help
    request_id: local_plugin_list_0001
    status: success
