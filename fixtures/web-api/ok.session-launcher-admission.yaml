contract: contracts/web-api.openapi.yaml
case: ok
description: Launcher admission consumes a single-use launcher token and issues a normal management session.
request:
  method: POST
  path: /api/session/launcher-admission
  body:
    launcher_token: launcher_token_fixture_0001
response:
  status: 200
  body:
    session_token: session_token_fixture_issued_0002
expect:
  valid: true
  notes:
    - launcher_token is consumed by this request and must not remain reusable.
