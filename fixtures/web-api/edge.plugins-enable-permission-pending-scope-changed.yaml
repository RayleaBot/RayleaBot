contract: contracts/web-api.openapi.yaml
case: edge
description: Enabling a plugin requires grant re-confirmation after manifest scopes changed.
request:
  method: POST
  path: /api/plugins/weather/enable
response:
  status: 409
  body:
    error:
      code: plugin.permission_pending
      message_key: errors.plugin.permission_pending
      details:
        plugin_id: weather
        scope_changed: true
expect:
  valid: true
