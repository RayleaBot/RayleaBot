contract: contracts/web-api.openapi.yaml
case: ok
description: Render preview accepts an unpublished draft source bundle for template editor inspection.
request:
  method: POST
  path: /api/system/render/preview
  body:
    template: help.menu
    theme: default
    output: png
    data:
      title: 草稿帮助菜单
      items:
        - name: weather
          description: 查询天气
          usage: /weather <城市>
    draft:
      source:
        manifest_json:
          id: help.menu
          version: '1'
          entry_html: template.html
          stylesheet: styles.css
          input_schema: input.schema.json
          width: 960
          height: 640
        html: |
          <section class="menu-card">
            <h1>{{ .title }}</h1>
          </section>
        stylesheet: |
          .menu-card {
            display: grid;
            gap: 12px;
          }
        input_schema_json:
          type: object
          additionalProperties: false
          required:
            - title
          properties:
            title:
              type: string
response:
  status: 202
  body:
    task_id: task_render_preview_draft_0001
expect:
  valid: true
