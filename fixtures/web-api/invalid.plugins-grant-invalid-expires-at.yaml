contract: contracts/web-api.openapi.yaml
case: invalid
description: Grant creation rejects expires_at values that are not valid future UTC RFC3339 timestamps.
request:
  method: POST
  path: /api/plugins/weather/grants
  body:
    capability: http.request
    expires_at: not-a-timestamp
response:
  status: 400
  body:
    error:
      code: platform.invalid_request
      message_key: errors.platform.invalid_request
expect:
  valid: true
