contract: contracts/web-api.openapi.yaml
case: ok
description: Plugin list exposes enough metadata for source and trust presentation.
request:
  method: GET
  path: /api/plugins
response:
  status: 200
  body:
    items:
      - id: builtin-help
        name: Builtin Help
        role: builtin
        registration_state: installed
        desired_state: enabled
        runtime_state: running
        display_state: running
        source:
          root: plugins/builtin
          verified: true
        trust:
          level: official
          label: 官方
        commands:
          - name: help
            aliases:
              - 帮助
            description: 查看帮助菜单
            usage: help [命令]
            permission: member
            command_source: manifest
        command_conflicts: []
      - id: weather
        name: Weather
        role: user
        registration_state: installed
        desired_state: enabled
        runtime_state: running
        display_state: running
        source:
          root: plugins/installed
          package_source_type: local_zip
          package_source_ref: C:/plugins/weather.zip
          verified: false
        trust:
          level: unverified
          label: 未验证来源
        commands:
          - name: weather
            aliases:
              - tq
              - 天气
            description: 查询天气
            usage: weather <城市>
            permission: member
            command_source: manifest
        command_conflicts:
          - weather
expect:
  valid: true
  notes:
    - command_conflicts enables explicit fan-out conflict warnings in the Web UI.
    - commands keeps declared plugin commands visible in list and detail surfaces.
