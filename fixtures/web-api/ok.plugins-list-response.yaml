contract: contracts/web-api.openapi.yaml
case: ok
description: Plugin list exposes enough metadata for source and trust presentation.
request:
  method: GET
  path: /api/plugins
response:
  status: 200
  body:
    items:
      - id: weather
        name: Weather
        role: builtin
        registration_state: installed
        desired_state: enabled
        runtime_state: running
        display_state: running
        source:
          root: plugins/builtin
          verified: true
        trust:
          level: official
          label: 官方
        commands:
          - name: weather
            aliases:
              - tq
              - 天气
            description: 查询天气
            usage: weather <城市>
            permission: member
            command_source: manifest
        help:
          title: 天气
          summary: 查询城市天气。
          groups:
            - title: 常用
              items:
                - title: 查询天气
                  description: 查询指定城市的天气。
                  usage: weather <城市>
                  command: weather
                  permission: everyone
        command_conflicts: []
      - id: fortune
        name: Fortune
        role: user
        registration_state: installed
        desired_state: enabled
        runtime_state: running
        display_state: running
        source:
          root: plugins/installed
          package_source_type: local_zip
          package_source_ref: C:/plugins/weather.zip
          verified: false
        trust:
          level: unverified
          label: 未验证来源
        commands:
          - name: fortune
            aliases:
              - 运势
            description: 查看今日运势
            usage: fortune
            permission: member
            command_source: manifest
        help:
          groups: []
        command_conflicts:
          - fortune
expect:
  valid: true
  notes:
    - command_conflicts enables explicit fan-out conflict warnings in the Web UI.
    - commands and help keep declared plugin menu content visible in list and detail surfaces.
