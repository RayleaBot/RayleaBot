contract: contracts/web-api.openapi.yaml
case: ok
description: Recovery from dead_letter resets the crash counter and starts the runtime again.
request:
  method: POST
  path: /api/plugins/weather/dead_letter/recover
response:
  status: 200
  body:
    plugin:
      id: weather
      name: Weather
      role: user
      registration_state: installed
      desired_state: enabled
      runtime_state: starting
      display_state: enabling
      source:
        root: plugins/installed
        package_source_type: local_zip
        package_source_ref: C:/plugins/weather.zip
        verified: false
      trust:
        level: unverified
        label: 未验证来源
      commands:
        - name: weather
          aliases:
            - tq
            - 天气
          description: 查询天气
          usage: weather <城市>
          permission: member
          command_source: manifest
      command_conflicts: []
      permissions:
        - capability: http.request
          requirement: required
          status: granted
          source: persisted
          expires_at: null
expect:
  valid: true
  notes:
    - dead_letter summary clears once the runtime starts again.
    - desired_state stays at enabled; the recovery never flips it.
    - runtime_state transitions from dead_letter to starting and finally to running.
