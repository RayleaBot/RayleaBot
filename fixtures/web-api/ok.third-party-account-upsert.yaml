contract: contracts/web-api.openapi.yaml
case: ok
description: Third-party account upsert saves metadata and reports the account as configured.
request:
  method: PUT
  path: /api/third-party/accounts/bilibili/primary
  body:
    label: 主账号
    enabled: true
    cookie: "SESSDATA=fixture; bili_jct=fixture;"
response:
  status: 200
  body:
    account:
      platform: bilibili
      account_id: primary
      label: 主账号
      enabled: true
      configured: true
      profile:
        uid: "123456"
        nickname: 主账号昵称
        avatar_url: "https://i0.hdslb.com/bfs/face/raylea.jpg"
      credential:
        state: valid
        checked_at: "2026-06-08T08:00:01Z"
        last_error: ""
      polling:
        enabled: true
        last_used_at: null
      updated_at: "2026-06-08T08:00:00Z"
expect:
  valid: true
