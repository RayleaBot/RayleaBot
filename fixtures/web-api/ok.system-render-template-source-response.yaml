contract: contracts/web-api.openapi.yaml
case: ok
description: Template source returns structured manifest and editable source files for the current revision.
request:
  method: GET
  path: /api/system/render/templates/help.menu/source
response:
  status: 200
  body:
    template_id: help.menu
    revision_id: rev_help_menu_0004
    source:
      manifest_json:
        id: help.menu
        version: '1'
        entry_html: template.html
        stylesheet: styles.css
        input_schema: input.schema.json
        width: 960
        height: 640
      html: |
        <section class="menu-card">
          <h1>{{ .title }}</h1>
        </section>
      stylesheet: |
        .menu-card {
          display: grid;
          gap: 12px;
        }
      input_schema_json:
        type: object
        additionalProperties: false
        required:
          - title
        properties:
          title:
            type: string
expect:
  valid: true
