contract: contracts/web-api.openapi.yaml
case: ok
description: Reload restarts the runtime without changing desired_state.
request:
  method: POST
  path: /api/plugins/weather/reload
response:
  status: 200
  body:
    plugin:
      id: weather
      name: Weather
      role: user
      registration_state: installed
      desired_state: enabled
      runtime_state: starting
      display_state: enabling
      source:
        root: plugins/installed
        package_source_type: local_zip
        package_source_ref: C:/plugins/weather.zip
        verified: false
      trust:
        level: unverified
        label: 未验证来源
      commands:
        - name: weather
          aliases:
            - tq
            - 天气
          description: 查询天气
          usage: weather <城市>
          permission: member
      command_conflicts: []
      permissions:
        - capability: http.request
          requirement: required
          status: granted
          source: persisted
          expires_at: null
        - capability: logger.write
          requirement: optional
          status: granted
          source: config_auto
          expires_at: null
expect:
  valid: true
  notes:
    - desired_state remains enabled throughout reload.
    - runtime_state transitions through stopping then starting.
