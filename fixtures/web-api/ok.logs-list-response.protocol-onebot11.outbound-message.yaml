contract: contracts/web-api.openapi.yaml
case: ok
description: Log query returns outbound OneBot11 delivery summaries through the protocol filter.
request:
  method: GET
  path: /api/logs?protocol=onebot11&source=adapter.onebot11&limit=10
response:
  status: 200
  body:
    items:
      - log_id: log_outbound_failed_0001
        timestamp: "2026-04-10T09:18:01Z"
        level: warn
        source: adapter.onebot11
        protocol: onebot11
        message: "echo/echo -> Alice(3001) 发送失败：hello world"
        plugin_id: raylea.echo
        request_id: req_runtime_delivery_0002
      - log_id: log_outbound_delivered_0001
        timestamp: "2026-04-10T09:18:00Z"
        level: info
        source: adapter.onebot11
        protocol: onebot11
        message: "weather/echo -> [测试群(2001)]：hello world"
        plugin_id: weather
        request_id: req_runtime_delivery_0001
    page:
      limit: 10
      has_older: false
      has_newer: false
      older_cursor: null
      newer_cursor: null
expect:
  valid: true
