contract: contracts/web-api.openapi.yaml
case: edge
description: Disable is synchronous and may return while runtime_state is still stopping.
request:
  method: POST
  path: /api/plugins/weather/disable
response:
  status: 200
  body:
    plugin:
      id: weather
      name: Weather
      role: user
      registration_state: installed
      desired_state: disabled
      runtime_state: stopping
      display_state: disabling
      source:
        root: plugins/installed
        package_source_type: local_zip
        package_source_ref: C:/plugins/weather.zip
        verified: false
      trust:
        level: unverified
        label: 未验证来源
      commands:
        - name: weather
          aliases:
            - tq
            - 天气
          description: 查询天气
          usage: weather <城市>
          permission: member
          command_source: manifest
      command_conflicts: []
expect:
  valid: true
