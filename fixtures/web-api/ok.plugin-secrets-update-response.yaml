contract: contracts/web-api.openapi.yaml
case: ok
description: Plugin secret writes return changed keys and the latest plugin-owned plaintext values.
request:
  method: PUT
  path: /api/plugins/subscription-hub/secrets
  body:
    values:
      bili_token_primary: "SESSDATA=fixture; bili_jct=fixture"
    deleted_keys:
      - bili_token_old
response:
  status: 200
  body:
    plugin_id: subscription-hub
    changed_keys:
      - bili_token_old
      - bili_token_primary
    values:
      bili_token_primary: "SESSDATA=fixture; bili_jct=fixture"
expect:
  valid: true
