contract: contracts/web-api.openapi.yaml
case: edge
description: Readyz reports setup_required until the initial admin credential is bootstrapped.
request:
  method: GET
  path: /readyz
response:
  status: 503
  body:
    status: setup_required
    reason: Initial admin setup is required
    checks:
      config: ok
    issues:
      - code: setup.required
        severity: error
        summary: Initial admin setup is required
        remediation: 请先完成管理员初始化，然后再使用管理入口。
expect:
  valid: true
