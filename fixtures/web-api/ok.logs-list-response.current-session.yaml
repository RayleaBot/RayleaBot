contract: contracts/web-api.openapi.yaml
case: ok
description: Log query can limit results to the current server boot session.
request:
  method: GET
  path: /api/logs?scope=current_session&limit=3
response:
  status: 200
  body:
    items:
      - log_id: log_current_session_0003
        timestamp: "2026-03-20T10:00:02Z"
        level: info
        source: bridge
        protocol: onebot11
        message: "721011692: [测试群(2001)]管理员/Alice(3001): hello bridge"
        request_id: req_bridge_0001
      - log_id: log_current_session_0002
        timestamp: "2026-03-20T10:00:01Z"
        level: error
        source: runtime
        message: plugin runtime stderr truncated
        plugin_id: weather
        request_id: req_plugin_0001
      - log_id: log_current_session_0001
        timestamp: "2026-03-20T10:00:00Z"
        level: warn
        source: adapter.onebot11
        protocol: onebot11
        message: reverse websocket connection lost
        request_id: req_adapter_0001
    page:
      limit: 3
      has_older: false
      has_newer: false
      older_cursor: null
      newer_cursor: null
expect:
  valid: true
