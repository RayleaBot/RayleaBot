contract: contracts/web-api.openapi.yaml
case: ok
description: Template validation returns normalized manifest data and no issues for a valid draft.
request:
  method: POST
  path: /api/system/render/templates/help.menu/validate
  body:
    source:
      manifest_json:
        id: help.menu
        version: '1'
        entry_html: template.html
        stylesheet: styles.css
        input_schema: input.schema.json
        width: 960
        height: 640
      html: |
        <section class="menu-card">
          <h1>{{ .title }}</h1>
        </section>
      stylesheet: |
        .menu-card {
          display: grid;
          gap: 12px;
        }
      input_schema_json:
        type: object
        additionalProperties: false
        required:
          - title
        properties:
          title:
            type: string
response:
  status: 200
  body:
    valid: true
    issues: []
    normalized_manifest:
      id: help.menu
      version: '1'
      entry_html: template.html
      stylesheet: styles.css
      input_schema: input.schema.json
      width: 960
      height: 640
expect:
  valid: true
