contract: contracts/web-api.openapi.yaml
case: ok
description: Loopback Launcher bootstrap returns a single-use short-lived token.
request:
  method: POST
  path: /api/session/launcher-token
response:
  status: 200
  body:
    launcher_token: launcher_token_fixture_0001
expect:
  valid: true
  notes:
    - launcher_token is single-use and short-lived; it must not be reused after launcher admission.
