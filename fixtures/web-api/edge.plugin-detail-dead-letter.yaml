contract: contracts/web-api.openapi.yaml
case: edge
description: Plugin detail surfaces the dead_letter summary while the runtime is in dead_letter.
request:
  method: GET
  path: /api/plugins/weather
response:
  status: 200
  body:
    plugin:
      id: weather
      name: Weather
      role: user
      registration_state: installed
      desired_state: enabled
      runtime_state: dead_letter
      display_state: dead_letter
      source:
        root: plugins/installed
        package_source_type: local_zip
        package_source_ref: C:/plugins/weather.zip
        verified: false
      trust:
        level: unverified
        label: 未验证来源
      commands:
        - name: weather
          aliases:
            - tq
            - 天气
          description: 查询天气
          usage: weather <城市>
          permission: member
          command_source: manifest
      command_conflicts: []
      dead_letter:
        entered_at: '2026-05-13T08:00:00Z'
        crash_count: 5
        last_error_code: plugin.internal_error
        last_error_message: plugin exited unexpectedly
      permissions:
        - capability: http.request
          requirement: required
          status: granted
          source: persisted
          expires_at: null
expect:
  valid: true
  notes:
    - dead_letter is populated only while runtime_state equals dead_letter.
    - crash_count reflects the cumulative crash count up to the moment dead_letter was entered.
    - last_error_message has been redacted before reaching this surface.
