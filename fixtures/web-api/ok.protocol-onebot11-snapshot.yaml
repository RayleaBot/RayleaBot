contract: contracts/web-api.openapi.yaml
case: ok
description: OneBot11 protocol snapshot returns the current configured transports and adapter-facing state.
request:
  method: GET
  path: /api/protocols/onebot11
response:
  status: 200
  body:
    protocol: onebot11
    provider: standard
    configured_transports:
      - reverse_ws
    active_transport: reverse_ws
    transport_status:
      - transport: reverse_ws
        enabled: true
        configured: true
        implemented: true
        active: true
        endpoint: ws://127.0.0.1:8089
      - transport: forward_ws
        enabled: false
        configured: false
        implemented: false
        active: false
        endpoint: ""
      - transport: http_api
        enabled: false
        configured: false
        implemented: false
        active: false
        endpoint: ""
      - transport: webhook
        enabled: false
        configured: false
        implemented: false
        active: false
        endpoint: ""
      - transport: sse
        enabled: false
        configured: false
        implemented: false
        active: false
        endpoint: ""
    connection_state: connected
    readiness_status: ready
    summary: OneBot11 reverse WebSocket 已连接
    recent_transport_issues: []
expect:
  valid: true
