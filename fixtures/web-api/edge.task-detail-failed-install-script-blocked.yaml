contract: contracts/web-api.openapi.yaml
case: edge
description: Task detail can expose a failed plugin.install snapshot when install-time scripts stay blocked by the default safety policy.
request:
  method: GET
  path: /api/tasks/task_plugin_install_failed_0002
response:
  status: 200
  body:
    task:
      task_id: task_plugin_install_failed_0002
      task_type: plugin.install
      status: failed
      progress: 40
      summary: 插件安装脚本被默认安全策略阻止
      started_at: 2026-03-21T10:05:00Z
      finished_at: 2026-03-21T10:05:01Z
      error:
        code: platform.install_script_blocked
        message: 插件安装脚本被默认安全策略阻止
expect:
  valid: true
