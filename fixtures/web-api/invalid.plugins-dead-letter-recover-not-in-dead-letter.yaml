contract: contracts/web-api.openapi.yaml
case: invalid
description: Recover endpoint refuses plugins whose runtime_state is not dead_letter.
request:
  method: POST
  path: /api/plugins/weather/dead_letter/recover
response:
  status: 409
  body:
    error:
      code: plugin.not_in_dead_letter
      message: 插件当前不处于 dead_letter 状态
      message_key: errors.plugin.not_in_dead_letter
      details:
        runtime_state: running
expect:
  valid: false
  notes:
    - 409 is the formal status when the plugin is not in dead_letter.
    - Use enable / disable / reload for normal lifecycle transitions.
