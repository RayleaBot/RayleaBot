contract: contracts/web-api.openapi.yaml
case: edge
description: Enabling a plugin fails with permission_pending when only an expired grant would satisfy a required capability.
request:
  method: POST
  path: /api/plugins/weather/enable
response:
  status: 409
  body:
    error:
      code: plugin.permission_pending
      message_key: errors.plugin.permission_pending
      details:
        plugin_id: weather
        missing_capabilities:
          - http.request
expect:
  valid: true
